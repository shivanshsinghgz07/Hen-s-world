<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Hen's World — Global Room Messenger</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0c0f;
            font-family: 'SF Mono', 'Fira Code', 'Courier New', monospace;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        .app {
            max-width: 800px;
            width: 100%;
            height: 90vh;
            background: #111417;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid #2a2f36;
        }

        .header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid #1e2329;
            background: #0e1115;
        }

        .badge {
            font-size: 0.7rem;
            letter-spacing: 1px;
            color: #6c7a89;
            text-transform: uppercase;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        h1 {
            font-size: 1.7rem;
            font-weight: 500;
            color: #eef2ff;
            letter-spacing: -0.5px;
        }

        .sub {
            color: #6c86a3;
            font-size: 0.8rem;
            margin-top: 6px;
        }

        .room-controls {
            padding: 1rem 1.5rem;
            background: #0b0e12;
            border-bottom: 1px solid #1a1f26;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            justify-content: space-between;
        }

        .room-input-group {
            flex: 3;
            min-width: 180px;
        }

        .room-label {
            font-size: 0.7rem;
            color: #7e8c9e;
            text-transform: uppercase;
            margin-bottom: 4px;
            letter-spacing: 0.5px;
        }

        .room-field {
            display: flex;
            background: #050709;
            border: 1px solid #252b33;
            border-radius: 40px;
            overflow: hidden;
            transition: 0.2s;
        }
        .room-field:focus-within {
            border-color: #3e6b9e;
            box-shadow: 0 0 0 1px #1e3a5f;
        }

        .room-field input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 10px 16px;
            color: #dfe6f0;
            font-family: monospace;
            font-size: 0.9rem;
            outline: none;
        }

        .room-field button {
            background: #1e293b;
            border: none;
            border-left: 1px solid #2d3540;
            padding: 0 20px;
            color: #b9d0f0;
            font-weight: bold;
            font-family: monospace;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.8rem;
        }
        .room-field button:hover {
            background: #2d3e5a;
            color: white;
        }

        .room-status {
            flex: 2;
            text-align: right;
            font-size: 0.85rem;
            background: #07090e;
            padding: 8px 16px;
            border-radius: 40px;
            border: 1px solid #20262e;
        }

        .room-name-badge {
            color: #93c5fd;
            font-weight: 600;
            word-break: break-all;
        }

        .connection-status {
            font-size: 0.7rem;
            margin-top: 4px;
            color: #5f7d9c;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 1.2rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #0f1219;
            scroll-behavior: smooth;
        }

        .message {
            display: flex;
            flex-direction: column;
            animation: fadeSlide 0.2s ease;
        }

        .message-header {
            font-size: 0.7rem;
            color: #5f7f9e;
            margin-bottom: 4px;
            display: flex;
            gap: 12px;
        }

        .message-sender {
            font-weight: 600;
            color: #8db5e5;
        }

        .message-time {
            font-size: 0.65rem;
            color: #4a5b72;
        }

        .message-text {
            background: #181e26;
            padding: 8px 14px;
            border-radius: 18px;
            border-top-left-radius: 4px;
            display: inline-block;
            max-width: 85%;
            word-wrap: break-word;
            color: #eef3ff;
            font-size: 0.9rem;
            line-height: 1.4;
            border: 1px solid #282f39;
            position: relative;
        }

        .message-text::after {
            content: "🔒";
            position: absolute;
            bottom: 2px;
            right: 5px;
            font-size: 8px;
            color: rgba(255,255,255,0.15);
            pointer-events: none;
        }

        .own-message {
            align-items: flex-end;
        }
        .own-message .message-text {
            background: #1e2a3a;
            border-color: #2f4b6e;
            border-top-right-radius: 4px;
            border-top-left-radius: 18px;
        }
        .own-message .message-header {
            justify-content: flex-end;
        }

        .input-area {
            padding: 1rem 1.5rem 1.3rem;
            background: #0b0e12;
            border-top: 1px solid #1a1f26;
        }

        .message-form {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .message-input-wrapper {
            flex: 1;
            background: #05070c;
            border: 1px solid #252b33;
            border-radius: 28px;
            padding: 6px 16px;
            transition: 0.2s;
        }
        .message-input-wrapper:focus-within {
            border-color: #3e6b9e;
        }

        #messageInput {
            width: 100%;
            background: transparent;
            border: none;
            padding: 10px 0;
            color: #edf4ff;
            font-family: monospace;
            font-size: 0.9rem;
            outline: none;
            resize: none;
        }

        #sendBtn {
            background: #1f2a3c;
            border: none;
            border-radius: 40px;
            padding: 10px 24px;
            color: #c0dcff;
            font-weight: bold;
            font-family: monospace;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.8rem;
            border: 1px solid #2f3a48;
        }
        #sendBtn:hover {
            background: #2e405b;
            color: white;
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .messages-container::-webkit-scrollbar {
            width: 6px;
        }
        .messages-container::-webkit-scrollbar-track {
            background: #0a0d12;
        }
        .messages-container::-webkit-scrollbar-thumb {
            background: #2e3a48;
            border-radius: 8px;
        }

        @media (max-width: 550px) {
            .app {
                height: 95vh;
                border-radius: 20px;
            }
            .room-controls {
                flex-direction: column;
                align-items: stretch;
            }
            .room-status {
                text-align: center;
            }
            .message-text {
                max-width: 95%;
            }
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #6c7a89;
        }
        
        .system-message .message-text {
            background: #1a1f2a;
            color: #a0b4d0;
            font-style: italic;
            border-color: #2d3543;
            font-size: 0.8rem;
        }
        
        .system-message .message-sender {
            color: #8aa2c2;
        }

        /* Username Modal Styles */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s;
        }
        
        .modal-content {
            background: #111417;
            border-radius: 24px;
            padding: 30px;
            max-width: 350px;
            width: 90%;
            border: 1px solid #2a2f36;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        
        .modal-content h2 {
            color: #eef2ff;
            margin-bottom: 10px;
            font-size: 1.5rem;
        }
        
        .modal-content p {
            color: #6c86a3;
            margin-bottom: 20px;
            font-size: 0.85rem;
        }
        
        .username-input {
            width: 100%;
            background: #050709;
            border: 1px solid #252b33;
            border-radius: 40px;
            padding: 12px 18px;
            color: #dfe6f0;
            font-family: monospace;
            font-size: 1rem;
            margin-bottom: 15px;
            outline: none;
        }
        
        .username-input:focus {
            border-color: #3e6b9e;
        }
        
        .username-error {
            color: #ff8888;
            font-size: 0.75rem;
            margin-bottom: 15px;
            display: none;
        }
        
        .modal-buttons {
            display: flex;
            gap: 12px;
        }
        
        .modal-btn {
            flex: 1;
            padding: 10px;
            border-radius: 40px;
            border: none;
            font-family: monospace;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .modal-btn-primary {
            background: #1e293b;
            color: #b9d0f0;
            border: 1px solid #2f3a48;
        }
        
        .modal-btn-primary:hover {
            background: #2e405b;
            color: white;
        }
        
        .modal-btn-secondary {
            background: #2d1f1f;
            color: #ffaaaa;
            border: 1px solid #8b3a3a;
        }
        
        .username-taken {
            animation: shake 0.3s;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        
        .screenshot-detected {
            filter: blur(10px);
            transition: filter 0.3s;
        }
        
        .screenshot-warning {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            color: red;
            font-size: 1.5rem;
            text-align: center;
            flex-direction: column;
            gap: 20px;
            animation: fadeIn 0.2s;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

<div class="app">
    <div class="header">
        <div class="badge">🐔 global messenger · hen's world</div>
        <h1>Hen's World Chat</h1>
        <div class="sub">real-time · room-based · worldwide</div>
    </div>

    <div class="room-controls">
        <div class="room-input-group">
            <div class="room-label">🔗 room identifier</div>
            <div class="room-field">
                <input type="text" id="roomInput" placeholder="e.g., coop-chat, hens-den, global-lounge" autocomplete="off">
                <button id="joinRoomBtn">join</button>
            </div>
        </div>
        <div class="room-status">
            🌀 ROOM // <span id="currentRoomName" class="room-name-badge">—</span>
            <div class="connection-status" id="connectionStatus">connecting...</div>
        </div>
    </div>

    <div class="messages-container" id="messagesContainer">
        <div class="loading">✨ Welcome to Hen's World! Join a room to start chatting...</div>
    </div>

    <div class="input-area">
        <div class="message-form">
            <div class="message-input-wrapper">
                <textarea id="messageInput" rows="1" placeholder="type message... (enter to send)" disabled></textarea>
            </div>
            <button id="sendBtn" disabled>send ➤</button>
        </div>
    </div>
</div>

<!-- Firebase SDK with your actual configuration -->
<script type="module">
    // Import Firebase modules (v10.8.0)
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded, query, limitToLast, serverTimestamp, get, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    
    // ==================== YOUR FIREBASE CONFIGURATION ====================
    const firebaseConfig = {
        apiKey: "AIzaSyDb0fuG5RUoTtNUuJ10n_A4NCC2GFDaOps",
        authDomain: "hen-s-world.firebaseapp.com",
        projectId: "hen-s-world",
        storageBucket: "hen-s-world.firebasestorage.app",
        messagingSenderId: "359865594843",
        appId: "1:359865594843:web:3da81e9f7c00bba183adfe"
    };
    // ====================================================================
    
    // Global references
    let app;
    let database;
    let messagesRef = null;
    let currentRoom = null;
    let currentUsername = null;
    let isFirebaseReady = false;
    
    // ========== USERNAME SYSTEM ==========
    
    // Check if username is available
    async function isUsernameAvailable(username) {
        if (!database) return false;
        
        try {
            const userRef = ref(database, `active_usernames/${username}`);
            const snapshot = await get(userRef);
            return !snapshot.exists();
        } catch (error) {
            console.error("Error checking username:", error);
            return false;
        }
    }
    
    // Register username in Firebase
    async function registerUsername(username) {
        if (!database) return false;
        
        try {
            const userRef = ref(database, `active_usernames/${username}`);
            await set(userRef, {
                username: username,
                joinedAt: serverTimestamp(),
                timestampMs: Date.now()
            });
            return true;
        } catch (error) {
            console.error("Error registering username:", error);
            return false;
        }
    }
    
    // Unregister username when leaving
    async function unregisterUsername(username) {
        if (!database || !username) return;
        
        try {
            const userRef = ref(database, `active_usernames/${username}`);
            await set(userRef, null);
        } catch (error) {
            console.error("Error unregistering username:", error);
        }
    }
    
    // Show username selection modal
    function showUsernameModal() {
        return new Promise((resolve) => {
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `
                <div class="modal-content">
                    <h2>🐔 Choose Your Name</h2>
                    <p>Pick a unique username for Hen's World</p>
                    <input type="text" id="usernameInput" class="username-input" placeholder="e.g., clucky_hen, rooster123" autocomplete="off">
                    <div id="usernameError" class="username-error"></div>
                    <div class="modal-buttons">
                        <button id="confirmUsername" class="modal-btn modal-btn-primary">Join Chat</button>
                    </div>
                </div>
            `;
            
            document.body.appendChild(modal);
            
            const input = modal.querySelector('#usernameInput');
            const errorDiv = modal.querySelector('#usernameError');
            const confirmBtn = modal.querySelector('#confirmUsername');
            
            setTimeout(() => input.focus(), 100);
            
            let checkTimeout;
            input.addEventListener('input', async function() {
                clearTimeout(checkTimeout);
                const username = this.value.trim();
                
                if (username.length < 3) {
                    errorDiv.style.display = 'none';
                    return;
                }
                
                if (username.length > 20) {
                    errorDiv.style.display = 'block';
                    errorDiv.innerHTML = '❌ Username must be less than 20 characters';
                    errorDiv.style.color = '#ff8888';
                    return;
                }
                
                errorDiv.style.display = 'block';
                errorDiv.innerHTML = '⏳ Checking availability...';
                errorDiv.style.color = '#fbbf24';
                
                checkTimeout = setTimeout(async () => {
                    const available = await isUsernameAvailable(username);
                    if (available) {
                        errorDiv.style.display = 'none';
                    } else {
                        errorDiv.style.display = 'block';
                        errorDiv.innerHTML = '❌ Username already taken! Try another one';
                        errorDiv.style.color = '#ff8888';
                        modal.classList.add('username-taken');
                        setTimeout(() => modal.classList.remove('username-taken'), 300);
                    }
                }, 500);
            });
            
            const submitUsername = async () => {
                const username = input.value.trim();
                
                if (username.length < 3) {
                    errorDiv.style.display = 'block';
                    errorDiv.innerHTML = '❌ Username must be at least 3 characters';
                    errorDiv.style.color = '#ff8888';
                    return;
                }
                
                if (username.length > 20) {
                    errorDiv.style.display = 'block';
                    errorDiv.innerHTML = '❌ Username must be less than 20 characters';
                    errorDiv.style.color = '#ff8888';
                    return;
                }
                
                const available = await isUsernameAvailable(username);
                if (!available) {
                    errorDiv.style.display = 'block';
                    errorDiv.innerHTML = '❌ Username already taken! Try another one';
                    errorDiv.style.color = '#ff8888';
                    modal.classList.add('username-taken');
                    setTimeout(() => modal.classList.remove('username-taken'), 300);
                    return;
                }
                
                const registered = await registerUsername(username);
                if (registered) {
                    modal.remove();
                    resolve(username);
                } else {
                    errorDiv.style.display = 'block';
                    errorDiv.innerHTML = '❌ Error registering username. Please try again';
                    errorDiv.style.color = '#ff8888';
                }
            };
            
            confirmBtn.addEventListener('click', submitUsername);
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') submitUsername();
            });
        });
    }
    
    // Initialize username system
    async function initUsername() {
        const username = await showUsernameModal();
        if (username) {
            currentUsername = username;
            localStorage.setItem("hensworld_username", username);
            return username;
        } else {
            return await initUsername();
        }
    }
    
    // Initialize Firebase connection
    async function initFirebase() {
        try {
            app = initializeApp(firebaseConfig);
            database = getDatabase(app);
            isFirebaseReady = true;
            
            const statusEl = document.getElementById("connectionStatus");
            statusEl.innerHTML = "✅ Firebase connected · realtime ready";
            statusEl.style.color = "#10b981";
            
            console.log("🔥 Hen's World Firebase initialized successfully");
            return true;
        } catch (error) {
            console.error("Firebase init error:", error);
            const statusEl = document.getElementById("connectionStatus");
            statusEl.innerHTML = "❌ Firebase connection failed. Check console.";
            statusEl.style.color = "#f87171";
            isFirebaseReady = false;
            return false;
        }
    }
    
    // Join a specific room
    function joinRoom(roomId) {
        if (!database || !isFirebaseReady) {
            alert("Firebase not ready yet. Please wait or refresh the page.");
            return false;
        }
        
        const cleanRoomId = roomId.trim().replace(/[.#$[\]]/g, '_');
        if (!cleanRoomId) return false;
        
        if (currentRoom === cleanRoomId) {
            return true;
        }
        
        if (messagesRef) {
            messagesRef = null;
        }
        
        currentRoom = cleanRoomId;
        document.getElementById("currentRoomName").innerText = currentRoom;
        
        const msgInput = document.getElementById("messageInput");
        const sendBtn = document.getElementById("sendBtn");
        msgInput.disabled = false;
        sendBtn.disabled = false;
        msgInput.focus();
        
        const container = document.getElementById("messagesContainer");
        container.innerHTML = '<div class="loading">🐔 joining the coop... loading messages</div>';
        
        messagesRef = ref(database, `rooms/${currentRoom}/messages`);
        const messagesQuery = query(messagesRef, limitToLast(100));
        
        onChildAdded(messagesQuery, (snapshot) => {
            const message = snapshot.val();
            if (message) {
                displayMessage(message);
            }
        });
        
        setTimeout(() => {
            if (currentRoom === cleanRoomId) {
                addSystemMessage(`${currentUsername} 🐔 joined the coop`);
            }
        }, 300);
        
        return true;
    }
    
    // Send a text message
    async function sendMessage(text) {
        if (!text.trim()) return false;
        if (!currentRoom) {
            alert("Join a room first!");
            return false;
        }
        if (!database || !isFirebaseReady) {
            alert("Waiting for Firebase connection...");
            return false;
        }
        
        const messageData = {
            sender: currentUsername,
            text: text.trim(),
            timestamp: serverTimestamp(),
            timestampMs: Date.now(),
            type: "user"
        };
        
        try {
            await push(ref(database, `rooms/${currentRoom}/messages`), messageData);
            document.getElementById("messageInput").value = "";
            return true;
        } catch (error) {
            console.error("Send error:", error);
            alert("Failed to send message.");
            return false;
        }
    }
    
    // Add system notification
    async function addSystemMessage(text) {
        if (!currentRoom || !database || !isFirebaseReady) return;
        
        const systemMsg = {
            sender: "🐔 Hen's World",
            text: text,
            timestamp: serverTimestamp(),
            timestampMs: Date.now(),
            isSystem: true,
            type: "system"
        };
        
        try {
            await push(ref(database, `rooms/${currentRoom}/messages`), systemMsg);
        } catch (error) {
            console.warn("System message not sent:", error);
        }
    }
    
    // Escape HTML
    function escapeHtml(str) {
        if (!str) return "";
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }
    
    // Display message
    function displayMessage(message) {
        const container = document.getElementById("messagesContainer");
        if (!container) return;
        
        if (container.children.length === 1 && container.children[0].classList?.contains('loading')) {
            container.innerHTML = '';
        }
        
        const msgDiv = document.createElement("div");
        const isOwn = (message.sender === currentUsername);
        const isSystem = message.isSystem === true || message.type === "system" || message.sender === "🐔 Hen's World";
        
        if (isSystem) {
            msgDiv.className = "message system-message";
        } else {
            msgDiv.className = `message ${isOwn ? 'own-message' : ''}`;
        }
        
        let timeStr = "now";
        if (message.timestampMs) {
            const date = new Date(message.timestampMs);
            timeStr = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
        }
        
        const senderDisplay = isSystem ? "🐔 system" : escapeHtml(message.sender);
        
        msgDiv.innerHTML = `
            <div class="message-header">
                <span class="message-sender">${senderDisplay}</span>
                <span class="message-time">${timeStr}</span>
            </div>
            <div class="message-text">${escapeHtml(message.text)}</div>
        `;
        
        container.appendChild(msgDiv);
        container.scrollTop = container.scrollHeight;
    }
    
    // Setup UI
    function setupUI() {
        const roomInput = document.getElementById("roomInput");
        const joinBtn = document.getElementById("joinRoomBtn");
        const sendBtn = document.getElementById("sendBtn");
        const messageInput = document.getElementById("messageInput");
        
        joinBtn.addEventListener("click", () => {
            let roomVal = roomInput.value.trim();
            if (!roomVal) {
                roomVal = "henhouse-lounge";
                roomInput.value = roomVal;
            }
            joinRoom(roomVal);
        });
        
        sendBtn.addEventListener("click", () => {
            sendMessage(messageInput.value);
        });
        
        messageInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                sendMessage(messageInput.value);
            }
        });
        
        roomInput.value = "henhouse-lounge";
        
        const tryAutoJoin = () => {
            if (isFirebaseReady && !currentRoom && currentUsername) {
                joinRoom("henhouse-lounge");
            }
        };
        setTimeout(tryAutoJoin, 800);
    }
    
    // Update status
    function updateStatusWithUser() {
        const statusDiv = document.getElementById("connectionStatus");
        if (statusDiv && currentUsername) {
            let connText = isFirebaseReady ? "✅ live" : "⏳ connecting...";
            statusDiv.innerHTML = `👤 ${escapeHtml(currentUsername)} · ${connText}`;
        }
    }
    
    // Cleanup on unload
    window.addEventListener('beforeunload', () => {
        if (currentUsername) {
            unregisterUsername(currentUsername);
        }
    });
    
    // ========== SCREENSHOT PREVENTION ==========
    
    function showScreenshotWarning(message = '📸 Screenshots are disabled!') {
        const existingWarning = document.querySelector('.screenshot-warning');
        if (existingWarning) existingWarning.remove();
        
        const warning = document.createElement('div');
        warning.className = 'screenshot-warning';
        warning.innerHTML = `
            <div style="background: #1a1f2e; padding: 30px; border-radius: 20px; border: 2px solid #ff4444; max-width: 80%;">
                <div style="font-size: 3rem;">🚫</div>
                <div style="font-size: 1.2rem; margin: 15px 0; color: #ff8888;">${message}</div>
                <div style="font-size: 0.8rem; color: #aaa;">All messages are watermarked with your username</div>
                <button onclick="this.parentElement.parentElement.remove()" style="margin-top: 20px; background: #ff4444; border: none; padding: 8px 20px; border-radius: 20px; color: white;">OK</button>
            </div>
        `;
        
        document.body.appendChild(warning);
        setTimeout(() => warning.remove(), 3000);
    }
    
    // Disable context menu
    document.addEventListener('contextmenu', (e) => {
        e.preventDefault();
        return false;
    });
    
    // Add watermark
    function addWatermark() {
        const watermark = document.createElement('div');
        watermark.style.cssText = `
            position: fixed;
            bottom: 5px;
            left: 5px;
            right: 5px;
            font-size: 9px;
            color: rgba(150,150,150,0.25);
            z-index: 9998;
            pointer-events: none;
            font-family: monospace;
            text-align: center;
        `;
        watermark.innerHTML = `${currentUsername || 'user'} • ${new Date().toLocaleString()} • hensworld.chat • confidential`;
        document.body.appendChild(watermark);
    }
    
    // Blur on app switch
    window.addEventListener('blur', () => {
        const appDiv = document.querySelector('.app');
        if (appDiv) appDiv.classList.add('screenshot-detected');
    });
    
    window.addEventListener('focus', () => {
        const appDiv = document.querySelector('.app');
        if (appDiv) setTimeout(() => appDiv.classList.remove('screenshot-detected'), 300);
    });
    
    // ========== INITIALIZATION ==========
    
    async function init() {
        await initFirebase();
        await initUsername();
        setupUI();
        updateStatusWithUser();
        addWatermark();
        
        if (!isFirebaseReady) {
            const container = document.getElementById("messagesContainer");
            container.innerHTML = `
                <div class="loading" style="background: #1f1a2e; border-left: 4px solid #f97316; padding: 20px; border-radius: 16px; margin: 10px;">
                    <strong>🐔 Welcome ${escapeHtml(currentUsername)}!</strong><br><br>
                    ⚠️ Firebase connection issue. Please verify Realtime Database is enabled in test mode.
                </div>
            `;
            document.getElementById("messageInput").disabled = true;
            document.getElementById("sendBtn").disabled = true;
        } else {
            setTimeout(() => {
                if (!currentRoom) joinRoom("henhouse-lounge");
            }, 800);
        }
    }
    
    // Start the app
    init();
</script>
</body>
    </html>
