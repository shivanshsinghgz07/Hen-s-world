<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Hen's World — Auto-Delete + Read Receipts</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0c0f;
            font-family: 'SF Mono', 'Fira Code', 'Courier New', monospace;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
            -webkit-touch-callout: none;
            user-select: none;
        }

        .app {
            max-width: 800px;
            width: 100%;
            height: 90vh;
            background: #111417;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid #2a2f36;
        }

        .header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid #1e2329;
            background: #0e1115;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .header-left {
            flex: 1;
        }

        .badge {
            font-size: 0.7rem;
            color: #6c7a89;
            text-transform: uppercase;
        }

        h1 {
            font-size: 1.5rem;
            color: #eef2ff;
        }

        .sub {
            color: #6c86a3;
            font-size: 0.7rem;
        }

        .controls-group {
            display: flex;
            gap: 12px;
            align-items: center;
            background: #0b0e12;
            padding: 6px 14px;
            border-radius: 40px;
            border: 1px solid #252b33;
        }

        .toggle-switch {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.75rem;
            color: #b9d0f0;
        }

        .toggle-switch input {
            width: 36px;
            height: 20px;
            appearance: none;
            background: #2d2f36;
            border-radius: 20px;
            position: relative;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid #4a5568;
        }

        .toggle-switch input:checked {
            background: #2e7d64;
        }

        .toggle-switch input::before {
            content: "";
            width: 16px;
            height: 16px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 1px;
            left: 2px;
            transition: 0.2s;
        }

        .toggle-switch input:checked::before {
            transform: translateX(16px);
        }

        .logout-btn {
            background: #2d1f1f;
            border: 1px solid #8b3a3a;
            border-radius: 40px;
            padding: 6px 16px;
            color: #ffaaaa;
            font-family: monospace;
            font-size: 0.75rem;
            cursor: pointer;
        }

        .room-controls {
            padding: 0.8rem 1.5rem;
            background: #0b0e12;
            border-bottom: 1px solid #1a1f26;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            justify-content: space-between;
        }

        .room-input-group {
            flex: 2;
        }

        .room-field {
            display: flex;
            background: #050709;
            border: 1px solid #252b33;
            border-radius: 40px;
            overflow: hidden;
        }

        .room-field input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 8px 14px;
            color: #dfe6f0;
            font-family: monospace;
            outline: none;
        }

        .room-field button {
            background: #1e293b;
            border: none;
            padding: 0 18px;
            color: #b9d0f0;
            cursor: pointer;
        }

        .room-status {
            font-size: 0.8rem;
            background: #07090e;
            padding: 6px 14px;
            border-radius: 40px;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #0f1219;
        }

        .message {
            display: flex;
            flex-direction: column;
            animation: fadeSlide 0.2s ease;
            position: relative;
        }

        .message-header {
            font-size: 0.7rem;
            color: #5f7f9e;
            margin-bottom: 4px;
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .message-sender {
            font-weight: 600;
            color: #8db5e5;
        }

        .message-time {
            font-size: 0.65rem;
            color: #4a5b72;
        }

        .message-text {
            background: #181e26;
            padding: 8px 14px;
            border-radius: 18px;
            border-top-left-radius: 4px;
            display: inline-block;
            max-width: 85%;
            word-wrap: break-word;
            color: #eef3ff;
            font-size: 0.9rem;
            border: 1px solid #282f39;
            position: relative;
            cursor: pointer;
        }

        .own-message {
            align-items: flex-end;
        }
        .own-message .message-text {
            background: #1e2a3a;
            border-color: #2f4b6e;
            border-top-right-radius: 4px;
            border-top-left-radius: 18px;
        }
        .own-message .message-header {
            justify-content: flex-end;
        }

        .read-status {
            font-size: 0.7rem;
            margin-left: 6px;
            display: inline-flex;
            align-items: center;
            gap: 3px;
        }
        .double-tick {
            color: #34b7f1;
            font-weight: bold;
        }
        .single-tick {
            color: #8e9eae;
        }

        .input-area {
            padding: 1rem;
            background: #0b0e12;
            border-top: 1px solid #1a1f26;
        }

        .message-form {
            display: flex;
            gap: 12px;
        }

        .message-input-wrapper {
            flex: 1;
            background: #05070c;
            border: 1px solid #252b33;
            border-radius: 28px;
            padding: 6px 16px;
        }

        #messageInput {
            width: 100%;
            background: transparent;
            border: none;
            padding: 8px 0;
            color: #edf4ff;
            font-family: monospace;
            outline: none;
            resize: none;
        }

        #sendBtn {
            background: #1f2a3c;
            border: none;
            border-radius: 40px;
            padding: 0 24px;
            color: #c0dcff;
            cursor: pointer;
        }

        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(6px);}
            to { opacity: 1; transform: translateY(0);}
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: #111417;
            border-radius: 24px;
            padding: 24px;
            max-width: 450px;
            width: 90%;
            border: 1px solid #2a2f36;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-content h3 {
            color: #eef2ff;
            margin-bottom: 16px;
        }

        .seen-list {
            list-style: none;
            padding: 0;
        }
        .seen-list li {
            padding: 8px 0;
            border-bottom: 1px solid #252b33;
            color: #b9d0f0;
            font-size: 0.85rem;
        }
        .close-modal {
            background: #2d3e5a;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            color: white;
            margin-top: 16px;
            cursor: pointer;
            width: 100%;
        }
        .system-message .message-text {
            background: #1a1f2a;
            color: #a0b4d0;
            font-style: italic;
        }
        .loading {
            text-align: center;
            padding: 20px;
            color: #6c7a89;
        }
        .info-badge {
            font-size: 10px;
            margin-left: 8px;
            opacity: 0.6;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="app">
    <div class="header">
        <div class="header-left">
            <div class="badge">🐔 HEN'S WORLD • EPHEMERAL + READ RECEIPTS</div>
            <h1>Secure Chat</h1>
            <div class="sub">auto-delete | double blue ticks | message insights</div>
        </div>
        <div class="controls-group">
            <label class="toggle-switch">
                <span>🔁 Auto-Delete (1h)</span>
                <input type="checkbox" id="autoDeleteToggle" checked>
            </label>
            <button id="logoutBtn" class="logout-btn">🚪 Logout</button>
        </div>
    </div>

    <div class="room-controls">
        <div class="room-input-group">
            <div class="room-field">
                <input type="text" id="roomInput" placeholder="room id (e.g., hens-den)" autocomplete="off">
                <button id="joinRoomBtn">join</button>
            </div>
        </div>
        <div class="room-status">
            🌀 ROOM: <span id="currentRoomName">—</span>
            <div id="connectionStatus" style="font-size:0.7rem;">connecting...</div>
        </div>
    </div>

    <div class="messages-container" id="messagesContainer">
        <div class="loading">✨ Join a room to start chatting. Auto-delete ON by default (1 hour).</div>
    </div>

    <div class="input-area">
        <div class="message-form">
            <div class="message-input-wrapper">
                <textarea id="messageInput" rows="1" placeholder="Type message... (Enter to send)" disabled></textarea>
            </div>
            <button id="sendBtn" disabled>➤ send</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded, query, limitToLast, serverTimestamp, get, set, update, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    
    const firebaseConfig = {
        apiKey: "AIzaSyDb0fuG5RUoTtNUuJ10n_A4NCC2GFDaOps",
        authDomain: "hen-s-world.firebaseapp.com",
        projectId: "hen-s-world",
        storageBucket: "hen-s-world.firebasestorage.app",
        messagingSenderId: "359865594843",
        appId: "1:359865594843:web:3da81e9f7c00bba183adfe"
    };
    
    let app, database;
    let messagesRef = null;
    let currentRoom = null;
    let currentUsername = null;
    let isFirebaseReady = false;
    let autoDeleteEnabled = true;       // default ON
    let messageElementsMap = new Map();  // messageId -> DOM element
    
    // ========== SIMPLE AUTH (preserved from original) ==========
    function simpleHash(str) {
        let hash = 0;
        for (let i = 0; i < str.length; i++) {
            hash = ((hash << 5) - hash) + str.charCodeAt(i);
            hash |= 0;
        }
        return hash.toString(16);
    }
    
    async function registerUser(username, password) {
        const userRef = ref(database, `users/${username}`);
        const snap = await get(userRef);
        if (snap.exists()) return false;
        await set(userRef, { username, password: simpleHash(password), createdAt: serverTimestamp() });
        return true;
    }
    
    async function loginUser(username, password) {
        const userRef = ref(database, `users/${username}`);
        const snap = await get(userRef);
        if (!snap.exists()) return false;
        const data = snap.val();
        return data.password === simpleHash(password);
    }
    
    async function setActiveSession(username) {
        await set(ref(database, `active_sessions/${username}`), { username, loginTime: Date.now() });
    }
    async function removeActiveSession(username) {
        await set(ref(database, `active_sessions/${username}`), null);
    }
    
    function showAuthModal() {
        return new Promise((resolve) => {
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `
                <div class="modal-content">
                    <h3>🐔 Login / Register</h3>
                    <input type="text" id="authUser" class="auth-input" placeholder="Username (min 3)" style="width:100%; padding:10px; margin:8px 0; background:#050709; border:1px solid #252b33; color:white;">
                    <input type="password" id="authPass" class="auth-input" placeholder="Password (min 3)" style="width:100%; padding:10px; margin:8px 0; background:#050709; border:1px solid #252b33; color:white;">
                    <div id="authMsg" style="color:#ff8888; font-size:0.75rem; margin:5px 0;"></div>
                    <button id="loginBtn" style="background:#1e293b; padding:8px; border-radius:40px; width:100%; margin-top:8px;">Login</button>
                    <button id="registerBtn" style="background:#2d1f1f; padding:8px; border-radius:40px; width:100%; margin-top:8px;">Register</button>
                </div>
            `;
            document.body.appendChild(modal);
            const userInp = modal.querySelector('#authUser');
            const passInp = modal.querySelector('#authPass');
            const msgDiv = modal.querySelector('#authMsg');
            const loginBtn = modal.querySelector('#loginBtn');
            const regBtn = modal.querySelector('#registerBtn');
            
            const action = async (isLogin) => {
                const user = userInp.value.trim();
                const pass = passInp.value;
                if (user.length < 3 || pass.length < 3) {
                    msgDiv.innerText = "Username/password min 3 chars";
                    return;
                }
                if (isLogin) {
                    const ok = await loginUser(user, pass);
                    if (ok) {
                        await setActiveSession(user);
                        modal.remove();
                        resolve(user);
                    } else msgDiv.innerText = "Invalid credentials";
                } else {
                    const ok = await registerUser(user, pass);
                    if (ok) {
                        await setActiveSession(user);
                        modal.remove();
                        resolve(user);
                    } else msgDiv.innerText = "Username taken";
                }
            };
            loginBtn.onclick = () => action(true);
            regBtn.onclick = () => action(false);
        });
    }
    
    async function initAuth() {
        const saved = localStorage.getItem("hensworld_user");
        if (saved) {
            const snap = await get(ref(database, `users/${saved}`));
            if (snap.exists()) {
                currentUsername = saved;
                await setActiveSession(saved);
                return saved;
            }
        }
        const username = await showAuthModal();
        if (username) {
            currentUsername = username;
            localStorage.setItem("hensworld_user", username);
            return username;
        }
        return null;
    }
    
    async function logout() {
        if (currentUsername) await removeActiveSession(currentUsername);
        localStorage.removeItem("hensworld_user");
        location.reload();
    }
    
    // ========== AUTO-DELETE ENGINE ==========
    // Deletes message after 1 hour from timestampMs if autoDeleteEnabled is ON
    function scheduleAutoDelete(messageId, timestampMs) {
        if (!autoDeleteEnabled) return;
        const now = Date.now();
        const age = now - timestampMs;
        const delay = Math.max(0, 3600000 - age); // 1 hour
        setTimeout(async () => {
            if (!autoDeleteEnabled) return; // if toggled OFF later, skip deletion
            if (!currentRoom || !messageId) return;
            const msgRef = ref(database, `rooms/${currentRoom}/messages/${messageId}`);
            const snap = await get(msgRef);
            if (snap.exists()) {
                await remove(msgRef);
                // system notification optional
            }
        }, delay);
    }
    
    // ========== READ RECEIPTS (Double Blue Tick) ==========
    // When a user views a message, we record "seenBy" object with username + timestamp
    async function markMessageAsSeen(messageId, senderId, messageData) {
        if (!currentUsername) return;
        if (senderId === currentUsername) return; // don't mark own messages as seen by self
        
        const seenRef = ref(database, `rooms/${currentRoom}/messages/${messageId}/seenBy/${currentUsername}`);
        const existing = await get(seenRef);
        if (!existing.exists()) {
            await set(seenRef, { username: currentUsername, seenAt: serverTimestamp(), seenAtMs: Date.now() });
        }
    }
    
    // Build read receipt display: single tick (✓) or double blue tick (✓✓)
    function getReadReceiptHtml(message) {
        if (!message.seenBy) return '<span class="single-tick">✓</span>';
        const viewers = Object.keys(message.seenBy);
        const totalOthers = viewers.length;
        if (totalOthers === 0) return '<span class="single-tick">✓</span>';
        // Double blue tick when at least 1 other person seen (excluding sender)
        return '<span class="double-tick" style="color:#34b7f1;">✓✓</span>';
    }
    
    // ========== INFO POPUP (who & when seen) ==========
    function showInfoPopup(messageId, messageData) {
        const modal = document.createElement('div');
        modal.className = 'modal';
        const seenEntries = messageData.seenBy ? Object.entries(messageData.seenBy) : [];
        let listHtml = '';
        if (seenEntries.length === 0) listHtml = '<li>No one has seen this message yet</li>';
        else {
            seenEntries.forEach(([username, details]) => {
                const time = details.seenAtMs ? new Date(details.seenAtMs).toLocaleString() : 'recently';
                listHtml += `<li><strong>${escapeHtml(username)}</strong> · seen at ${time}</li>`;
            });
        }
        modal.innerHTML = `
            <div class="modal-content">
                <h3>🔍 Message Info</h3>
                <p style="color:#8db5e5;">"${escapeHtml(messageData.text || '')}"</p>
                <div style="margin: 12px 0;"><strong>👁️ Seen by:</strong></div>
                <ul class="seen-list">${listHtml}</ul>
                <button class="close-modal">Close</button>
            </div>
        `;
        document.body.appendChild(modal);
        modal.querySelector('.close-modal').onclick = () => modal.remove();
    }
    
    // ========== DISPLAY MESSAGE WITH LONG PRESS / HOLD ==========
    function displayMessage(message, messageId) {
        const container = document.getElementById("messagesContainer");
        if (!container) return;
        if (container.children.length === 1 && container.children[0].classList?.contains('loading')) container.innerHTML = '';
        
        const isOwn = (message.sender === currentUsername);
        const isSystem = message.isSystem === true;
        const msgDiv = document.createElement("div");
        msgDiv.className = `message ${isOwn ? 'own-message' : ''} ${isSystem ? 'system-message' : ''}`;
        msgDiv.setAttribute('data-msg-id', messageId);
        
        let timeStr = "just now";
        if (message.timestampMs) {
            timeStr = new Date(message.timestampMs).toLocaleTimeString([], { hour: '2-digit', minute:'2-digit' });
        }
        const senderDisplay = isSystem ? "🐔 system" : escapeHtml(message.sender);
        
        // read receipt html (only for non-system)
        let receiptHtml = '';
        if (!isSystem && !isOwn) receiptHtml = `<span class="read-status">${getReadReceiptHtml(message)}</span>`;
        if (!isSystem && isOwn) receiptHtml = `<span class="read-status">${getReadReceiptHtml(message)}</span>`;
        
        msgDiv.innerHTML = `
            <div class="message-header">
                <span class="message-sender">${senderDisplay}</span>
                <span class="message-time">${timeStr}</span>
                ${receiptHtml}
                <span class="info-badge" style="font-size:9px; cursor:pointer;">ℹ️</span>
            </div>
            <div class="message-text">${escapeHtml(message.text || '')}</div>
        `;
        
        container.appendChild(msgDiv);
        container.scrollTop = container.scrollHeight;
        
        // Attach long-press / hold event for info popup
        const textBubble = msgDiv.querySelector('.message-text');
        const infoIcon = msgDiv.querySelector('.info-badge');
        let pressTimer;
        const showInfo = () => {
            showInfoPopup(messageId, message);
        };
        const startPress = (e) => {
            pressTimer = setTimeout(showInfo, 500);
            e.preventDefault();
        };
        const cancelPress = () => {
            if (pressTimer) clearTimeout(pressTimer);
        };
        textBubble.addEventListener('mousedown', startPress);
        textBubble.addEventListener('mouseup', cancelPress);
        textBubble.addEventListener('mouseleave', cancelPress);
        textBubble.addEventListener('touchstart', startPress);
        textBubble.addEventListener('touchend', cancelPress);
        if (infoIcon) infoIcon.addEventListener('click', (e) => { e.stopPropagation(); showInfo(); });
        
        // Store mapping for later updates (read receipt update)
        messageElementsMap.set(messageId, { div: msgDiv, message });
        
        // Auto mark as seen after display (when message enters viewport)
        if (!isSystem && message.sender !== currentUsername) {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        markMessageAsSeen(messageId, message.sender, message);
                        observer.disconnect();
                        // Update read receipt UI after marking
                        updateReadReceiptUI(messageId);
                    }
                });
            }, { threshold: 0.5 });
            observer.observe(msgDiv);
        }
    }
    
    function updateReadReceiptUI(messageId) {
        const entry = messageElementsMap.get(messageId);
        if (!entry) return;
        const msgData = entry.message;
        // re-fetch latest seenBy from database? we can update local message object if needed, but we can also query fresh
        const msgRef = ref(database, `rooms/${currentRoom}/messages/${messageId}`);
        get(msgRef).then(snap => {
            if (snap.exists()) {
                const fresh = snap.val();
                const receiptSpan = entry.div.querySelector('.read-status');
                if (receiptSpan && !fresh.isSystem) {
                    const html = getReadReceiptHtml(fresh);
                    receiptSpan.innerHTML = html;
                    entry.message = fresh; // update cache
                }
            }
        });
    }
    
    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    async function addSystemMessage(text) {
        if (!currentRoom || !database) return;
        const systemMsg = {
            sender: "🐔 Hen's World",
            text: text,
            timestamp: serverTimestamp(),
            timestampMs: Date.now(),
            isSystem: true
        };
        await push(ref(database, `rooms/${currentRoom}/messages`), systemMsg);
    }
    
    // ========== JOIN ROOM & LISTEN ==========
    function joinRoom(roomId) {
        if (!database || !isFirebaseReady) return false;
        const clean = roomId.trim().replace(/[.#$[\]]/g, '_');
        if (!clean) return false;
        if (currentRoom === clean) return true;
        if (messagesRef) messagesRef = null;
        currentRoom = clean;
        document.getElementById("currentRoomName").innerText = currentRoom;
        document.getElementById("messageInput").disabled = false;
        document.getElementById("sendBtn").disabled = false;
        const container = document.getElementById("messagesContainer");
        container.innerHTML = '<div class="loading">🐔 loading messages...</div>';
        messageElementsMap.clear();
        
        messagesRef = ref(database, `rooms/${currentRoom}/messages`);
        const messagesQuery = query(messagesRef, limitToLast(200));
        onChildAdded(messagesQuery, async (snapshot) => {
            const msg = snapshot.val();
            const msgId = snapshot.key;
            if (msg) {
                // ensure timestampMs for auto-delete
                if (!msg.timestampMs && msg.timestamp) {
                    // fallback
                }
                displayMessage(msg, msgId);
                // schedule auto-delete if toggle on (and not system)
                if (autoDeleteEnabled && !msg.isSystem && msg.timestampMs) {
                    scheduleAutoDelete(msgId, msg.timestampMs);
                }
                // Also watch for live updates on seenBy to refresh UI
                const seenRef = ref(database, `rooms/${currentRoom}/messages/${msgId}/seenBy`);
                onValue(seenRef, () => {
                    updateReadReceiptUI(msgId);
                });
            }
        });
        setTimeout(() => addSystemMessage(`${currentUsername} joined the room`), 400);
        return true;
    }
    
    async function sendMessage(text) {
        if (!text.trim()) return;
        if (!currentRoom) { alert("Join a room first!"); return; }
        const messageData = {
            sender: currentUsername,
            text: text.trim(),
            timestamp: serverTimestamp(),
            timestampMs: Date.now(),
            seenBy: {}  // initialize empty seen tracking
        };
        try {
            await push(ref(database, `rooms/${currentRoom}/messages`), messageData);
            document.getElementById("messageInput").value = "";
        } catch(e) { alert("Send failed"); }
    }
    
    // Toggle auto-delete: if user turns OFF, messages already scheduled won't be deleted (set flag)
    function setAutoDeleteMode(enabled) {
        autoDeleteEnabled = enabled;
        localStorage.setItem("autoDeletePref", enabled);
        const statusMsg = enabled ? "Auto-delete ENABLED: all new messages will disappear after 1 hour" : "Auto-delete DISABLED: messages will persist";
        if (currentRoom) addSystemMessage(statusMsg);
        else console.log(statusMsg);
    }
    
    // ========== UI SETUP ==========
    function setupUI() {
        const roomInput = document.getElementById("roomInput");
        const joinBtn = document.getElementById("joinRoomBtn");
        const sendBtn = document.getElementById("sendBtn");
        const messageInput = document.getElementById("messageInput");
        const logoutBtn = document.getElementById("logoutBtn");
        const toggleCheck = document.getElementById("autoDeleteToggle");
        
        const savedPref = localStorage.getItem("autoDeletePref");
        if (savedPref !== null) autoDeleteEnabled = savedPref === "true";
        toggleCheck.checked = autoDeleteEnabled;
        
        toggleCheck.addEventListener("change", (e) => {
            setAutoDeleteMode(e.target.checked);
        });
        
        joinBtn.addEventListener("click", () => {
            let roomVal = roomInput.value.trim();
            if (!roomVal) roomVal = "henhouse-lounge";
            joinRoom(roomVal);
        });
        sendBtn.addEventListener("click", () => sendMessage(messageInput.value));
        messageInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                sendMessage(messageInput.value);
            }
        });
        logoutBtn.addEventListener("click", logout);
        roomInput.value = "henhouse-lounge";
        if (currentUsername && isFirebaseReady) setTimeout(() => joinRoom("henhouse-lounge"), 600);
    }
    
    function addWatermark() {
        const wm = document.createElement('div');
        wm.style.cssText = `position:fixed; bottom:5px; left:5px; font-size:8px; color:rgba(150,150,150,0.3); pointer-events:none;`;
        wm.innerText = `${currentUsername} • hensworld.chat`;
        document.body.appendChild(wm);
    }
    
    document.addEventListener('contextmenu', (e) => e.preventDefault());
    
    async function init() {
        try {
            app = initializeApp(firebaseConfig);
            database = getDatabase(app);
            isFirebaseReady = true;
            document.getElementById("connectionStatus").innerHTML = "✅ secure";
            await initAuth();
            setupUI();
            addWatermark();
        } catch(e) { console.error(e); }
    }
    init();
</script>
</body>
