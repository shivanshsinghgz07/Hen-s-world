<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Hen's World — Auto-Delete Timer + Security Reset</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0c0f;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
            -webkit-touch-callout: none;
            user-select: none;
        }

        .app {
            max-width: 800px;
            width: 100%;
            height: 90vh;
            background: #111417;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid #2a2f36;
        }

        .header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid #1e2329;
            background: #0e1115;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .header-left {
            flex: 1;
        }

        .badge {
            font-size: 0.7rem;
            color: #6c7a89;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        h1 {
            font-size: 1.5rem;
            color: #eef2ff;
            font-weight: 600;
        }

        .sub {
            color: #6c86a3;
            font-size: 0.7rem;
        }

        .controls-group {
            display: flex;
            gap: 12px;
            align-items: center;
            background: #0b0e12;
            padding: 6px 14px;
            border-radius: 40px;
            border: 1px solid #252b33;
        }

        .toggle-switch {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.75rem;
            color: #b9d0f0;
        }

        .toggle-switch input {
            width: 40px;
            height: 22px;
            appearance: none;
            background: #2d2f36;
            border-radius: 20px;
            position: relative;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid #4a5568;
        }

        .toggle-switch input:checked {
            background: #2e7d64;
        }

        .toggle-switch input::before {
            content: "";
            width: 18px;
            height: 18px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 1px;
            left: 2px;
            transition: 0.2s;
        }

        .toggle-switch input:checked::before {
            transform: translateX(18px);
        }

        .timer-badge {
            background: #1a1f2a;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-family: monospace;
            color: #fbbf24;
            border: 1px solid #3a4a5a;
        }

        .logout-btn {
            background: #2d1f1f;
            border: 1px solid #8b3a3a;
            border-radius: 40px;
            padding: 6px 16px;
            color: #ffaaaa;
            font-family: monospace;
            font-size: 0.75rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .logout-btn:hover {
            background: #4a2a2a;
        }

        .room-controls {
            padding: 0.8rem 1.5rem;
            background: #0b0e12;
            border-bottom: 1px solid #1a1f26;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            justify-content: space-between;
        }

        .room-input-group {
            flex: 2;
        }

        .room-label {
            font-size: 0.7rem;
            color: #7e8c9e;
            margin-bottom: 4px;
        }

        .room-field {
            display: flex;
            background: #050709;
            border: 1px solid #252b33;
            border-radius: 40px;
            overflow: hidden;
        }

        .room-field input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 8px 14px;
            color: #dfe6f0;
            font-family: monospace;
            outline: none;
        }

        .room-field button {
            background: #1e293b;
            border: none;
            padding: 0 18px;
            color: #b9d0f0;
            cursor: pointer;
            font-weight: bold;
        }

        .room-status {
            font-size: 0.8rem;
            background: #07090e;
            padding: 6px 14px;
            border-radius: 40px;
        }

        .room-name-badge {
            color: #93c5fd;
            font-weight: 600;
        }

        .connection-status {
            font-size: 0.7rem;
            margin-top: 2px;
            color: #5f7d9c;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #0f1219;
        }

        .message {
            display: flex;
            flex-direction: column;
            animation: fadeSlide 0.2s ease;
            position: relative;
        }

        .message-header {
            font-size: 0.7rem;
            color: #5f7f9e;
            margin-bottom: 4px;
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .message-sender {
            font-weight: 600;
            color: #8db5e5;
        }

        .message-time {
            font-size: 0.65rem;
            color: #4a5b72;
        }

        .message-text {
            background: #181e26;
            padding: 8px 14px;
            border-radius: 18px;
            border-top-left-radius: 4px;
            display: inline-block;
            max-width: 85%;
            word-wrap: break-word;
            color: #eef3ff;
            font-size: 0.9rem;
            border: 1px solid #282f39;
            position: relative;
            cursor: pointer;
        }

        .message-text:active {
            background: #2a2f3a;
        }

        .own-message {
            align-items: flex-end;
        }
        .own-message .message-text {
            background: #1e2a3a;
            border-color: #2f4b6e;
            border-top-right-radius: 4px;
            border-top-left-radius: 18px;
        }
        .own-message .message-header {
            justify-content: flex-end;
        }

        .system-message {
            align-items: center !important;
        }
        .system-message .message-text {
            background: transparent !important;
            border: none !important;
            color: #6c7a89 !important;
            font-size: 0.75rem !important;
            padding: 4px 12px !important;
            text-align: center;
            max-width: 90%;
        }
        .system-message .message-header {
            display: none;
        }

        .read-status {
            font-size: 0.7rem;
            margin-left: 6px;
            display: inline-flex;
            gap: 3px;
        }
        .double-tick {
            color: #34b7f1;
            font-weight: bold;
        }
        .single-tick {
            color: #8e9eae;
        }

        .info-badge {
            font-size: 10px;
            margin-left: 6px;
            opacity: 0.5;
            cursor: pointer;
        }

        .input-area {
            padding: 1rem;
            background: #0b0e12;
            border-top: 1px solid #1a1f26;
        }

        .message-form {
            display: flex;
            gap: 12px;
        }

        .message-input-wrapper {
            flex: 1;
            background: #05070c;
            border: 1px solid #252b33;
            border-radius: 28px;
            padding: 6px 16px;

        #messageInput {
            width: 100%;

            border: none;
            padding: 8px 0;
            color: #edf4ff;
            font-family: monospace;

        }

        #sendBtn {
            background: #1f2a3c;
            border: none;
            border-radius: 40px;
            padding: 0 24px;
            color: #c0dcff;
            cursor: pointer;
            font-weight: bold;
        }

        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(6px);}
            to { opacity: 1; transform: translateY(0);}
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s;
        }
        
        .modal-content {
            background: #111417;
            border-radius: 24px;
            padding: 30px;
            max-width: 450px;
            width: 90%;
            border: 1px solid #2a2f36;
            max-height: 85vh;

        }
        
        .modal-content h2 {
            color: #eef2ff;
            margin-bottom: 10px;
            font-size: 1.5rem;
        }
        
        .modal-content p {
            color: #6c86a3;
            margin-bottom: 20px;
            font-size: 0.85rem;
        }
        
        .auth-input {
            width: 100%;
            background: #050709;
            border: 1px solid #252b33;
            border-radius: 40px;
            padding: 12px 18px;
            color: #dfe6f0;
            font-family: monospace;
            font-size: 1rem;

            outline: none;
        }
        
        .auth-input:focus {
            border-color: #3e6b9e;
        }
        
        .auth-error {
            color: #ff8888;
            font-size: 0.75rem;
            margin-bottom: 15px;
            display: none;
        }
        
        .auth-buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 15px;
        }
        
        .auth-btn {
            flex: 1;
            padding: 10px;
            border-radius: 40px;
            border: none;
            font-family: monospace;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .auth-btn-primary {
            background: #1e293b;
            color: #b9d0f0;
            border: 1px solid #2f3a48;
        }
        
        .auth-btn-primary:hover {
            background: #2e405b;
        }
        
        .auth-btn-secondary {
            background: #2d1f1f;
            color: #ffaaaa;
            border: 1px solid #8b3a3a;
        }
        
        .auth-switch {
            text-align: center;
            font-size: 0.8rem;
            color: #6c86a3;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .auth-switch span {
            color: #93c5fd;
            text-decoration: underline;
        }
        
        .forgot-password {
            text-align: center;
            font-size: 0.7rem;
            color: #6c86a3;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .forgot-password span {
            color: #fbbf24;
            text-decoration: underline;
        }
        
        .security-note {
            background: #1a1f2a;
            border-left: 3px solid #fbbf24;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.7rem;
            color: #fbbf24;
        }
        
        .answer-error {
            font-size: 0.65rem;
            margin-top: -10px;
            margin-bottom: 10px;
            display: none;
            color: #ff8888;
        }
        
        .seen-list {
            list-style: none;
            padding: 0;
            margin: 12px 0;
            max-height: 300px;
            overflow-y: auto;
        }
        .seen-list li {
            padding: 10px 0;
            border-bottom: 1px solid #252b33;
            color: #b9d0f0;
            font-size: 0.85rem;
        }
        .close-modal {
            background: #2d3e5a;
            border: none;
            padding: 10px;
            border-radius: 40px;
            color: white;
            margin-top: 16px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }
        
        .loading {
            text-align: center;
            padding: 20px;
            color: #6c7a89;
        }

        .timer-countdown {
            font-family: monospace;
            font-size: 0.7rem;
            background: #1e293b;
            padding: 2px 8px;
            border-radius: 20px;
            color: #fbbf24;
        }
    </style>
</head>
<body>

<div class="app">
    <div class="header">
        <div class="header-left">
            <div class="badge">🐔 SECURE MESSENGER · HEN'S WORLD</div>
            <h1>Hen's World Chat</h1>
            <div class="sub">secure · private · worldwide</div>
        </div>
        <div class="controls-group">
            <label class="toggle-switch">
                <span>🔁 Auto: <span id="autoLabel">ON</span></span>
                <input type="checkbox" id="autoDeleteToggle" checked>
            </label>
            <div id="timerDisplay" class="timer-badge">⏱️ 1h:00m</div>
            <button id="logoutBtn" class="logout-btn">🚪 Logout</button>
        </div>
    </div>

    <div class="room-controls">
        <div class="room-input-group">
            <div class="room-label">🔗 ROOM IDENTIFIER</div>
            <div class="room-field">
                <input type="text" id="roomInput" placeholder="e.g., henhouse-lounge" autocomplete="off">
                <button id="joinRoomBtn">join</button>
            </div>
        </div>
        <div class="room-status">
            🔒 <span id="currentRoomName" class="room-name-badge">—</span>
            <div class="connection-status" id="connectionStatus">connecting...</div>
        </div>
    </div>

    <div class="messages-container" id="messagesContainer">
        <div class="loading">✨ Welcome to Hen's World! Join a room to start chatting...</div>
    </div>

    <div class="input-area">
        <div class="message-form">
            <div class="message-input-wrapper">
                <textarea id="messageInput" rows="1" placeholder="Type a message..." disabled></textarea>
            </div>
            <button id="sendBtn" disabled>➤ send</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded, query, limitToLast, serverTimestamp, get, set, update, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    
    const firebaseConfig = {
        apiKey: "AIzaSyDb0fuG5RUoTtNUuJ10n_A4NCC2GFDaOps",
        authDomain: "hen-s-world.firebaseapp.com",
        projectId: "hen-s-world",
        storageBucket: "hen-s-world.firebasestorage.app",
        messagingSenderId: "359865594843",
        appId: "1:359865594843:web:3da81e9f7c00bba183adfe"
    };
    
    let app, database;
    let messagesRef = null;
    let currentRoom = null;
    let currentUsername = null;
    let isFirebaseReady = false;
    let autoDeleteEnabled = true;
    let messageElementsMap = new Map();
    let deleteTimerInterval = null;
    let countdownInterval = null;
    let roomCreationTime = null;
    
    // Security Questions
    const securityQuestions = [
        "What is your mother's maiden name?",
        "What was the name of your first pet?",
        "What was your childhood nickname?",
        "What is your favorite teacher's name?",
        "What is your best friend's first name?",
        "What was the name of your first school?",
        "What is your father's middle name?",
        "What city were you born in?"
    ];
    
    function cleanAnswer(answer) {
        if (!answer) return "";
        return answer.toUpperCase().replace(/[^A-Z0-9]/g, '');
    }
    
    function simpleHash(str) {
        let hash = 0;
        for (let i = 0; i < str.length; i++) {
            hash = ((hash << 5) - hash) + str.charCodeAt(i);
            hash |= 0;
        }
        return hash.toString(16);
    }
    
    // ========== SECURITY QUESTIONS MODAL (FOR REGISTRATION) ==========
    function showSecurityQuestionsModal(username) {
        return new Promise((resolve) => {
            const shuffled = [...securityQuestions];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            const selectedQuestions = shuffled.slice(0, 3);
            
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `
                <div class="modal-content">
                    <h2>🔐 Security Questions</h2>
                    <div class="security-note">
                        ⚠️ <strong>IMPORTANT:</strong> Use ONLY letters (A-Z) and numbers (0-9). NO spaces or special characters.<br>
                        Answers will be stored in CAPITAL LETTERS.
                    </div>
                    <p>Please answer these 3 security questions:</p>
                    <div id="questionsContainer"></div>
                    <div id="securityError" class="auth-error"></div>
                    <div class="auth-buttons">
                        <button id="securitySubmitBtn" class="auth-btn auth-btn-primary">Submit & Continue</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            
            const container = modal.querySelector('#questionsContainer');
            const errorDiv = modal.querySelector('#securityError');
            const submitBtn = modal.querySelector('#securitySubmitBtn');
            const answers = {};
            
            selectedQuestions.forEach((question, index) => {
                const div = document.createElement('div');
                div.style.marginBottom = '15px';
                div.innerHTML = `
                    <label style="color: #8db5e5; font-size: 0.75rem; display: block; margin-bottom: 5px;">${index + 1}. ${question}</label>
                    <input type="text" id="answer_${index}" class="auth-input" placeholder="Your answer (A-Z, 0-9 only)" style="margin-bottom: 5px;">
                    <div id="error_${index}" class="answer-error"></div>
                `;
                container.appendChild(div);
                answers[question] = div.querySelector(`#answer_${index}`);
                const errorEl = div.querySelector(`#error_${index}`);
                const input = answers[question];
                
                input.addEventListener('input', function() {
                    const value = this.value;
                    if (/\s/.test(value)) {
                        errorEl.style.display = 'block';
                        errorEl.innerHTML = '❌ SPACES NOT ALLOWED!';
                    } else if (/[^A-Za-z0-9]/.test(value)) {
                        errorEl.style.display = 'block';
                        errorEl.innerHTML = '❌ Use ONLY letters and numbers!';
                    } else {
                        errorEl.style.display = 'none';
                    }
                });
            });
            
            submitBtn.onclick = () => {
                const securityAnswers = {};
                let valid = true;
                
                for (let i = 0; i < selectedQuestions.length; i++) {
                    const question = selectedQuestions[i];
                    const answer = answers[question].value;
                    const errorEl = document.getElementById(`error_${i}`);
                    
                    if (!answer || answer.trim().length === 0) {
                        errorEl.style.display = 'block';
                        errorEl.innerHTML = '❌ This field is required!';
                        valid = false;
                    } else if (/\s/.test(answer)) {
                        errorEl.style.display = 'block';
                        errorEl.innerHTML = '❌ SPACES NOT ALLOWED!';
                        valid = false;
                    } else if (/[^A-Za-z0-9]/.test(answer)) {
                        errorEl.style.display = 'block';
                        errorEl.innerHTML = '❌ Only letters and numbers allowed!';
                        valid = false;
                    } else {
                        securityAnswers[question] = cleanAnswer(answer);
                    }
                }
                
                if (valid) {
                    modal.remove();
                    resolve(securityAnswers);
                } else {
                    errorDiv.style.display = 'block';
                    errorDiv.innerHTML = '❌ Please fix the errors above.';
                }
            };
        });
    }
    
    // ========== FORGOT PASSWORD WITH SECURITY QUESTIONS ==========
    async function showForgotPasswordModal() {
        return new Promise((resolve) => {
            let step = 1;
            let username = '';
            let userQuestions = {};
            let userData = null;
            
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `
                <div class="modal-content" id="forgotModalContent">
                    <h2 id="forgotTitle">🔐 Reset Password</h2>
                    <div id="forgotBody"></div>
                    <div id="forgotError" class="auth-error"></div>
                    <div class="auth-buttons">
                        <button id="forgotBackBtn" class="auth-btn auth-btn-secondary">Back</button>
                        <button id="forgotNextBtn" class="auth-btn auth-btn-primary">Next</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            
            const titleEl = modal.querySelector('#forgotTitle');
            const bodyEl = modal.querySelector('#forgotBody');
            const errorDiv = modal.querySelector('#forgotError');
            const backBtn = modal.querySelector('#forgotBackBtn');
            const nextBtn = modal.querySelector('#forgotNextBtn');
            
            async function loadStep() {
                errorDiv.style.display = 'none';
                
                if (step === 1) {
                    titleEl.innerHTML = '🔐 Enter Username';
                    bodyEl.innerHTML = `
                        <p>Enter your username to reset password</p>
                        <input type="text" id="resetUsername" class="auth-input" placeholder="Username" autocomplete="off">
                    `;
                    setTimeout(() => document.getElementById('resetUsername')?.focus(), 100);
                } 
                else if (step === 2) {
                    titleEl.innerHTML = '🔐 Answer Security Questions';
                    const usernameInput = document.getElementById('resetUsername');
                    username = usernameInput?.value.trim();
                    
                    if (!username || username.length < 3) {
                        errorDiv.style.display = 'block';
                        errorDiv.innerHTML = '❌ Please enter a valid username';
                        step = 1;
                        loadStep();
                        return;
                    }
                    
                    const userRef = ref(database, `users/${username}`);
                    const snapshot = await get(userRef);
                    
                    if (!snapshot.exists()) {
                        errorDiv.style.display = 'block';
                        errorDiv.innerHTML = '❌ Username not found!';
                        step = 1;
                        loadStep();
                        return;
                    }
                    
                    userData = snapshot.val();
                    if (!userData.securityQuestions) {
                        errorDiv.style.display = 'block';
                        errorDiv.innerHTML = '❌ No security questions found for this account';
                        step = 1;
                        loadStep();
                        return;
                    }
                    
                    userQuestions = userData.securityQuestions;
                    const questions = Object.keys(userQuestions);
                    
                    let html = `<p>Answer these security questions to verify your identity:</p>
                                <div class="security-note">⚠️ Use ONLY letters and numbers. NO spaces.</div>`;
                    questions.forEach((question, index) => {
                        html += `
                            <div style="margin-bottom: 15px;">
                                <label style="color: #8db5e5; font-size: 0.75rem; display: block; margin-bottom: 5px;">${index + 1}. ${question}</label>
                                <input type="text" id="secAnswer_${index}" class="auth-input" placeholder="Your answer" style="margin-bottom: 5px;">
                                <div id="secError_${index}" class="answer-error"></div>
                            </div>
                        `;
                    });
                    bodyEl.innerHTML = html;
                    
                    questions.forEach((_, index) => {
                        const input = document.getElementById(`secAnswer_${index}`);
                        const errorEl = document.getElementById(`secError_${index}`);
                        if (input) {
                            input.addEventListener('input', function() {
                                const value = this.value;
                                if (/\s/.test(value)) {
                                    errorEl.style.display = 'block';
                                    errorEl.innerHTML = '❌ SPACES NOT ALLOWED!';
                                } else if (/[^A-Za-z0-9]/.test(value)) {
                                    errorEl.style.display = 'block';
                                    errorEl.innerHTML = '❌ Only letters and numbers!';
                                } else {
                                    errorEl.style.display = 'none';
                                }
                            });
                        }
                    });
                    setTimeout(() => document.getElementById('secAnswer_0')?.focus(), 100);
                } 
                else if (step === 3) {
                    const questions = Object.keys(userQuestions);
                    let allCorrect = true;
                    
                    for (let i = 0; i < questions.length; i++) {
                        const question = questions[i];
                        const inputAnswer = document.getElementById(`secAnswer_${i}`)?.value;
                        const errorEl = document.getElementById(`secError_${i}`);
                        
                        if (!inputAnswer || inputAnswer.trim().length === 0) {
                            if (errorEl) {
                                errorEl.style.display = 'block';
                                errorEl.innerHTML = '❌ Required!';
                            }
                            allCorrect = false;
                            continue;
                        }
                        
                        const cleanedAnswer = cleanAnswer(inputAnswer);
                        if (cleanedAnswer !== userQuestions[question]) {
                            if (errorEl) {
                                errorEl.style.display = 'block';
                                errorEl.innerHTML = '❌ Incorrect answer!';
                            }
                            allCorrect = false;
                        } else if (errorEl) {
                            errorEl.style.display = 'none';
                        }
                    }
                    
                    if (!allCorrect) {
                        errorDiv.style.display = 'block';
                        errorDiv.innerHTML = '❌ One or more answers are incorrect.';
                        step = 2;
                        loadStep();
                        return;
                    }
                    
                    titleEl.innerHTML = '🔐 Set New Password';
                    bodyEl.innerHTML = `
                        <p>Enter your new password</p>
                        <input type="password" id="newPassword" class="auth-input" placeholder="New Password (min 3 chars)">
                        <input type="password" id="confirmPassword" class="auth-input" placeholder="Confirm New Password">
                    `;
                    setTimeout(() => document.getElementById('newPassword')?.focus(), 100);
                }
            }
            
            backBtn.onclick = () => {
                if (step > 1) {
                    step--;
                    loadStep();
                } else {
                    modal.remove();
                    resolve(false);
                }
            };
            
            nextBtn.onclick = async () => {
                if (step === 1) {
                    step++;
                    loadStep();
                } 
                else if (step === 2) {
                    step++;
                    loadStep();
                }
                else if (step === 3) {
                    const newPassword = document.getElementById('newPassword')?.value;
                    const confirmPassword = document.getElementById('confirmPassword')?.value;
                    
                    if (!newPassword || newPassword.length < 3) {
                        errorDiv.style.display = 'block';
                        errorDiv.innerHTML = '❌ Password must be at least 3 characters';
                        return;
                    }
                    if (newPassword !== confirmPassword) {
                        errorDiv.style.display = 'block';
                        errorDiv.innerHTML = '❌ Passwords do not match';
                        return;
                    }
                    
                    errorDiv.style.display = 'block';
                    errorDiv.innerHTML = '⏳ Resetting password...';
                    errorDiv.style.color = '#fbbf24';
                    
                    const hashedPassword = simpleHash(newPassword);
                    const userRef = ref(database, `users/${username}`);
                    await update(userRef, {
                        password: hashedPassword,
                        passwordResetAt: Date.now()
                    });
                    
                    errorDiv.style.display = 'block';
                    errorDiv.innerHTML = '✅ Password reset successful! You can now login.';
                    errorDiv.style.color = '#10b981';
                    
                    setTimeout(() => {
                        modal.remove();
                        resolve(true);
                    }, 2000);
                }
            };
            
            loadStep();
        });
    }
    
    // ========== AUTH ==========
    async function registerUser(username, password, securityAnswers) {
        const userRef = ref(database, `users/${username}`);
        const snap = await get(userRef);
        if (snap.exists()) return false;
        await set(userRef, { 
            username, 
            password: simpleHash(password), 
            securityQuestions: securityAnswers,
            createdAt: Date.now()
        });
        return true;
    }
    
    async function loginUser(username, password) {
        const userRef = ref(database, `users/${username}`);
        const snap = await get(userRef);
        if (!snap.exists()) return false;
        const data = snap.val();
        return data.password === simpleHash(password);
    }
    
    async function setActiveSession(username) {
        await set(ref(database, `active_sessions/${username}`), { username, loginTimeMs: Date.now() });
    }
    
    async function removeActiveSession(username) {
        await set(ref(database, `active_sessions/${username}`), null);
    }
    
    function showAuthModal() {
        return new Promise((resolve) => {
            let isLoginMode = true;
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `
                <div class="modal-content">
                    <h2 id="authTitle">🐔 Login to Hen's World</h2>
                    <p id="authDesc">Enter your username and password</p>
                    <input type="text" id="authUsername" class="auth-input" placeholder="Username">
                    <input type="password" id="authPassword" class="auth-input" placeholder="Password">
                    <div id="authError" class="auth-error"></div>
                    <div class="auth-buttons">
                        <button id="authSubmitBtn" class="auth-btn auth-btn-primary">Login</button>
                    </div>
                    <div class="auth-switch" id="authSwitch">Don't have an account? <span>Register</span></div>
                    <div class="forgot-password" id="forgotPassword">🔑 Forgot password? <span>Reset here</span></div>
                </div>
            `;
            document.body.appendChild(modal);
            
            const usernameInput = modal.querySelector('#authUsername');
            const passwordInput = modal.querySelector('#authPassword');
            const errorDiv = modal.querySelector('#authError');
            const submitBtn = modal.querySelector('#authSubmitBtn');
            const authTitle = modal.querySelector('#authTitle');
            const authDesc = modal.querySelector('#authDesc');
            const authSwitch = modal.querySelector('#authSwitch');
            const forgotPassword = modal.querySelector('#forgotPassword');
            
            const updateMode = () => {
                if (isLoginMode) {
                    authTitle.innerHTML = '🐔 Login to Hen\'s World';
                    authDesc.innerHTML = 'Enter your username and password';
                    submitBtn.innerHTML = 'Login';
                    authSwitch.innerHTML = 'Don\'t have an account? <span>Register</span>';
                    forgotPassword.style.display = 'block';
                } else {
                    authTitle.innerHTML = '📝 Create Account';
                    authDesc.innerHTML = 'Choose a username and password';
                    submitBtn.innerHTML = 'Register';
                    authSwitch.innerHTML = 'Already have an account? <span>Login</span>';
                    forgotPassword.style.display = 'none';
                }
                errorDiv.style.display = 'none';
            };
            
            authSwitch.onclick = () => { isLoginMode = !isLoginMode; updateMode(); };
            forgotPassword.onclick = async () => {
                modal.remove();
                await showForgotPasswordModal();
                showAuthModal().then(resolve);
            };
            
            const handleSubmit = async () => {
                const username = usernameInput.value.trim();
                const password = passwordInput.value;
                if (username.length < 3 || password.length < 3) {
                    errorDiv.style.display = 'block';
                    errorDiv.innerHTML = '❌ Username/password must be at least 3 characters';
                    return;
                }
                errorDiv.style.display = 'block';
                errorDiv.innerHTML = '⏳ Processing...';
                errorDiv.style.color = '#fbbf24';
                
                if (isLoginMode) {
                    const success = await loginUser(username, password);
                    if (success) {
                        await setActiveSession(username);
                        modal.remove();
                        resolve(username);
                    } else {
                        errorDiv.innerHTML = '❌ Invalid credentials';
                        errorDiv.style.color = '#ff8888';
                    }
                } else {
                    const securityAnswers = await showSecurityQuestionsModal(username);
                    const success = await registerUser(username, password, securityAnswers);
                    if (success) {
                        await setActiveSession(username);
                        modal.remove();
                        resolve(username);
                    } else {
                        errorDiv.innerHTML = '❌ Username already exists!';
                        errorDiv.style.color = '#ff8888';
                    }
                }
            };
            
            submitBtn.onclick = handleSubmit;
            usernameInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSubmit(); });
            passwordInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSubmit(); });
        });
    }
    
    async function initAuth() {
        const saved = localStorage.getItem("hensworld_username");
        if (saved) {
            const snap = await get(ref(database, `users/${saved}`));
            if (snap.exists()) {
                currentUsername = saved;
                await setActiveSession(saved);
                return saved;
            }
        }
        const username = await showAuthModal();
        if (username) {
            currentUsername = username;
            localStorage.setItem("hensworld_username", username);
            return username;
        }
        return null;
    }
    
    async function logout() {
        if (currentUsername) await removeActiveSession(currentUsername);
        localStorage.removeItem("hensworld_username");
        location.reload();
    }
    
    // ========== AUTO-DELETE WITH COUNTDOWN TIMER ==========
    async function deleteAllMessagesInRoom() {
        if (!currentRoom || !database) return;
        const roomRef = ref(database, `rooms/${currentRoom}/messages`);
        const snapshot = await get(roomRef);
        if (snapshot.exists()) {
            const messages = snapshot.val();
            const deletePromises = [];
            for (let msgId in messages) {
                deletePromises.push(remove(ref(database, `rooms/${currentRoom}/messages/${msgId}`)));
            }
            await Promise.all(deletePromises);
            addSystemMessage("⏰ Auto-delete timer completed: All messages have been deleted.");
        }
    }
    
    function startDeleteTimer() {
        if (deleteTimerInterval) clearInterval(deleteTimerInterval);
        if (countdownInterval) clearInterval(countdownInterval);
        
        if (!autoDeleteEnabled) return;
        
        roomCreationTime = Date.now();
        const timerDisplay = document.getElementById("timerDisplay");
        
        const updateTimer = () => {
            if (!autoDeleteEnabled) return;
            const elapsed = Date.now() - roomCreationTime;
            const remaining = Math.max(0, 3600000 - elapsed);
            if (remaining <= 0) {
                if (deleteTimerInterval) clearInterval(deleteTimerInterval);
                if (countdownInterval) clearInterval(countdownInterval);
                deleteAllMessagesInRoom();
                timerDisplay.innerHTML = "⏱️ Expired";
                return;
            }
            const hours = Math.floor(remaining / 3600000);
            const minutes = Math.floor((remaining % 3600000) / 60000);
            const seconds = Math.floor((remaining % 60000) / 1000);
            if (hours > 0) {
                timerDisplay.innerHTML = `⏱️ ${hours}h:${minutes.toString().padStart(2,'0')}m`;
            } else {
                timerDisplay.innerHTML = `⏱️ ${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')}`;
            }
        };
        
        updateTimer();
        countdownInterval = setInterval(updateTimer, 1000);
        deleteTimerInterval = setTimeout(() => {
            if (autoDeleteEnabled && currentRoom) {
                deleteAllMessagesInRoom();
            }
        }, 3600000);
    }
    
    function resetDeleteTimer() {
        if (deleteTimerInterval) clearTimeout(deleteTimerInterval);
        if (countdownInterval) clearInterval(countdownInterval);
        if (autoDeleteEnabled) startDeleteTimer();
    }
    
    // ========== READ RECEIPTS & DISPLAY ==========
    async function markMessageAsSeen(messageId, senderId) {
        if (!currentUsername || senderId === currentUsername) return;
        const seenRef = ref(database, `rooms/${currentRoom}/messages/${messageId}/seenBy/${currentUsername}`);
        const existing = await get(seenRef);
        if (!existing.exists()) {
            await set(seenRef, { username: currentUsername, seenAtMs: Date.now() });
        }
    }
    
    function getReadReceiptHtml(message) {
        if (message.isSystem) return '';
        if (!message.seenBy) return '<span class="single-tick">✓</span>';
        const viewers = Object.keys(message.seenBy).filter(n => n !== message.sender);
        if (viewers.length === 0) return '<span class="single-tick">✓</span>';
        return '<span class="double-tick">✓✓</span>';
    }
    
    function showInfoPopup(messageId, messageData) {
        const modal = document.createElement('div');
        modal.className = 'modal';
        const seenEntries = messageData.seenBy ? Object.entries(messageData.seenBy) : [];
        let listHtml = '';
        const filtered = seenEntries.filter(([name]) => name !== messageData.sender);
        if (filtered.length === 0) {
            listHtml = '<li style="color:#6c7a89;">No one has seen this message yet</li>';
        } else {
            filtered.forEach(([username, details]) => {
                const time = details.seenAtMs ? new Date(details.seenAtMs).toLocaleString() : 'recently';
                listHtml += `<li><strong>${escapeHtml(username)}</strong> · ${time}</li>`;
            });
        }
        modal.innerHTML = `
            <div class="modal-content">
                <h2>🔍 Message Info</h2>
                <p style="color:#8db5e5;">"${escapeHtml(messageData.text || '')}"</p>
                <div><strong>👁️ Seen by:</strong></div>
                <ul class="seen-list">${listHtml}</ul>
                <button class="close-modal">Close</button>
            </div>
        `;
        document.body.appendChild(modal);
        modal.querySelector('.close-modal').onclick = () => modal.remove();
    }
    
    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }
    
    function displayMessage(message, messageId) {
        const container = document.getElementById("messagesContainer");
        if (!container) return;
        if (container.children.length === 1 && container.children[0].classList?.contains('loading')) container.innerHTML = '';
        
        const isOwn = (message.sender === currentUsername);
        const isSystem = message.isSystem === true || message.sender === "🐔 Hen's World";
        const msgDiv = document.createElement("div");
        msgDiv.className = `message ${isOwn ? 'own-message' : ''} ${isSystem ? 'system-message' : ''}`;
        
        let timeStr = "now";
        if (message.timestampMs) timeStr = new Date(message.timestampMs).toLocaleTimeString([], { hour: '2-digit', minute:'2-digit' });
        
        if (isSystem) {
            msgDiv.innerHTML = `<div class="message-text">✨ ${escapeHtml(message.text || '')}</div>`;
        } else {
            msgDiv.innerHTML = `
                <div class="message-header">
                    <span class="message-sender">${escapeHtml(message.sender)}</span>
                    <span class="message-time">${timeStr}</span>
                    <span class="read-status">${getReadReceiptHtml(message)}</span>
                    <span class="info-badge">ℹ️</span>
                </div>
                <div class="message-text">${escapeHtml(message.text || '')}</div>
            `;
        }
        
        container.appendChild(msgDiv);
        container.scrollTop = container.scrollHeight;
        
        if (!isSystem) {
            const textBubble = msgDiv.querySelector('.message-text');
            const infoIcon = msgDiv.querySelector('.info-badge');
            let pressTimer;
            const showInfo = () => showInfoPopup(messageId, message);
            textBubble.addEventListener('mousedown', () => pressTimer = setTimeout(showInfo, 500));
            textBubble.addEventListener('mouseup', () => clearTimeout(pressTimer));
            textBubble.addEventListener('mouseleave', () => clearTimeout(pressTimer));
            textBubble.addEventListener('touchstart', () => pressTimer = setTimeout(showInfo, 500));
            textBubble.addEventListener('touchend', () => clearTimeout(pressTimer));
            if (infoIcon) infoIcon.onclick = (e) => { e.stopPropagation(); showInfo(); };
            
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting && message.sender !== currentUsername) {
                        markMessageAsSeen(messageId, message.sender);
                        observer.disconnect();
                        setTimeout(() => updateReadReceiptUI(messageId), 500);
                    }
                });
            }, { threshold: 0.3 });
            observer.observe(msgDiv);
        }
        messageElementsMap.set(messageId, { div: msgDiv, message });
    }
    
    function updateReadReceiptUI(messageId) {
        const entry = messageElementsMap.get(messageId);
        if (!entry) return;
        get(ref(database, `rooms/${currentRoom}/messages/${messageId}`)).then(snap => {
            if (snap.exists()) {
                const fresh = snap.val();
                const receiptSpan = entry.div.querySelector('.read-status');
                if (receiptSpan && !fresh.isSystem) receiptSpan.innerHTML = getReadReceiptHtml(fresh);
            }
        });
    }
    
    async function addSystemMessage(text) {
        if (!currentRoom) return;
        await push(ref(database, `rooms/${currentRoom}/messages`), {
            sender: "🐔 Hen's World", text, timestamp: serverTimestamp(), timestampMs: Date.now(), isSystem: true
        });
    }
    
    function joinRoom(roomId) {
        if (!database) return false;
        const clean = roomId.trim().replace(/[.#$[\]]/g, '_');
        if (!clean) return false;
        currentRoom = clean;
        document.getElementById("currentRoomName").innerText = currentRoom;
        document.getElementById("messageInput").disabled = false;
        document.getElementById("sendBtn").disabled = false;
        document.getElementById("messagesContainer").innerHTML = '<div class="loading">🐔 loading...</div>';
        messageElementsMap.clear();
        
        resetDeleteTimer();
        
        messagesRef = ref(database, `rooms/${currentRoom}/messages`);
        const messagesQuery = query(messagesRef, limitToLast(200));
        onChildAdded(messagesQuery, (snapshot) => {
            const msg = snapshot.val();
            if (msg) displayMessage(msg, snapshot.key);
        });
        setTimeout(() => addSystemMessage(`${currentUsername} joined the room`), 300);
        return true;
    }
    
    async function sendMessage(text) {
        if (!text.trim() || !currentRoom) return;
        await push(ref(database, `rooms/${currentRoom}/messages`), {
            sender: currentUsername, text: text.trim(), timestamp: serverTimestamp(), timestampMs: Date.now(), seenBy: {}
        });
        document.getElementById("messageInput").value = "";
    }
    
    function setAutoDeleteMode(enabled) {
        autoDeleteEnabled = enabled;
        localStorage.setItem("autoDeletePref", enabled);
        document.getElementById("autoLabel").innerText = enabled ? "ON" : "OFF";
        if (enabled && currentRoom) {
            resetDeleteTimer();
            addSystemMessage("Auto-delete ENABLED: All messages will be deleted in 1 hour.");
        } else if (!enabled && currentRoom) {
            if (deleteTimerInterval) clearTimeout(deleteTimerInterval);
            if (countdownInterval) clearInterval(countdownInterval);
            document.getElementById("timerDisplay").innerHTML = "⏱️ OFF";
            addSystemMessage("Auto-delete DISABLED: Messages will persist.");
        }
    }
    
    function setupUI() {
        const roomInput = document.getElementById("roomInput");
        const joinBtn = document.getElementById("joinRoomBtn");
        const sendBtn = document.getElementById("sendBtn");
        const messageInput = document.getElementById("messageInput");
        const logoutBtn = document.getElementById("logoutBtn");
        const toggleCheck = document.getElementById("autoDeleteToggle");
        
        const saved = localStorage.getItem("autoDeletePref");
        if (saved !== null) autoDeleteEnabled = saved === "true";
        toggleCheck.checked = autoDeleteEnabled;
        document.getElementById("autoLabel").innerText = autoDeleteEnabled ? "ON" : "OFF";
        
        toggleCheck.onchange = (e) => setAutoDeleteMode(e.target.checked);
        joinBtn.onclick = () => joinRoom(roomInput.value.trim() || "henhouse-lounge");
        sendBtn.onclick = () => sendMessage(messageInput.value);
        messageInput.addEventListener("keydown", (e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(messageInput.value); } });
        logoutBtn.onclick = logout;
        roomInput.value = "henhouse-lounge";
        if (currentUsername && isFirebaseReady) setTimeout(() => joinRoom("henhouse-lounge"), 600);
    }
    
    async function init() {
        app = initializeApp(firebaseConfig);
        database = getDatabase(app);
        isFirebaseReady = true;
        document.getElementById("connectionStatus").innerHTML = "✅ Secure";
        await initAuth();
        setupUI();
    }
    
    init();
</script>
