<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Hen's World — Auto-Delete Timer + User Profile</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0c0f;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
            -webkit-touch-callout: none;
            user-select: none;
        }

        .app {
            max-width: 800px;
            width: 100%;
            height: 90vh;
            background: #111417;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid #2a2f36;
        }

        .header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid #1e2329;
            background: #0e1115;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .header-left {
            flex: 1;
        }

        .badge {
            font-size: 0.7rem;
            color: #6c7a89;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        h1 {
            font-size: 1.5rem;
            color: #eef2ff;
            font-weight: 600;
        }

        .sub {
            color: #6c86a3;
            font-size: 0.7rem;
        }

        .controls-group {
            display: flex;
            gap: 12px;
            align-items: center;
            background: #0b0e12;
            padding: 6px 14px;
            border-radius: 40px;
            border: 1px solid #252b33;
        }

        /* Proper ON/OFF Switch */
        .auto-delete-switch {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #07090e;
            padding: 4px;
            border-radius: 40px;
            border: 1px solid #2a2f36;
        }
        
        .switch-option {
            padding: 6px 14px;
            font-size: 0.7rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.2s;
            font-family: monospace;
            color: #8e9eae;
            background: transparent;
        }
        
        .switch-option.active {
            background: #2e7d64;
            color: white;
            box-shadow: 0 2px 8px rgba(46,125,100,0.3);
        }
        
        .switch-option.off.active {
            background: #7a5a5a;
            color: white;
        }

        .timer-badge {
            background: #1a1f2a;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-family: monospace;
            color: #fbbf24;
            border: 1px solid #3a4a5a;
            font-weight: bold;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #1a1f2a;
            padding: 4px 12px;
            border-radius: 40px;
            border: 1px solid #3a4a5a;
        }

        .user-avatar {
            font-size: 1rem;
        }

        .username-display {
            font-size: 0.75rem;
            font-weight: 600;
            color: #93c5fd;
            font-family: monospace;
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .logout-btn {
            background: #2d1f1f;
            border: 1px solid #8b3a3a;
            border-radius: 40px;
            padding: 6px 16px;
            color: #ffaaaa;
            font-family: monospace;
            font-size: 0.75rem;
            cursor: pointer;
            transition: 0.2s;
            font-weight: bold;
        }

        .logout-btn:hover {
            background: #4a2a2a;
            transform: scale(0.98);
        }

        .room-controls {
            padding: 0.8rem 1.5rem;
            background: #0b0e12;
            border-bottom: 1px solid #1a1f26;
        }

        .room-input-group {
            width: 100%;
        }

        .room-label {
            font-size: 0.7rem;
            color: #7e8c9e;
            margin-bottom: 4px;
        }

        .room-field {
            display: flex;
            background: #050709;
            border: 1px solid #252b33;
            border-radius: 40px;
            overflow: hidden;
        }

        .room-field input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 10px 16px;
            color: #dfe6f0;
            font-family: monospace;
            outline: none;
            font-size: 0.9rem;
        }

        .room-field button {
            background: #1e293b;
            border: none;
            padding: 0 20px;
            color: #b9d0f0;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        
        .room-field button:hover {
            background: #2e405b;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #0f1219;
            min-height: 0;
        }

        .message {
            display: flex;
            flex-direction: column;
            animation: fadeSlide 0.2s ease;
            position: relative;
        }

        .message-header {
            font-size: 0.7rem;
            color: #5f7f9e;
            margin-bottom: 4px;
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .message-sender {
            font-weight: 600;
            color: #8db5e5;
        }

        .message-time {
            font-size: 0.65rem;
            color: #4a5b72;
        }

        .message-text {
            background: #181e26;
            padding: 8px 14px;
            border-radius: 18px;
            border-top-left-radius: 4px;
            display: inline-block;
            max-width: 85%;
            word-wrap: break-word;
            color: #eef3ff;
            font-size: 0.9rem;
            border: 1px solid #282f39;
            position: relative;
            cursor: pointer;
            transition: background 0.1s;
        }

        .message-text:active {
            background: #2a2f3a;
        }

        .own-message {
            align-items: flex-end;
        }
        .own-message .message-text {
            background: #1e2a3a;
            border-color: #2f4b6e;
            border-top-right-radius: 4px;
            border-top-left-radius: 18px;
        }
        .own-message .message-header {
            justify-content: flex-end;
        }

        .system-message {
            align-items: center !important;
        }
        .system-message .message-text {
            background: transparent !important;
            border: none !important;
            color: #6c7a89 !important;
            font-size: 0.75rem !important;
            padding: 4px 12px !important;
            text-align: center;
            max-width: 90%;
        }
        .system-message .message-header {
            display: none;
        }

        .read-status {
            font-size: 0.7rem;
            margin-left: 6px;
            display: inline-flex;
            gap: 3px;
        }
        .double-tick {
            color: #34b7f1;
            font-weight: bold;
        }
        .single-tick {
            color: #8e9eae;
        }

        .input-area {
            padding: 1rem;
            background: #0b0e12;
            border-top: 1px solid #1a1f26;
        }

        .message-form {
            display: flex;
            gap: 12px;
        }

        .message-input-wrapper {
            flex: 1;
            background: #05070c;
            border: 1px solid #252b33;
            border-radius: 28px;
            padding: 6px 16px;
        }

        #messageInput {
            width: 100%;
            background: transparent;
            border: none;
            padding: 10px 0;
            color: #edf4ff;
            font-family: monospace;
            outline: none;
            resize: none;
            font-size: 0.9rem;
        }

        #sendBtn {
            background: #1f2a3c;
            border: none;
            border-radius: 40px;
            padding: 0 28px;
            color: #c0dcff;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        
        #sendBtn:hover {
            background: #2e405b;
            transform: scale(0.98);
        }

        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(6px);}
            to { opacity: 1; transform: translateY(0);}
        }

        /* Action Menu for Hold */
        .action-menu {
            position: fixed;
            background: #1e2329;
            border-radius: 12px;
            padding: 8px 0;
            min-width: 140px;
            z-index: 10001;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            border: 1px solid #3a4a5a;
            animation: fadeIn 0.1s ease;
        }
        
        .action-menu button {
            width: 100%;
            background: transparent;
            border: none;
            padding: 10px 16px;
            text-align: left;
            color: #eef3ff;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.1s;
            font-family: monospace;
        }
        
        .action-menu button:hover {
            background: #2e3a48;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s;
        }
        
        .modal-content {
            background: #111417;
            border-radius: 24px;
            padding: 30px;
            max-width: 450px;
            width: 90%;
            border: 1px solid #2a2f36;
            max-height: 85vh;
            overflow-y: auto;
        }
        
        .modal-content h2 {
            color: #eef2ff;
            margin-bottom: 10px;
            font-size: 1.5rem;
        }
        
        .modal-content p {
            color: #6c86a3;
            margin-bottom: 20px;
            font-size: 0.85rem;
        }
        
        .auth-input {
            width: 100%;
            background: #050709;
            border: 1px solid #252b33;
            border-radius: 40px;
            padding: 12px 18px;
            color: #dfe6f0;
            font-family: monospace;
            font-size: 1rem;
            margin-bottom: 15px;
            outline: none;
        }
        
        .auth-error {
            color: #ff8888;
            font-size: 0.75rem;
            margin-bottom: 15px;
            display: none;
        }
        
        .auth-buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 15px;
        }
        
        .auth-btn {
            flex: 1;
            padding: 10px;
            border-radius: 40px;
            border: none;
            font-family: monospace;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .auth-btn-primary {
            background: #1e293b;
            color: #b9d0f0;
            border: 1px solid #2f3a48;
        }
        
        .auth-btn-primary:hover {
            background: #2e405b;
        }
        
        .auth-btn-secondary {
            background: #2d1f1f;
            color: #ffaaaa;
            border: 1px solid #8b3a3a;
        }
        
        .auth-switch {
            text-align: center;
            font-size: 0.8rem;
            color: #6c86a3;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .auth-switch span {
            color: #93c5fd;
            text-decoration: underline;
        }
        
        .forgot-password {
            text-align: center;
            font-size: 0.7rem;
            color: #6c86a3;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .forgot-password span {
            color: #fbbf24;
            text-decoration: underline;
        }
        
        .security-note {
            background: #1a1f2a;
            border-left: 3px solid #fbbf24;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.7rem;
            color: #fbbf24;
        }
        
        .answer-error {
            font-size: 0.65rem;
            margin-top: -10px;
            margin-bottom: 10px;
            display: none;
            color: #ff8888;
        }
        
        .seen-list {
            list-style: none;
            padding: 0;
            margin: 12px 0;
            max-height: 300px;
            overflow-y: auto;
        }
        .seen-list li {
            padding: 10px 0;
            border-bottom: 1px solid #252b33;
            color: #b9d0f0;
            font-size: 0.85rem;
        }
        .close-modal {
            background: #2d3e5a;
            border: none;
            padding: 10px;
            border-radius: 40px;
            color: white;
            margin-top: 16px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }
        
        .loading {
            text-align: center;
            padding: 20px;
            color: #6c7a89;
        }
    </style>
</head>
<body>

<div class="app">
    <div class="header">
        <div class="header-left">
            <div class="badge">🐔 SECURE MESSENGER · HEN'S WORLD</div>
            <h1>Hen's World Chat</h1>
            <div class="sub">secure · private · worldwide</div>
        </div>
        <div class="controls-group">
            <div class="auto-delete-switch">
                <span id="switchOn" class="switch-option active">ON</span>
                <span id="switchOff" class="switch-option">OFF</span>
            </div>
            <div id="timerDisplay" class="timer-badge">⏱️ 1h:00m</div>
            <div class="user-info">
                <span class="user-avatar">🐔</span>
                <span id="userNameDisplay" class="username-display">Loading...</span>
            </div>
            <button id="logoutBtn" class="logout-btn">🚪 Logout</button>
        </div>
    </div>

    <div class="room-controls">
        <div class="room-input-group">
            <div class="room-label">🔗 ROOM IDENTIFIER</div>
            <div class="room-field">
                <input type="text" id="roomInput" placeholder="e.g., henhouse-lounge" autocomplete="off">
                <button id="joinRoomBtn">join</button>
            </div>
        </div>
    </div>

    <div class="messages-container" id="messagesContainer">
        <div class="loading">✨ Welcome to Hen's World! Join a room to start chatting...</div>
    </div>

    <div class="input-area">
        <div class="message-form">
            <div class="message-input-wrapper">
                <textarea id="messageInput" rows="1" placeholder="Type a message..." disabled></textarea>
            </div>
            <button id="sendBtn" disabled>➤ send</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded, query, limitToLast, serverTimestamp, get, set, update, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    
    const firebaseConfig = {
        apiKey: "AIzaSyDb0fuG5RUoTtNUuJ10n_A4NCC2GFDaOps",
        authDomain: "hen-s-world.firebaseapp.com",
        projectId: "hen-s-world",
        storageBucket: "hen-s-world.firebasestorage.app",
        messagingSenderId: "359865594843",
        appId: "1:359865594843:web:3da81e9f7c00bba183adfe"
    };
    
    let app, database;
    let messagesRef = null;
    let currentRoom = null;
    let currentUsername = null;
    let isFirebaseReady = false;
    let autoDeleteEnabled = true;
    let messageElementsMap = new Map();
    let deleteTimerTimeout = null;
    let countdownInterval = null;
    let roomDeleteDeadline = null;
    
    // Security Questions
    const securityQuestions = [
        "What is your mother's maiden name?",
        "What was the name of your first pet?",
        "What was your childhood nickname?",
        "What is your favorite teacher's name?",
        "What is your best friend's first name?",
        "What was the name of your first school?",
        "What is your father's middle name?",
        "What city were you born in?"
    ];
    
    function cleanAnswer(answer) {
        if (!answer) return "";
        return answer.toUpperCase().replace(/[^A-Z0-9]/g, '');
    }
    
    function simpleHash(str) {
        let hash = 0;
        for (let i = 0; i < str.length; i++) {
            hash = ((hash << 5) - hash) + str.charCodeAt(i);
            hash |= 0;
        }
        return hash.toString(16);
    }
    
    // ========== SECURITY QUESTIONS MODAL ==========
    function showSecurityQuestionsModal(username) {
        return new Promise((resolve) => {
            const shuffled = [...securityQuestions];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            const selectedQuestions = shuffled.slice(0, 3);
            
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `
                <div class="modal-content">
                    <h2>🔐 Security Questions</h2>
                    <div class="security-note">
                        ⚠️ <strong>IMPORTANT:</strong> Use ONLY letters (A-Z) and numbers (0-9). NO spaces.<br>
                        Answers stored in CAPITAL LETTERS.
                    </div>
                    <p>Please answer these 3 security questions:</p>
                    <div id="questionsContainer"></div>
                    <div id="securityError" class="auth-error"></div>
                    <button id="securitySubmitBtn" class="auth-btn auth-btn-primary">Submit</button>
                </div>
            `;
            document.body.appendChild(modal);
            
            const container = modal.querySelector('#questionsContainer');
            const errorDiv = modal.querySelector('#securityError');
            const submitBtn = modal.querySelector('#securitySubmitBtn');
            const answers = {};
            
            selectedQuestions.forEach((question, index) => {
                const div = document.createElement('div');
                div.style.marginBottom = '15px';
                div.innerHTML = `
                    <label style="color: #8db5e5; font-size: 0.75rem; display: block; margin-bottom: 5px;">${index + 1}. ${question}</label>
                    <input type="text" id="answer_${index}" class="auth-input" placeholder="Your answer (A-Z, 0-9 only)">
                    <div id="error_${index}" class="answer-error"></div>
                `;
                container.appendChild(div);
                answers[question] = div.querySelector(`#answer_${index}`);
                const errorEl = div.querySelector(`#error_${index}`);
                const input = answers[question];
                input.addEventListener('input', function() {
                    if (/\s/.test(this.value)) errorEl.innerHTML = '❌ SPACES NOT ALLOWED!';
                    else if (/[^A-Za-z0-9]/.test(this.value)) errorEl.innerHTML = '❌ Only letters and numbers!';
                    else errorEl.style.display = 'none';
                });
            });
            
            submitBtn.onclick = () => {
                const securityAnswers = {};
                let valid = true;
                for (let i = 0; i < selectedQuestions.length; i++) {
                    const question = selectedQuestions[i];
                    const answer = answers[question].value;
                    const errorEl = document.getElementById(`error_${i}`);
                    if (!answer || answer.trim().length === 0) {
                        errorEl.style.display = 'block';
                        errorEl.innerHTML = '❌ Required!';
                        valid = false;
                    } else if (/\s/.test(answer)) {
                        errorEl.style.display = 'block';
                        errorEl.innerHTML = '❌ No spaces!';
                        valid = false;
                    } else if (/[^A-Za-z0-9]/.test(answer)) {
                        errorEl.style.display = 'block';
                        errorEl.innerHTML = '❌ Letters/numbers only!';
                        valid = false;
                    } else {
                        securityAnswers[question] = cleanAnswer(answer);
                    }
                }
                if (valid) { modal.remove(); resolve(securityAnswers); }
                else errorDiv.style.display = 'block';
            };
        });
    }
    
    // ========== FORGOT PASSWORD ==========
    async function showForgotPasswordModal() {
        return new Promise((resolve) => {
            let step = 1;
            let username = '';
            let userQuestions = {};
            
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `
                <div class="modal-content">
                    <h2 id="forgotTitle">🔐 Reset Password</h2>
                    <div id="forgotBody"></div>
                    <div id="forgotError" class="auth-error"></div>
                    <div class="auth-buttons">
                        <button id="forgotBackBtn" class="auth-btn auth-btn-secondary">Back</button>
                        <button id="forgotNextBtn" class="auth-btn auth-btn-primary">Next</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            
            const titleEl = modal.querySelector('#forgotTitle');
            const bodyEl = modal.querySelector('#forgotBody');
            const errorDiv = modal.querySelector('#forgotError');
            const backBtn = modal.querySelector('#forgotBackBtn');
            const nextBtn = modal.querySelector('#forgotNextBtn');
            
            async function loadStep() {
                errorDiv.style.display = 'none';
                if (step === 1) {
                    titleEl.innerHTML = '🔐 Enter Username';
                    bodyEl.innerHTML = `<input type="text" id="resetUsername" class="auth-input" placeholder="Username">`;
                    setTimeout(() => document.getElementById('resetUsername')?.focus(), 100);
                } else if (step === 2) {
                    const usernameInput = document.getElementById('resetUsername');
                    username = usernameInput?.value.trim();
                    if (!username) { step = 1; loadStep(); return; }
                    const userRef = ref(database, `users/${username}`);
                    const snapshot = await get(userRef);
                    if (!snapshot.exists()) {
                        errorDiv.style.display = 'block';
                        errorDiv.innerHTML = '❌ Username not found!';
                        step = 1; loadStep(); return;
                    }
                    const userData = snapshot.val();
                    if (!userData.securityQuestions) {
                        errorDiv.innerHTML = '❌ No security questions found';
                        step = 1; loadStep(); return;
                    }
                    userQuestions = userData.securityQuestions;
                    const questions = Object.keys(userQuestions);
                    let html = `<p>Answer security questions:</p><div class="security-note">⚠️ Letters/numbers only, no spaces.</div>`;
                    questions.forEach((q, idx) => {
                        html += `<div style="margin-bottom:15px;"><label style="color:#8db5e5;">${idx+1}. ${q}</label>
                                <input type="text" id="secAns_${idx}" class="auth-input">
                                <div id="secErr_${idx}" class="answer-error"></div></div>`;
                    });
                    bodyEl.innerHTML = html;
                    setTimeout(() => document.getElementById('secAns_0')?.focus(), 100);
                } else if (step === 3) {
                    const questions = Object.keys(userQuestions);
                    let allCorrect = true;
                    for (let i = 0; i < questions.length; i++) {
                        const answer = document.getElementById(`secAns_${i}`)?.value;
                        const errorEl = document.getElementById(`secErr_${i}`);
                        if (!answer || cleanAnswer(answer) !== userQuestions[questions[i]]) {
                            if (errorEl) { errorEl.style.display = 'block'; errorEl.innerHTML = '❌ Incorrect!'; }
                            allCorrect = false;
                        }
                    }
                    if (!allCorrect) {
                        errorDiv.style.display = 'block';
                        errorDiv.innerHTML = '❌ Incorrect answers. Try again.';
                        step = 2; loadStep(); return;
                    }
                    titleEl.innerHTML = '🔐 New Password';
                    bodyEl.innerHTML = `<input type="password" id="newPass" class="auth-input" placeholder="New Password (min 3)">
                                        <input type="password" id="confirmPass" class="auth-input" placeholder="Confirm">`;
                    setTimeout(() => document.getElementById('newPass')?.focus(), 100);
                }
            }
            
            backBtn.onclick = () => { if (step > 1) { step--; loadStep(); } else modal.remove(); };
            nextBtn.onclick = async () => {
                if (step === 1) { step++; loadStep(); }
                else if (step === 2) { step++; loadStep(); }
                else if (step === 3) {
                    const newPass = document.getElementById('newPass')?.value;
                    const confirm = document.getElementById('confirmPass')?.value;
                    if (!newPass || newPass.length < 3) {
                        errorDiv.style.display = 'block';
                        errorDiv.innerHTML = '❌ Password min 3 chars';
                        return;
                    }
                    if (newPass !== confirm) {
                        errorDiv.style.display = 'block';
                        errorDiv.innerHTML = '❌ Passwords do not match';
                        return;
                    }
                    await update(ref(database, `users/${username}`), { password: simpleHash(newPass), resetAt: Date.now() });
                    errorDiv.style.display = 'block';
                    errorDiv.innerHTML = '✅ Password reset! You can now login.';
                    errorDiv.style.color = '#10b981';
                    setTimeout(() => { modal.remove(); resolve(true); }, 1500);
                }
            };
            loadStep();
        });
    }
    
    // ========== AUTH ==========
    async function registerUser(username, password, securityAnswers) {
        const userRef = ref(database, `users/${username}`);
        if ((await get(userRef)).exists()) return false;
        await set(userRef, { username, password: simpleHash(password), securityQuestions: securityAnswers, createdAt: Date.now() });
        return true;
    }
    
    async function loginUser(username, password) {
        const snap = await get(ref(database, `users/${username}`));
        if (!snap.exists()) return false;
        return snap.val().password === simpleHash(password);
    }
    
    function showAuthModal() {
        return new Promise((resolve) => {
            let isLogin = true;
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `
                <div class="modal-content">
                    <h2 id="authTitle">🐔 Login</h2>
                    <input type="text" id="authUser" class="auth-input" placeholder="Username">
                    <input type="password" id="authPass" class="auth-input" placeholder="Password">
                    <div id="authError" class="auth-error"></div>
                    <button id="authBtn" class="auth-btn auth-btn-primary">Login</button>
                    <div class="auth-switch" id="switchMode">No account? <span>Register</span></div>
                    <div class="forgot-password" id="forgotBtn">🔑 Forgot? <span>Reset</span></div>
                </div>
            `;
            document.body.appendChild(modal);
            const userInp = modal.querySelector('#authUser');
            const passInp = modal.querySelector('#authPass');
            const errDiv = modal.querySelector('#authError');
            const authBtn = modal.querySelector('#authBtn');
            const switchDiv = modal.querySelector('#switchMode');
            const forgotBtn = modal.querySelector('#forgotBtn');
            const title = modal.querySelector('#authTitle');
            
            const update = () => {
                if (isLogin) { title.innerHTML = '🐔 Login'; authBtn.innerHTML = 'Login'; switchDiv.innerHTML = 'No account? <span>Register</span>'; forgotBtn.style.display = 'block'; }
                else { title.innerHTML = '📝 Register'; authBtn.innerHTML = 'Register'; switchDiv.innerHTML = 'Have account? <span>Login</span>'; forgotBtn.style.display = 'none'; }
            };
            switchDiv.onclick = () => { isLogin = !isLogin; update(); };
            forgotBtn.onclick = async () => { modal.remove(); await showForgotPasswordModal(); showAuthModal().then(resolve); };
            
            authBtn.onclick = async () => {
                const user = userInp.value.trim();
                const pass = passInp.value;
                if (user.length < 3 || pass.length < 3) { errDiv.innerHTML = '❌ Min 3 chars'; errDiv.style.display = 'block'; return; }
                if (isLogin) {
                    if (await loginUser(user, pass)) { modal.remove(); resolve(user); }
                    else { errDiv.innerHTML = '❌ Invalid'; errDiv.style.display = 'block'; }
                } else {
                    const secAnswers = await showSecurityQuestionsModal(user);
                    if (await registerUser(user, pass, secAnswers)) { modal.remove(); resolve(user); }
                    else { errDiv.innerHTML = '❌ Username taken'; errDiv.style.display = 'block'; }
                }
            };
        });
    }
    
    async function initAuth() {
        const saved = localStorage.getItem("hensworld_user");
        if (saved && (await get(ref(database, `users/${saved}`))).exists()) {
            currentUsername = saved;
            document.getElementById("userNameDisplay").innerText = currentUsername;
            return saved;
        }
        const user = await showAuthModal();
        if (user) { 
            localStorage.setItem("hensworld_user", user); 
            currentUsername = user;
            document.getElementById("userNameDisplay").innerText = currentUsername;
            return user;
        }
        return null;
    }
    
    async function logout() { localStorage.removeItem("hensworld_user"); location.reload(); }
    
    // ========== PERSISTENT AUTO-DELETE ==========
    async function deleteAllMessagesInRoom() {
        if (!currentRoom) return;
        const roomRef = ref(database, `rooms/${currentRoom}/messages`);
        const snapshot = await get(roomRef);
        if (snapshot.exists()) {
            for (let msgId in snapshot.val()) {
                await remove(ref(database, `rooms/${currentRoom}/messages/${msgId}`));
            }
            addSystemMessage("⏰ Auto-delete completed: All messages have been deleted.");
        }
    }
    
    function startDeleteTimer() {
        if (deleteTimerTimeout) clearTimeout(deleteTimerTimeout);
        if (countdownInterval) clearInterval(countdownInterval);
        
        if (!autoDeleteEnabled || !currentRoom) {
            document.getElementById("timerDisplay").innerHTML = "⏱️ OFF";
            return;
        }
        
        let deadline = localStorage.getItem(`delete_deadline_${currentRoom}`);
        if (deadline) {
            roomDeleteDeadline = parseInt(deadline);
        } else {
            roomDeleteDeadline = Date.now() + 3600000;
            localStorage.setItem(`delete_deadline_${currentRoom}`, roomDeleteDeadline);
        }
        
        const now = Date.now();
        const remaining = Math.max(0, roomDeleteDeadline - now);
        
        if (remaining <= 0) {
            deleteAllMessagesInRoom();
            localStorage.removeItem(`delete_deadline_${currentRoom}`);
            roomDeleteDeadline = null;
            document.getElementById("timerDisplay").innerHTML = "⏱️ Expired";
            return;
        }
        
        deleteTimerTimeout = setTimeout(async () => {
            if (autoDeleteEnabled && currentRoom) {
                await deleteAllMessagesInRoom();
                localStorage.removeItem(`delete_deadline_${currentRoom}`);
                roomDeleteDeadline = null;
            }
        }, remaining);
        
        const updateDisplay = () => {
            if (!autoDeleteEnabled || !roomDeleteDeadline) {
                if (countdownInterval) clearInterval(countdownInterval);
                return;
            }
            const rem = Math.max(0, roomDeleteDeadline - Date.now());
            if (rem <= 0) {
                document.getElementById("timerDisplay").innerHTML = "⏱️ Expired";
                if (countdownInterval) clearInterval(countdownInterval);
                return;
            }
            const minutes = Math.floor(rem / 60000);
            const seconds = Math.floor((rem % 60000) / 1000);
            document.getElementById("timerDisplay").innerHTML = `⏱️ ${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')}`;
        };
        updateDisplay();
        countdownInterval = setInterval(updateDisplay, 1000);
    }
    
    // ========== READ RECEIPTS & INFO ==========
    async function markMessageAsSeen(messageId, senderId) {
        if (!currentUsername || senderId === currentUsername) return;
        const seenRef = ref(database, `rooms/${currentRoom}/messages/${messageId}/seenBy/${currentUsername}`);
        if (!(await get(seenRef)).exists()) {
            await set(seenRef, { username: currentUsername, seenAtMs: Date.now() });
        }
    }
    
    function getReadReceiptHtml(message) {
        if (message.isSystem) return '';
        if (!message.seenBy) return '<span class="single-tick">✓</span>';
        const viewers = Object.keys(message.seenBy).filter(n => n !== message.sender);
        return viewers.length === 0 ? '<span class="single-tick">✓</span>' : '<span class="double-tick">✓✓</span>';
    }
    
    function showInfoPopup(messageId, messageData) {
        const modal = document.createElement('div');
        modal.className = 'modal';
        const seenEntries = messageData.seenBy ? Object.entries(messageData.seenBy) : [];
        const filtered = seenEntries.filter(([name]) => name !== messageData.sender);
        let listHtml = filtered.length === 0 ? '<li>No one has seen this message yet</li>' : 
            filtered.map(([name, details]) => `<li><strong>${escapeHtml(name)}</strong> · ${new Date(details.seenAtMs).toLocaleString()}</li>`).join('');
        modal.innerHTML = `
            <div class="modal-content">
                <h2>🔍 Message Info</h2>
                <p>"${escapeHtml(messageData.text || '')}"</p>
                <div><strong>👁️ Seen by:</strong></div>
                <ul class="seen-list">${listHtml}</ul>
                <button class="close-modal">Close</button>
            </div>
        `;
        document.body.appendChild(modal);
        modal.querySelector('.close-modal').onclick = () => modal.remove();
    }
    
    function escapeHtml(str) { return str?.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])) || ''; }
    
    let activeMenu = null;
    function showMessageActionMenu(event, messageId, messageData) {
        if (activeMenu) activeMenu.remove();
        const menu = document.createElement('div');
        menu.className = 'action-menu';
        menu.innerHTML = `<button id="infoActionBtn">ℹ️ Message Info</button>`;
        menu.style.left = `${event.clientX}px`;
        menu.style.top = `${event.clientY}px`;
        document.body.appendChild(menu);
        activeMenu = menu;
        
        const infoBtn = menu.querySelector('#infoActionBtn');
        infoBtn.onclick = () => {
            menu.remove();
            activeMenu = null;
            showInfoPopup(messageId, messageData);
        };
        
        const removeMenu = () => { if (menu && menu.parentNode) menu.remove(); activeMenu = null; };
        setTimeout(() => document.addEventListener('click', removeMenu, { once: true }), 10);
    }
    
    function displayMessage(message, messageId) {
        const container = document.getElementById("messagesContainer");
        if (!container) return;
        if (container.children.length === 1 && container.children[0].classList?.contains('loading')) container.innerHTML = '';
        
        const isOwn = (message.sender === currentUsername);
        const isSystem = message.isSystem === true || message.sender === "🐔 Hen's World";
        const msgDiv = document.createElement("div");
        msgDiv.className = `message ${isOwn ? 'own-message' : ''} ${isSystem ? 'system-message' : ''}`;
        
        let timeStr = message.timestampMs ? new Date(message.timestampMs).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' }) : 'now';
        
        if (isSystem) {
            msgDiv.innerHTML = `<div class="message-text">✨ ${escapeHtml(message.text)}</div>`;
        } else {
            msgDiv.innerHTML = `
                <div class="message-header">
                    <span class="message-sender">${escapeHtml(message.sender)}</span>
                    <span class="message-time">${timeStr}</span>
                    <span class="read-status">${getReadReceiptHtml(message)}</span>
                </div>
                <div class="message-text">${escapeHtml(message.text)}</div>
            `;
        }
        
        container.appendChild(msgDiv);
        container.scrollTop = container.scrollHeight;
        
        if (!isSystem) {
            const textBubble = msgDiv.querySelector('.message-text');
            let pressTimer;
            
            const startHold = (e) => {
                pressTimer = setTimeout(() => {
                    showMessageActionMenu(e, messageId, message);
                }, 500);
                e.preventDefault();
            };
            const cancelHold = () => { if (pressTimer) clearTimeout(pressTimer); };
            
            textBubble.addEventListener('mousedown', startHold);
            textBubble.addEventListener('mouseup', cancelHold);
            textBubble.addEventListener('mouseleave', cancelHold);
            textBubble.addEventListener('touchstart', startHold);
            textBubble.addEventListener('touchend', cancelHold);
            textBubble.addEventListener('touchcancel', cancelHold);
            
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting && message.sender !== currentUsername) {
                        markMessageAsSeen(messageId, message.sender);
                        observer.disconnect();
                        setTimeout(() => updateReadReceiptUI(messageId), 300);
                    }
                });
            }, { threshold: 0.3 });
            observer.observe(msgDiv);
        }
        messageElementsMap.set(messageId, { div: msgDiv, message });
    }
    
    function updateReadReceiptUI(messageId) {
        const entry = messageElementsMap.get(messageId);
        if (!entry) return;
        get(ref(database, `rooms/${currentRoom}/messages/${messageId}`)).then(snap => {
            if (snap.exists()) {
                const fresh = snap.val();
                const receiptSpan = entry.div.querySelector('.read-status');
                if (receiptSpan && !fresh.isSystem) receiptSpan.innerHTML = getReadReceiptHtml(fresh);
            }
        });
    }
    
    async function addSystemMessage(text) {
        if (!currentRoom) return;
        await push(ref(database, `rooms/${currentRoom}/messages`), {
            sender: "🐔 Hen's World", text, timestamp: serverTimestamp(), timestampMs: Date.now(), isSystem: true
        });
    }
    
    function joinRoom(roomId) {
        if (!database) return false;
        const clean = roomId.trim().replace(/[.#$[\]]/g, '_');
        if (!clean) return false;
        currentRoom = clean;
        document.getElementById("messageInput").disabled = false;
        document.getElementById("sendBtn").disabled = false;
        document.getElementById("messagesContainer").innerHTML = '<div class="loading">🐔 Loading...</div>';
        messageElementsMap.clear();
        
        if (deleteTimerTimeout) clearTimeout(deleteTimerTimeout);
        if (countdownInterval) clearInterval(countdownInterval);
        startDeleteTimer();
        
        messagesRef = ref(database, `rooms/${currentRoom}/messages`);
        const messagesQuery = query(messagesRef, limitToLast(200));
        onChildAdded(messagesQuery, (snapshot) => {
            const msg = snapshot.val();
            if (msg) displayMessage(msg, snapshot.key);
        });
        setTimeout(() => addSystemMessage(`${currentUsername} joined the room`), 300);
        return true;
    }
    
    async function sendMessage(text) {
        if (!text.trim() || !currentRoom) return;
        await push(ref(database, `rooms/${currentRoom}/messages`), {
            sender: currentUsername, text: text.trim(), timestamp: serverTimestamp(), timestampMs: Date.now(), seenBy: {}
        });
        document.getElementById("messageInput").value = "";
    }
    
    function setAutoDeleteMode(enabled) {
        autoDeleteEnabled = enabled;
        localStorage.setItem("autoDeletePref", enabled);
        
        // Update switch UI
        const onBtn = document.getElementById("switchOn");
        const offBtn = document.getElementById("switchOff");
        if (enabled) {
            onBtn.classList.add("active");
            offBtn.classList.remove("active");
        } else {
            offBtn.classList.add("active");
            onBtn.classList.remove("active");
        }
        
        if (enabled && currentRoom) {
            startDeleteTimer();
            addSystemMessage("AUTO DELETE MSG ENABLED: All messages will be deleted in 1 hour.");
        } else if (!enabled && currentRoom) {
            if (deleteTimerTimeout) clearTimeout(deleteTimerTimeout);
            if (countdownInterval) clearInterval(countdownInterval);
            localStorage.removeItem(`delete_deadline_${currentRoom}`);
            document.getElementById("timerDisplay").innerHTML = "⏱️ OFF";
            addSystemMessage("AUTO DELETE MSG DISABLED: Messages will persist.");
        } else if (!enabled) {
            document.getElementById("timerDisplay").innerHTML = "⏱️ OFF";
        }
    }
    
    function setupUI() {
        const roomInput = document.getElementById("roomInput");
        const joinBtn = document.getElementById("joinRoomBtn");
        const sendBtn = document.getElementById("sendBtn");
        const messageInput = document.getElementById("messageInput");
        const logoutBtn = document.getElementById("logoutBtn");
        const switchOn = document.getElementById("switchOn");
        const switchOff = document.getElementById("switchOff");
        
        const savedPref = localStorage.getItem("autoDeletePref");
        autoDeleteEnabled = savedPref !== null ? savedPref === "true" : true;
        
        // Initialize switch UI
        if (autoDeleteEnabled) {
            switchOn.classList.add("active");
            switchOff.classList.remove("active");
        } else {
            switchOff.classList.add("active");
            switchOn.classList.remove("active");
        }
        
        switchOn.onclick = () => setAutoDeleteMode(true);
        switchOff.onclick = () => setAutoDeleteMode(false);
        
        joinBtn.onclick = () => joinRoom(roomInput.value.trim() || "henhouse-lounge");
        sendBtn.onclick = () => sendMessage(messageInput.value);
        messageInput.addEventListener("keydown", (e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(messageInput.value); } });
        logoutBtn.onclick = logout;
        roomInput.value = "henhouse-lounge";
        if (currentUsername && isFirebaseReady) setTimeout(() => joinRoom("henhouse-lounge"), 600);
    }
    
    async function init() {
        app = initializeApp(firebaseConfig);
        database = getDatabase(app);
        isFirebaseReady = true;
        await initAuth();
        setupUI();
    }
    
    init();
</script>
