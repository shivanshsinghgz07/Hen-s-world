<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Hen's World — Secure Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0c0f;
            font-family: 'SF Mono', 'Fira Code', 'Courier New', monospace;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        .app {
            max-width: 800px;
            width: 100%;
            height: 90vh;
            background: #111417;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid #2a2f36;
        }

        .header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid #1e2329;
            background: #0e1115;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left {
            flex: 1;
        }

        .badge {
            font-size: 0.7rem;
            letter-spacing: 1px;
            color: #6c7a89;
            text-transform: uppercase;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        h1 {
            font-size: 1.7rem;
            font-weight: 500;
            color: #eef2ff;
            letter-spacing: -0.5px;
        }

        .sub {
            color: #6c86a3;
            font-size: 0.8rem;
            margin-top: 6px;
        }

        .logout-btn {
            background: #2d1f1f;
            border: 1px solid #8b3a3a;
            border-radius: 40px;
            padding: 8px 18px;
            color: #ffaaaa;
            font-family: monospace;
            font-size: 0.8rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .logout-btn:hover {
            background: #4a2a2a;
            color: #ffcccc;
        }

        /* User bar - ONLINE BUTTON REMOVED */
        .user-bar {
            background: #0b0e12;
            border-bottom: 1px solid #1a1f26;
            padding: 6px 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            color: #93c5fd;
        }
        .username-display {
            font-weight: bold;
            color: #8db5e5;
        }
        .user-bar-buttons {
            display: flex;
            gap: 8px;
        }
        .auto-delete-select {
            background: #1e293b;
            border: 1px solid #2f3a48;
            border-radius: 40px;
            padding: 4px 10px;
            font-size: 0.7rem;
            cursor: pointer;
            color: #b9d0f0;
            font-family: monospace;
        }

        .room-controls {
            padding: 1rem 1.5rem;
            background: #0b0e12;
            border-bottom: 1px solid #1a1f26;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            justify-content: space-between;
        }

        .room-input-group {
            flex: 3;
            min-width: 180px;
        }

        .room-label {
            font-size: 0.7rem;
            color: #7e8c9e;
            text-transform: uppercase;
            margin-bottom: 4px;
            letter-spacing: 0.5px;
        }

        .room-field {
            display: flex;
            background: #050709;
            border: 1px solid #252b33;
            border-radius: 40px;
            overflow: hidden;
            transition: 0.2s;
        }
        .room-field:focus-within {
            border-color: #3e6b9e;
            box-shadow: 0 0 0 1px #1e3a5f;
        }

        .room-field input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 10px 16px;
            color: #dfe6f0;
            font-family: monospace;
            font-size: 0.9rem;
            outline: none;
        }

        .room-field button {
            background: #1e293b;
            border: none;
            border-left: 1px solid #2d3540;
            padding: 0 20px;
            color: #b9d0f0;
            font-weight: bold;
            font-family: monospace;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.8rem;
        }
        .room-field button:hover {
            background: #2d3e5a;
            color: white;
        }

        .room-status {
            flex: 2;
            text-align: right;
            font-size: 0.85rem;
            background: #07090e;
            padding: 8px 16px;
            border-radius: 40px;
            border: 1px solid #20262e;
        }

        .room-name-badge {
            color: #93c5fd;
            font-weight: 600;
            word-break: break-all;
        }

        .connection-status {
            font-size: 0.7rem;
            margin-top: 4px;
            color: #5f7d9c;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 1.2rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #0f1219;
            scroll-behavior: smooth;
        }

        .message {
            display: flex;
            flex-direction: column;
            animation: fadeSlide 0.2s ease;
            position: relative;
        }
        .message-content {
            display: flex;
            align-items: flex-end;
            gap: 6px;
        }
        .message-bubble {
            background: #181e26;
            padding: 8px 14px;
            border-radius: 18px;
            border-top-left-radius: 4px;
            max-width: 85%;
            word-wrap: break-word;
            word-break: break-word;
            color: #eef3ff;
            font-size: 0.95rem;
            font-weight: 500;
            line-height: 1.4;
            border: 1px solid #282f39;
            position: relative;
        }
        .own-message {
            align-items: flex-end;
        }
        .own-message .message-bubble {
            background: #1e2a3a;
            border-color: #2f4b6e;
            border-top-right-radius: 4px;
            border-top-left-radius: 18px;
        }
        .own-message .message-content {
            justify-content: flex-end;
        }
        .message-header {
            font-size: 0.7rem;
            color: #5f7f9e;
            margin-bottom: 4px;
            display: flex;
            gap: 8px;
        }
        .message-sender {
            font-weight: 600;
            color: #8db5e5;
        }
        .message-time {
            font-size: 0.65rem;
            color: #4a5b72;
        }
        .message-status {
            font-size: 0.7rem;
            margin-left: 3px;
        }
        .message-actions {
            position: absolute;
            right: 0;
            top: -18px;
            background: #1a1f2a;
            border-radius: 16px;
            padding: 2px 8px;
            display: none;
            gap: 8px;
            z-index: 10;
        }
        .message:hover .message-actions {
            display: flex;
        }
        .action-btn {
            background: none;
            border: none;
            color: #93c5fd;
            cursor: pointer;
            font-size: 0.7rem;
            padding: 2px 5px;
        }

        .system-message {
            align-items: center !important;
        }
        .system-message .message-content {
            justify-content: center !important;
        }
        .system-message .message-bubble {
            background: #2a2f3a;
            border: 1px solid #4a5b72;
            color: #a0b4d0;
            font-style: italic;
            font-size: 0.75rem;
            text-align: center;
            border-radius: 20px;
            padding: 5px 18px;
            max-width: 80%;
        }
        .system-message .message-header {
            display: none;
        }

        .message-bubble::after {
            content: "🔒";
            position: absolute;
            bottom: 2px;
            right: 5px;
            font-size: 8px;
            color: rgba(255,255,255,0.15);
            pointer-events: none;
        }

        .input-area {
            padding: 1rem 1.5rem 1.3rem;
            background: #0b0e12;
            border-top: 1px solid #1a1f26;
        }

        .message-form {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .message-input-wrapper {
            flex: 1;
            background: #05070c;
            border: 1px solid #252b33;
            border-radius: 28px;
            padding: 6px 16px;
            transition: 0.2s;
        }
        .message-input-wrapper:focus-within {
            border-color: #3e6b9e;
        }

        #messageInput {
            width: 100%;
            background: transparent;
            border: none;
            padding: 10px 0;
            color: #edf4ff;
            font-family: monospace;
            font-size: 0.9rem;
            outline: none;
            resize: none;
        }

        #sendBtn {
            background: #1f2a3c;
            border: none;
            border-radius: 40px;
            padding: 10px 24px;
            color: #c0dcff;
            font-weight: bold;
            font-family: monospace;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.8rem;
            border: 1px solid #2f3a48;
        }
        #sendBtn:hover {
            background: #2e405b;
            color: white;
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .messages-container::-webkit-scrollbar {
            width: 6px;
        }
        .messages-container::-webkit-scrollbar-track {
            background: #0a0d12;
        }
        .messages-container::-webkit-scrollbar-thumb {
            background: #2e3a48;
            border-radius: 8px;
        }

        @media (max-width: 550px) {
            .app {
                height: 95vh;
                border-radius: 20px;
            }
            .room-controls {
                flex-direction: column;
                align-items: stretch;
            }
            .room-status {
                text-align: center;
            }
            .message-bubble {
                max-width: 95%;
            }
            .logout-btn {
                padding: 6px 12px;
                font-size: 0.7rem;
            }
            h1 {
                font-size: 1.3rem;
            }
            .user-bar {
                padding: 5px 1rem;
            }
            .user-bar-buttons {
                gap: 5px;
            }
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #6c7a89;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s;
            overflow-y: auto;
        }
        
        .modal-content {
            background: #111417;
            border-radius: 24px;
            padding: 30px;
            max-width: 450px;
            width: 90%;
            border: 1px solid #2a2f36;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .modal-content h2 {
            color: #eef2ff;
            margin-bottom: 10px;
            font-size: 1.5rem;
        }
        
        .modal-content p {
            color: #6c86a3;
            margin-bottom: 20px;
            font-size: 0.85rem;
        }
        
        .auth-input {
            width: 100%;
            background: #050709;
            border: 1px solid #252b33;
            border-radius: 40px;
            padding: 12px 18px;
            color: #dfe6f0;
            font-family: monospace;
            font-size: 1rem;
            margin-bottom: 15px;
            outline: none;
        }
        
        .auth-input:focus {
            border-color: #3e6b9e;
        }
        
        .auth-error {
            color: #ff8888;
            font-size: 0.75rem;
            margin-bottom: 15px;
            display: none;
        }
        
        .auth-buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 15px;
        }
        
        .auth-btn {
            flex: 1;
            padding: 10px;
            border-radius: 40px;
            border: none;
            font-family: monospace;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .auth-btn-primary {
            background: #1e293b;
            color: #b9d0f0;
            border: 1px solid #2f3a48;
        }
        
        .auth-btn-primary:hover {
            background: #2e405b;
            color: white;
        }
        
        .auth-btn-secondary {
            background: #2d1f1f;
            color: #ffaaaa;
            border: 1px solid #8b3a3a;
        }
        
        .auth-switch {
            text-align: center;
            font-size: 0.8rem;
            color: #6c86a3;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .auth-switch span {
            color: #93c5fd;
            text-decoration: underline;
        }
        
        .forgot-password {
            text-align: center;
            font-size: 0.7rem;
            color: #6c86a3;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .forgot-password span {
            color: #fbbf24;
            text-decoration: underline;
        }
        
        .security-note {
            background: #1a1f2a;
            border-left: 3px solid #fbbf24;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.7rem;
            color: #fbbf24;
        }
        
        .security-note strong {
            color: #ffaa44;
        }
        
        .answer-error {
            font-size: 0.65rem;
            margin-top: -10px;
            margin-bottom: 10px;
            display: none;
        }
        
        .screenshot-detected {
            filter: blur(10px);
            transition: filter 0.3s;
        }
        
        .info-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #1a1f2e;
            border: 1px solid #3e6b9e;
            border-radius: 16px;
            padding: 16px;
            z-index: 10001;
            max-width: 280px;
            width: 80%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .info-popup h3 {
            color: #eef2ff;
            margin-bottom: 12px;
            font-size: 1rem;
        }
        .seen-list {
            max-height: 180px;
            overflow-y: auto;
        }
        .seen-item {
            padding: 6px;
            border-bottom: 1px solid #2a2f36;
            color: #b9d0f0;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .close-popup {
            margin-top: 12px;
            background: #2e405b;
            border: none;
            padding: 6px 12px;
            border-radius: 16px;
            color: white;
            cursor: pointer;
            width: 100%;
            font-size: 0.7rem;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

<div class="app">
    <div class="header">
        <div class="header-left">
            <div class="badge">🐔 secure messenger · hen's world</div>
            <h1>Hen's World Chat</h1>
            <div class="sub">secure · private · worldwide</div>
        </div>
        <button id="logoutBtn" class="logout-btn">🚪 Logout</button>
    </div>

    <!-- User bar with auto-delete only -->
    <div class="user-bar">
        <div class="user-info">
            <span>👤</span>
            <span id="usernameDisplay" class="username-display">—</span>
        </div>
        <div class="user-bar-buttons">
            <select id="autoDeleteSelect" class="auto-delete-select">
                <option value="off">⏰ Auto: OFF</option>
                <option value="1hour">⏰ 1 Hour</option>
                <option value="24hour">⏰ 24 Hours</option>
                <option value="immediate">⚡ Immediate</option>
            </select>
        </div>
    </div>

    <div class="room-controls">
        <div class="room-input-group">
            <div class="room-label">🔗 room identifier</div>
            <div class="room-field">
                <input type="text" id="roomInput" placeholder="e.g., coop-chat, hens-den, global-lounge" autocomplete="off">
                <button id="joinRoomBtn">join</button>
            </div>
        </div>
        <div class="room-status">
            🌀 ROOM // <span id="currentRoomName" class="room-name-badge">—</span>
            <div class="connection-status" id="connectionStatus">connecting...</div>
        </div>
    </div>

    <div class="messages-container" id="messagesContainer">
        <div class="loading">✨ Welcome to Hen's World! Join a room to start chatting...</div>
    </div>

    <div class="input-area">
        <div class="message-form">
            <div class="message-input-wrapper">
                <textarea id="messageInput" rows="1" placeholder="type message... (enter to send)" disabled></textarea>
            </div>
            <button id="sendBtn" disabled>send ➤</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded, query, limitToLast, serverTimestamp, get, set, update, onValue, remove, onDisconnect } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    
    const firebaseConfig = {
        apiKey: "AIzaSyDb0fuG5RUoTtNUuJ10n_A4NCC2GFDaOps",
        authDomain: "hen-s-world.firebaseapp.com",
        projectId: "hen-s-world",
        storageBucket: "hen-s-world.firebasestorage.app",
        messagingSenderId: "359865594843",
        appId: "1:359865594843:web:3da81e9f7c00bba183adfe"
    };
    
    let database;
    let currentRoom = null;
    let currentUsername = null;
    let isFirebaseReady = false;
    let autoDeleteMode = "off";
    let autoDeleteInterval = null;
    let messagesListener = null;
    let statusListener = null;
    
    // Security Questions array
    const securityQuestions = [
        "What is your mother's maiden name?",
        "What was the name of your first pet?",
        "What was your childhood nickname?",
        "What is your favorite teacher's name?",
        "What is your best friend's first name?",
        "What was the name of your first school?",
        "What is your father's middle name?",
        "What city were you born in?"
    ];
    
    function escapeHtml(str) {
        if (!str) return "";
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }
    
    function simpleHash(str) {
        let hash = 0;
        for (let i = 0; i < str.length; i++) {
            const char = str.charCodeAt(i);
            hash = ((hash << 5) - hash) + char;
            hash = hash & hash;
        }
        return hash.toString(16);
    }
    
    function cleanAnswer(answer) {
        if (!answer) return "";
        return answer.toUpperCase().replace(/[^A-Z0-9]/g, '');
    }
    
    // ---------- AUTH MODAL (fully functional) ----------
    async function showSecurityQuestionsModal(username) {
        return new Promise((resolve) => {
            const shuffled = [...securityQuestions];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            const selectedQuestions = shuffled.slice(0, 3);
            
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `
                <div class="modal-content">
                    <h2>🔐 Security Questions</h2>
                    <div class="security-note">
                        ⚠️ <strong>IMPORTANT RULES:</strong><br>
                        • Use ONLY letters (A-Z) and numbers (0-9)<br>
                        • NO spaces allowed<br>
                        • Answers will be stored in CAPITAL LETTERS
                    </div>
                    <p>Please answer these 3 security questions:</p>
                    <div id="questionsContainer"></div>
                    <div id="securityError" class="auth-error"></div>
                    <div class="auth-buttons">
                        <button id="securitySubmitBtn" class="auth-btn auth-btn-primary">Submit & Continue</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            
            const container = modal.querySelector('#questionsContainer');
            const errorDiv = modal.querySelector('#securityError');
            const submitBtn = modal.querySelector('#securitySubmitBtn');
            const answers = {};
            const answerInputs = [];
            
            selectedQuestions.forEach((question, index) => {
                const div = document.createElement('div');
                div.style.marginBottom = '15px';
                div.innerHTML = `
                    <label style="color: #8db5e5; font-size: 0.75rem; margin-bottom: 5px; display: block;">${index + 1}. ${question}</label>
                    <input type="text" id="answer_${index}" class="auth-input" placeholder="Your answer (A-Z, 0-9 only - NO spaces)" style="margin-bottom: 5px;">
                    <div style="font-size: 0.65rem; margin-top: -10px; margin-bottom: 10px; display: none;" id="error_${index}" class="answer-error"></div>
                `;
                container.appendChild(div);
                const input = div.querySelector(`#answer_${index}`);
                const inputError = div.querySelector(`#error_${index}`);
                answers[question] = input;
                answerInputs.push({ input, error: inputError });
                
                input.addEventListener('input', function() {
                    const value = this.value;
                    const hasSpace = /\s/.test(value);
                    const hasSpecial = /[^A-Za-z0-9]/.test(value);
                    
                    if (hasSpace) {
                        inputError.style.display = 'block';
                        inputError.innerHTML = '❌ SPACES NOT ALLOWED!';
                        inputError.style.color = '#ff8888';
                        this.style.borderColor = '#ff4444';
                    } else if (hasSpecial) {
                        inputError.style.display = 'block';
                        inputError.innerHTML = '❌ Use ONLY letters and numbers!';
                        inputError.style.color = '#ff8888';
                        this.style.borderColor = '#ff4444';
                    } else {
                        const cleaned = cleanAnswer(value);
                        if (cleaned.length > 0) {
                            inputError.style.display = 'block';
                            inputError.style.color = '#10b981';
                            inputError.innerHTML = `✅ Will be stored as: "${cleaned}"`;
                            this.style.borderColor = '#252b33';
                        } else if (value.length > 0) {
                            inputError.style.display = 'block';
                            inputError.innerHTML = '❌ Invalid characters detected!';
                            inputError.style.color = '#ff8888';
                            this.style.borderColor = '#ff4444';
                        } else {
                            inputError.style.display = 'none';
                            this.style.borderColor = '#252b33';
                        }
                    }
                });
            });
            
            const handleSubmit = async () => {
                const securityAnswers = {};
                let valid = true;
                
                errorDiv.style.display = 'none';
                
                for (let i = 0; i < selectedQuestions.length; i++) {
                    const question = selectedQuestions[i];
                    const answer = answers[question].value;
                    const inputElement = answers[question];
                    const inputError = answerInputs[i].error;
                    
                    if (!answer || answer.trim().length === 0) {
                        inputError.style.display = 'block';
                        inputError.innerHTML = '❌ This field is required!';
                        inputError.style.color = '#ff8888';
                        inputElement.style.borderColor = '#ff4444';
                        valid = false;
                        continue;
                    }
                    
                    if (/\s/.test(answer)) {
                        inputError.style.display = 'block';
                        inputError.innerHTML = '❌ SPACES ARE NOT ALLOWED! Please remove spaces.';
                        inputError.style.color = '#ff8888';
                        inputElement.style.borderColor = '#ff4444';
                        valid = false;
                        continue;
                    }
                    
                    if (/[^A-Za-z0-9]/.test(answer)) {
                        inputError.style.display = 'block';
                        inputError.innerHTML = '❌ Only letters (A-Z) and numbers (0-9) allowed!';
                        inputError.style.color = '#ff8888';
                        inputElement.style.borderColor = '#ff4444';
                        valid = false;
                        continue;
                    }
                    
                    const cleaned = cleanAnswer(answer);
                    if (cleaned.length < 2) {
                        inputError.style.display = 'block';
                        inputError.innerHTML = '❌ Answer must be at least 2 characters!';
                        inputError.style.color = '#ff8888';
                        inputElement.style.borderColor = '#ff4444';
                        valid = false;
                        continue;
                    }
                    
                    securityAnswers[question] = cleaned;
                }
                
                if (valid) {
                    errorDiv.style.display = 'none';
                    modal.remove();
                    resolve(securityAnswers);
                } else {
                    errorDiv.style.display = 'block';
                    errorDiv.innerHTML = '❌ Please fix the errors above before continuing.';
                    errorDiv.style.color = '#ff8888';
                    const firstError = document.querySelector('.answer-error[style*="display: block"]');
                    if (firstError) firstError.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            };
            
            submitBtn.addEventListener('click', handleSubmit);
            answerInputs.forEach(({ input }) => {
                input.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') handleSubmit();
                });
            });
        });
    }
    
    async function showForgotPasswordModal() {
        return new Promise((resolve) => {
            let step = 1;
            let username = '';
            let userQuestions = {};
            
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `
                <div class="modal-content" id="forgotModalContent">
                    <h2 id="forgotTitle">🔐 Reset Password</h2>
                    <div id="forgotBody"></div>
                    <div id="forgotError" class="auth-error"></div>
                    <div class="auth-buttons">
                        <button id="forgotBackBtn" class="auth-btn auth-btn-secondary">Back</button>
                        <button id="forgotNextBtn" class="auth-btn auth-btn-primary">Next</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            
            const titleEl = modal.querySelector('#forgotTitle');
            const bodyEl = modal.querySelector('#forgotBody');
            const errorDiv = modal.querySelector('#forgotError');
            const backBtn = modal.querySelector('#forgotBackBtn');
            const nextBtn = modal.querySelector('#forgotNextBtn');
            
            async function loadStep() {
                errorDiv.style.display = 'none';
                
                if (step === 1) {
                    titleEl.innerHTML = '🔐 Enter Username';
                    bodyEl.innerHTML = `
                        <p>Enter your username to reset password</p>
                        <input type="text" id="resetUsername" class="auth-input" placeholder="Username" autocomplete="off">
                    `;
                    setTimeout(() => document.getElementById('resetUsername')?.focus(), 100);
                } 
                else if (step === 2) {
                    const usernameInput = document.getElementById('resetUsername');
                    username = usernameInput?.value.trim();
                    
                    if (!username || username.length < 3) {
                        errorDiv.style.display = 'block';
                        errorDiv.innerHTML = '❌ Please enter a valid username';
                        step = 1;
                        loadStep();
                        return;
                    }
                    
                    const userRef = ref(database, `users/${username}`);
                    const snapshot = await get(userRef);
                    
                    if (!snapshot.exists()) {
                        errorDiv.style.display = 'block';
                        errorDiv.innerHTML = '❌ Username not found!';
                        step = 1;
                        loadStep();
                        return;
                    }
                    
                    const userData = snapshot.val();
                    if (!userData.securityQuestions) {
                        errorDiv.style.display = 'block';
                        errorDiv.innerHTML = '❌ No security questions found for this account';
                        step = 1;
                        loadStep();
                        return;
                    }
                    
                    userQuestions = userData.securityQuestions;
                    const questions = Object.keys(userQuestions);
                    
                    let html = `<p>Answer these security questions to verify your identity:</p>
                                <div class="security-note" style="margin-bottom: 15px;">
                                    ⚠️ Use ONLY letters and numbers. NO spaces. Answers are case-sensitive (use CAPITALS).
                                </div>`;
                    questions.forEach((question, index) => {
                        html += `
                            <div style="margin-bottom: 15px;">
                                <label style="color: #8db5e5; font-size: 0.75rem; margin-bottom: 5px; display: block;">${index + 1}. ${question}</label>
                                <input type="text" id="secAnswer_${index}" class="auth-input" placeholder="Your answer (A-Z, 0-9 only)" style="margin-bottom: 5px;">
                                <div style="font-size: 0.6rem; color: #ff8888;" id="secError_${index}" class="answer-error"></div>
                            </div>
                        `;
                    });
                    bodyEl.innerHTML = html;
                    
                    questions.forEach((_, index) => {
                        const input = document.getElementById(`secAnswer_${index}`);
                        const errorEl = document.getElementById(`secError_${index}`);
                        
                        if (input) {
                            input.addEventListener('input', function() {
                                const value = this.value;
                                const hasSpace = /\s/.test(value);
                                const hasSpecial = /[^A-Za-z0-9]/.test(value);
                                
                                if (hasSpace) {
                                    errorEl.style.display = 'block';
                                    errorEl.innerHTML = '❌ SPACES NOT ALLOWED!';
                                    this.style.borderColor = '#ff4444';
                                } else if (hasSpecial) {
                                    errorEl.style.display = 'block';
                                    errorEl.innerHTML = '❌ Use ONLY letters and numbers!';
                                    this.style.borderColor = '#ff4444';
                                } else {
                                    errorEl.style.display = 'none';
                                    this.style.borderColor = '#252b33';
                                }
                            });
                        }
                    });
                    
                    setTimeout(() => document.getElementById('secAnswer_0')?.focus(), 100);
                } 
                else if (step === 3) {
                    const questions = Object.keys(userQuestions);
                    let allCorrect = true;
                    
                    for (let i = 0; i < questions.length; i++) {
                        const question = questions[i];
                        const inputAnswer = document.getElementById(`secAnswer_${i}`)?.value;
                        const errorEl = document.getElementById(`secError_${i}`);
                        
                        if (!inputAnswer || inputAnswer.trim().length === 0) {
                            if (errorEl) {
                                errorEl.style.display = 'block';
                                errorEl.innerHTML = '❌ This field is required!';
                                errorEl.style.color = '#ff8888';
                            }
                            allCorrect = false;
                            continue;
                        }
                        
                        if (/\s/.test(inputAnswer)) {
                            if (errorEl) {
                                errorEl.style.display = 'block';
                                errorEl.innerHTML = '❌ SPACES NOT ALLOWED!';
                                errorEl.style.color = '#ff8888';
                            }
                            allCorrect = false;
                            continue;
                        }
                        
                        if (/[^A-Za-z0-9]/.test(inputAnswer)) {
                            if (errorEl) {
                                errorEl.style.display = 'block';
                                errorEl.innerHTML = '❌ Use ONLY letters and numbers!';
                                errorEl.style.color = '#ff8888';
                            }
                            allCorrect = false;
                            continue;
                        }
                        
                        const cleanedAnswer = cleanAnswer(inputAnswer);
                        
                        if (cleanedAnswer !== userQuestions[question]) {
                            if (errorEl) {
                                errorEl.style.display = 'block';
                                errorEl.innerHTML = '❌ Incorrect answer!';
                                errorEl.style.color = '#ff8888';
                            }
                            allCorrect = false;
                        } else if (errorEl) {
                            errorEl.style.display = 'none';
                        }
                    }
                    
                    if (!allCorrect) {
                        errorDiv.style.display = 'block';
                        errorDiv.innerHTML = '❌ One or more answers are incorrect. Please try again.';
                        errorDiv.style.color = '#ff8888';
                        step = 2;
                        loadStep();
                        return;
                    }
                    
                    titleEl.innerHTML = '🔐 Set New Password';
                    bodyEl.innerHTML = `
                        <p>Enter your new password</p>
                        <input type="password" id="newPassword" class="auth-input" placeholder="New Password (min 3 characters)" autocomplete="off">
                        <input type="password" id="confirmPassword" class="auth-input" placeholder="Confirm New Password" autocomplete="off">
                    `;
                    setTimeout(() => document.getElementById('newPassword')?.focus(), 100);
                }
            }
            
            backBtn.addEventListener('click', () => {
                if (step > 1) {
                    step--;
                    loadStep();
                } else {
                    modal.remove();
                    resolve(false);
                }
            });
            
            nextBtn.addEventListener('click', async () => {
                if (step === 1) {
                    step++;
                    loadStep();
                } 
                else if (step === 2) {
                    step++;
                    loadStep();
                }
                else if (step === 3) {
                    const newPassword = document.getElementById('newPassword')?.value;
                    const confirmPassword = document.getElementById('confirmPassword')?.value;
                    
                    if (!newPassword || newPassword.length < 3) {
                        errorDiv.style.display = 'block';
                        errorDiv.innerHTML = '❌ Password must be at least 3 characters';
                        return;
                    }
                    if (newPassword !== confirmPassword) {
                        errorDiv.style.display = 'block';
                        errorDiv.innerHTML = '❌ Passwords do not match';
                        return;
                    }
                    
                    errorDiv.style.display = 'block';
                    errorDiv.innerHTML = '⏳ Resetting password...';
                    errorDiv.style.color = '#fbbf24';
                    
                    const hashedPassword = simpleHash(newPassword);
                    const userRef = ref(database, `users/${username}`);
                    await update(userRef, {
                        password: hashedPassword,
                        passwordResetAt: serverTimestamp(),
                        passwordResetAtMs: Date.now()
                    });
                    
                    errorDiv.style.display = 'block';
                    errorDiv.innerHTML = '✅ Password reset successful! You can now login.';
                    errorDiv.style.color = '#10b981';
                    
                    setTimeout(() => {
                        modal.remove();
                        resolve(true);
                    }, 2000);
                }
            });
            
            loadStep();
        });
    }
    
    async function registerUser(username, password, securityAnswers) {
        if (!database) return { success: false, message: "Database not ready" };
        try {
            const userRef = ref(database, `users/${username}`);
            const snapshot = await get(userRef);
            if (snapshot.exists()) return { success: false, message: "Username already exists!" };
            const hashedPassword = simpleHash(password);
            await set(userRef, {
                username: username,
                password: hashedPassword,
                securityQuestions: securityAnswers,
                createdAt: serverTimestamp(),
                createdAtMs: Date.now()
            });
            return { success: true, message: "Account created!" };
        } catch (error) {
            return { success: false, message: "Error creating account" };
        }
    }
    
    async function loginUser(username, password) {
        if (!database) return { success: false, message: "Database not ready" };
        try {
            const userRef = ref(database, `users/${username}`);
            const snapshot = await get(userRef);
            if (!snapshot.exists()) return { success: false, message: "Username not found!" };
            const userData = snapshot.val();
            const hashedPassword = simpleHash(password);
            if (userData.password === hashedPassword) return { success: true, message: "Login successful!" };
            return { success: false, message: "Wrong password!" };
        } catch (error) {
            return { success: false, message: "Error logging in" };
        }
    }

        await set(sessionRef, {
            username: username,
            loginTimeMs: Date.now(),
            sessionId: Date.now() + '_' + Math.random().toString(36).substr(2, 6)
        });

    async function removeActiveSession(username) {
        if (!database || !username) return;
        const sessionRef = ref(database, `active_sessions/${username}`);
        await set(sessionRef, null);
    }
    
    async function showAuthModalAndLogin() {
        return new Promise((resolve) => {
            let isLoginMode = true;
            
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `
                <div class="modal-content">
                    <h2 id="authTitle">🐔 Login to Hen's World</h2>
                    <p id="authDesc">Enter your username and password</p>
                    <input type="text" id="authUsername" class="auth-input" placeholder="Username" autocomplete="off">

                        <button id="authSubmitBtn" class="auth-btn auth-btn-primary">Login</button>
                    </div>
                    <div class="auth-switch" id="authSwitch">Don't have an account? <span>Register</span></div>
                    <div class="forgot-password" id="forgotPassword">🔑 Forgot password? <span>Reset here</span></div>
                </div>
            `;
            document.body.appendChild(modal);
            
            const usernameInput = modal.querySelector('#authUsername');
            const passwordInput = modal.querySelector('#authPassword');
            const errorDiv = modal.querySelector('#authError');
            const submitBtn = modal.querySelector('#authSubmitBtn');
            const authTitle = modal.querySelector('#authTitle');
            const authDesc = modal.querySelector('#authDesc');
            const authSwitch = modal.querySelector('#authSwitch');
            const forgotPassword = modal.querySelector('#forgotPassword');
            
            setTimeout(() => usernameInput.focus(), 100);
            
            forgotPassword.addEventListener('click', async () => {
                modal.remove();
                await showForgotPasswordModal();
                // after reset, re-show auth modal
                const newUsername = await showAuthModalAndLogin();
                resolve(newUsername);
            });
            
            const updateMode = () => {
                if (isLoginMode) {
                    authTitle.innerHTML = '🐔 Login to Hen\'s World';
                    authDesc.innerHTML = 'Enter your username and password';
                    submitBtn.innerHTML = 'Login';
                    authSwitch.innerHTML = 'Don\'t have an account? <span>Register</span>';
                    forgotPassword.style.display = 'block';
                } else {
                    authTitle.innerHTML = '📝 Create Account';
                    authDesc.innerHTML = 'Choose a username and password';
                    submitBtn.innerHTML = 'Register';
                    authSwitch.innerHTML = 'Already have an account? <span>Login</span>';
                    forgotPassword.style.display = 'none';
                }
                errorDiv.style.display = 'none';
                usernameInput.value = '';
                passwordInput.value = '';
            };
            
            authSwitch.addEventListener('click', () => {
                isLoginMode = !isLoginMode;
                updateMode();
            });
            
            const handleSubmit = async () => {
                const username = usernameInput.value.trim();
                const password = passwordInput.value;
                
                if (username.length < 3) {
                    errorDiv.style.display = 'block';
                    errorDiv.innerHTML = '❌ Username must be at least 3 characters';
                    return;
                }
                if (password.length < 3) {
                    errorDiv.style.display = 'block';
                    errorDiv.innerHTML = '❌ Password must be at least 3 characters';
                    return;
                }
                
                errorDiv.style.display = 'block';
                errorDiv.innerHTML = '⏳ Processing...';
                errorDiv.style.color = '#fbbf24';
                
                if (isLoginMode) {
                    const result = await loginUser(username, password);
                    if (result.success) {
                        await setActiveSession(username);
                        modal.remove();
                        resolve(username);
                    } else {
                        errorDiv.style.display = 'block';
                        errorDiv.innerHTML = `❌ ${result.message}`;
                        errorDiv.style.color = '#ff8888';
                    }
                } else {
                    const securityAnswers = await showSecurityQuestionsModal(username);
                    const result = await registerUser(username, password, securityAnswers);
                    if (result.success) {
                        await setActiveSession(username);
                        modal.remove();
                        resolve(username);
                    } else {
                        errorDiv.style.display = 'block';
                        errorDiv.innerHTML = `❌ ${result.message}`;
                        errorDiv.style.color = '#ff8888';
                    }
                }
            };
            
            submitBtn.addEventListener('click', handleSubmit);
            usernameInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSubmit(); });
            passwordInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSubmit(); });
        });
    }
    
    async function initAuth() {
        const savedUsername = localStorage.getItem("hensworld_username");
        if (savedUsername) {
            try {
                const userRef = ref(database, `users/${savedUsername}`);

                if (snapshot.exists()) {
                    currentUsername = savedUsername;

            return true;

    function getMessageStatus(message) {
        const sender = message.sender;
        let othersSeen = 0, othersDelivered = 0;
        if (message.seen) othersSeen = Object.keys(message.seen).filter(u => u !== sender).length;
        if (message.delivered) othersDelivered = Object.keys(message.delivered).filter(u => u !== sender).length;
        if (othersSeen > 0) return { icon: '✓✓', text: `Seen by ${othersSeen} other(s)`, color: '#ff99cc' };
        if (othersDelivered > 0) return { icon: '✓', text: `Delivered to ${othersDelivered} other(s)`, color: '#888' };
        return { icon: '○', text: 'Sent', color: '#888' };
    }
    
    window.showInfoPopup = function(message) {
        const popup = document.createElement('div');
        popup.className = 'info-popup';
        let html = `<h3>📋 Message Info</h3><p style="color:#aaa;font-size:0.7rem">Message: ${escapeHtml(message.text)}</p><p style="color:#aaa;font-size:0.7rem">Sent by: ${escapeHtml(message.sender)}</p>`;
        if (message.seen) {
            const others = Object.keys(message.seen).filter(u => u !== message.sender);
            if (others.length) {
                html += '<h4 style="margin-top:10px;color:#ff99cc">👁️ Seen by:</h4><div class="seen-list">';
                others.forEach(u => { const ts = new Date(message.seen[u]).toLocaleString(); html += `<div class="seen-item">🐔 ${escapeHtml(u)} - ${ts}</div>`; });
                html += '</div>';
            } else html += '<p style="color:#888">Only the sender has seen this message</p>';
        } else html += '<p style="color:#888">No one has seen this message yet</p>';
        popup.innerHTML = html + `<button class="close-popup">Close</button>`;
        document.body.appendChild(popup);
        popup.querySelector('.close-popup').onclick = () => popup.remove();
        popup.onclick = (e) => { if (e.target === popup) popup.remove(); };
    };
    
    async function saveAutoDeleteMode(mode) {
        if (!currentRoom) return;
        await set(ref(database, `rooms/${currentRoom}/settings/autoDelete`), mode);
    }
    
    async function loadAutoDeleteMode() {
        if (!currentRoom) return;
        const snap = await get(ref(database, `rooms/${currentRoom}/settings/autoDelete`));
        if (snap.exists()) {
            autoDeleteMode = snap.val();
            document.getElementById('autoDeleteSelect').value = autoDeleteMode;
            if (autoDeleteMode !== 'off') startAutoDeleteTimer();
        }
    }
    
    function startAutoDeleteTimer() {
        if (autoDeleteInterval) clearInterval(autoDeleteInterval);
        if (autoDeleteMode === 'off') return;
        let ms = autoDeleteMode === '1hour' ? 3600000 : autoDeleteMode === '24hour' ? 86400000 : 0;
        if (ms === 0) {
            set(ref(database, `rooms/${currentRoom}/messages`), null);
            addSystemMessage(`⚡ All messages cleared!`);
            return;
        }
        autoDeleteInterval = setInterval(async () => {
            const cutoff = Date.now() - ms;
            const msgsRef = ref(database, `rooms/${currentRoom}/messages`);
            const snap = await get(msgsRef);
            if (snap.exists()) {
                let count = 0;
                for (const [id, msg] of Object.entries(snap.val())) {
                    if (msg.timestampMs && msg.timestampMs < cutoff) {
                        await remove(ref(database, `rooms/${currentRoom}/messages/${id}`));
                        count++;
                    }
                }
                if (count) addSystemMessage(`🧹 Auto-delete: ${count} old messages removed`);
            }
        }, 30000);
    }
    
    function stopAutoDeleteTimer() {
        if (autoDeleteInterval) { clearInterval(autoDeleteInterval); autoDeleteInterval = null; }
    }
    
    async function changeAutoDeleteMode() {
        const select = document.getElementById('autoDeleteSelect');
        autoDeleteMode = select.value;
        await saveAutoDeleteMode(autoDeleteMode);
        stopAutoDeleteTimer();
        if (autoDeleteMode === 'immediate') {
            await set(ref(database, `rooms/${currentRoom}/messages`), null);
            addSystemMessage(`⚡ All messages cleared!`);
        } else if (autoDeleteMode !== 'off') {
            startAutoDeleteTimer();
            const hours = autoDeleteMode === '1hour' ? '1 hour' : '24 hours';
            addSystemMessage(`🕐 Auto-delete enabled: messages older than ${hours} will be cleared.`);
        } else {
            addSystemMessage(`🕐 Auto-delete disabled.`);
        }
    }
    
    async function addSystemMessage(text) {
        if (!currentRoom || !database) return;
        await push(ref(database, `rooms/${currentRoom}/messages`), {
            sender: "🐔 Hen's World",
            text: text,
            timestamp: serverTimestamp(),
            timestampMs: Date.now(),
            isSystem: true
        });
    }
    
    function displayMessage(message, msgId) {
        const container = document.getElementById("messagesContainer");
        if (!container) return;
        if (container.children.length === 1 && container.children[0].classList?.contains('loading')) container.innerHTML = '';
        
        const isOwn = (message.sender === currentUsername);
        const isSystem = message.isSystem === true;
        const msgDiv = document.createElement("div");
        msgDiv.id = `msg-${msgId}`;
        msgDiv.className = "message";
        if (!isSystem) msgDiv.classList.add(isOwn ? 'own-message' : '');
        if (isSystem) msgDiv.classList.add("system-message");
        
        let timeStr = "now";
        if (message.timestampMs) {
            const date = new Date(message.timestampMs);
            timeStr = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }
        
        const status = getMessageStatus(message);
        const statusIcon = (!isSystem && isOwn) ? `<span class="message-status" style="color:${status.color}" title="${status.text}"> ${status.icon}</span>` : '';
        
        if (isSystem) {
            msgDiv.innerHTML = `
                <div class="message-content">
                    <div class="message-bubble">🐔 ${escapeHtml(message.text)}</div>
                </div>
            `;
        } else {
            msgDiv.innerHTML = `
                <div class="message-header">
                    <span class="message-sender">${escapeHtml(message.sender)}</span>
                    <span class="message-time">${timeStr}</span>
                    ${statusIcon}
                </div>
                <div class="message-content">
                    <div class="message-bubble">${escapeHtml(message.text)}</div>
                </div>
                <div class="message-actions">
                    <button class="action-btn info-btn">ℹ️ Info</button>
                </div>
            `;
            const infoBtn = msgDiv.querySelector('.info-btn');
            infoBtn.addEventListener('click', () => window.showInfoPopup(message));
        }
        container.appendChild(msgDiv);
        container.scrollTop = container.scrollHeight;
    }
    
    async function sendMessage(text) {
        if (!text.trim()) return;
        if (!currentRoom) { alert("Join a room first!"); return; }
        const msgData = {
            sender: currentUsername,
            text: text.trim(),
            timestamp: serverTimestamp(),
            timestampMs: Date.now(),
            delivered: {},
            seen: {}
        };
        try {
            const newMsgRef = await push(ref(database, `rooms/${currentRoom}/messages`), msgData);
            await markDelivered(newMsgRef.key);
            document.getElementById("messageInput").value = "";
        } catch (error) {
            alert("Failed to send message");
        }
    }
    
    function joinRoom(roomId) {
        if (!database || !isFirebaseReady || !currentUsername) return false;
        const cleanRoomId = roomId.trim().replace(/[.#$[\]]/g, '_');
        if (!cleanRoomId) return false;
        if (currentRoom === cleanRoomId) return true;
        
        // Clean previous room
        if (currentRoom && currentUsername) {
            set(ref(database, `rooms/${currentRoom}/online/${currentUsername}`), null);
        }
        if (messagesListener) messagesListener();
        if (statusListener) statusListener();
        
        currentRoom = cleanRoomId;
        document.getElementById("currentRoomName").innerText = currentRoom;
        document.getElementById("messageInput").disabled = false;
        document.getElementById("sendBtn").disabled = false;
        
        const container = document.getElementById("messagesContainer");
        container.innerHTML = '<div class="loading">🐔 loading messages...</div>';
        
        const msgsRef = ref(database, `rooms/${currentRoom}/messages`);
        messagesListener = onChildAdded(query(msgsRef, limitToLast(100)), async (snapshot) => {
            const message = snapshot.val();
            if (message) {
                displayMessage(message, snapshot.key);
                if (message.sender !== currentUsername && !message.isSystem) {
                    await markSeen(snapshot.key, message.sender);
                }
            }
        });
        statusListener = onValue(msgsRef, (snap) => {
            const msgs = snap.val();
            if (msgs) {
                for (const [id, msg] of Object.entries(msgs)) {
                    const el = document.getElementById(`msg-${id}`);
                    if (el && !msg.isSystem) {
                        const statusSpan = el.querySelector('.message-status');
                        if (statusSpan) {
                            const status = getMessageStatus(msg);
                            statusSpan.innerHTML = `<span style="color:${status.color}" title="${status.text}"> ${status.icon}</span>`;
                        }
                    }
                }
            }
        });
        
        updateOnlineStatus();
        loadAutoDeleteMode();
        setTimeout(() => addSystemMessage(`${currentUsername} 🐔 joined the room`), 300);
        return true;
    }
    
    async function logout() {
        if (currentUsername) {
            await removeActiveSession(currentUsername);
            if (currentRoom && database) {
                await set(ref(database, `rooms/${currentRoom}/online/${currentUsername}`), null);
            }
            if (messagesListener) messagesListener();
            if (statusListener) statusListener();
            localStorage.removeItem("hensworld_username");
            currentUsername = null;
            currentRoom = null;
            location.reload();
        }
    }
    
    function setupUI() {
        const roomInput = document.getElementById("roomInput");
        const joinBtn = document.getElementById("joinRoomBtn");
        const sendBtn = document.getElementById("sendBtn");
        const messageInput = document.getElementById("messageInput");
        const logoutBtn = document.getElementById("logoutBtn");
        const autoDeleteSelect = document.getElementById("autoDeleteSelect");
        
        joinBtn.addEventListener("click", () => {
            let roomVal = roomInput.value.trim();
            if (!roomVal) roomVal = "henhouse-lounge";
            joinRoom(roomVal);
        });
        
        sendBtn.addEventListener("click", () => sendMessage(messageInput.value));
        messageInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                sendMessage(messageInput.value);
            }
        });
        
        logoutBtn.addEventListener("click", logout);
        autoDeleteSelect.addEventListener("change", changeAutoDeleteMode);
        
        // Default room
        roomInput.value = "henhouse-lounge";
        // Join after auth is done (called from init)
    }
    
    function addWatermark() {
        const watermark = document.createElement('div');
        watermark.style.cssText = `position:fixed; bottom:5px; left:5px; right:5px; font-size:9px; color:rgba(150,150,150,0.25); z-index:9998; pointer-events:none; text-align:center;`;
        watermark.innerHTML = `${currentUsername} • ${new Date().toLocaleString()} • hensworld.chat`;
        document.body.appendChild(watermark);
    }
    
    document.addEventListener('contextmenu', (e) => e.preventDefault());
    window.addEventListener('blur', () => document.querySelector('.app')?.classList.add('screenshot-detected'));
    window.addEventListener('focus', () => setTimeout(() => document.querySelector('.app')?.classList.remove('screenshot-detected'), 300));
    
    async function init() {
        try {
            const firebaseApp = initializeApp(firebaseConfig);
            database = getDatabase(firebaseApp);
            isFirebaseReady = true;
            document.getElementById("connectionStatus").innerHTML = "✅ Secure connection ready";
            
            const authSuccess = await initAuth();
            if (authSuccess && currentUsername) {
                setupUI();
                addWatermark();
                // Join default room after everything is set
                joinRoom("henhouse-lounge");
            } else {
                // fallback: reload to try again
                console.error("Auth failed");
                location.reload();
            }
        } catch (error) {
            console.error("Init error:", error);
            document.getElementById("connectionStatus").innerHTML = "❌ Connection failed";
        }
    }
    
    init();
</script>
</body>
    </html>
