<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Hen's World — Advanced Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0c0f;
            font-family: 'SF Mono', 'Fira Code', 'Courier New', monospace;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        .app {
            max-width: 800px;
            width: 100%;
            height: 90vh;
            background: #111417;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid #2a2f36;
        }

        .header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid #1e2329;
            background: #0e1115;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left {
            flex: 1;
        }

        .badge {
            font-size: 0.7rem;
            letter-spacing: 1px;
            color: #6c7a89;
            text-transform: uppercase;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        h1 {
            font-size: 1.7rem;
            font-weight: 500;
            color: #eef2ff;
            letter-spacing: -0.5px;
        }

        .sub {
            color: #6c86a3;
            font-size: 0.8rem;
            margin-top: 6px;
        }

        .logout-btn {
            background: #2d1f1f;
            border: 1px solid #8b3a3a;
            border-radius: 40px;
            padding: 8px 18px;
            color: #ffaaaa;
            font-family: monospace;
            font-size: 0.8rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .logout-btn:hover {
            background: #4a2a2a;
            color: #ffcccc;
        }

        .room-controls {
            padding: 1rem 1.5rem;
            background: #0b0e12;
            border-bottom: 1px solid #1a1f26;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            justify-content: space-between;
        }

        .room-input-group {
            flex: 3;
            min-width: 180px;
        }

        .room-label {
            font-size: 0.7rem;
            color: #7e8c9e;
            text-transform: uppercase;
            margin-bottom: 4px;
            letter-spacing: 0.5px;
        }

        .room-field {
            display: flex;
            background: #050709;
            border: 1px solid #252b33;

            overflow: hidden;
            transition: 0.2s;
        }
        .room-field:focus-within {
            border-color: #3e6b9e;
            box-shadow: 0 0 0 1px #1e3a5f;
        }

        .room-field input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 10px 16px;
            color: #dfe6f0;
            font-family: monospace;
            font-size: 0.9rem;
            outline: none;
        }

        .room-field button {
            background: #1e293b;
            border: none;
            border-left: 1px solid #2d3540;
            padding: 0 20px;
            color: #b9d0f0;
            font-weight: bold;
            font-family: monospace;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.8rem;
        }
        .room-field button:hover {
            background: #2d3e5a;
            color: white;
        }

        .room-status {
            flex: 2;
            text-align: right;
            font-size: 0.85rem;
            background: #07090e;
            padding: 8px 16px;
            border-radius: 40px;
            border: 1px solid #20262e;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .room-name-badge {
            color: #93c5fd;
            font-weight: 600;
            word-break: break-all;
        }

        .auto-delete-toggle {
            background: #1e293b;
            border: 1px solid #2f3a48;
            border-radius: 40px;
            padding: 4px 12px;
            font-size: 0.7rem;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
        }
        
        .auto-delete-toggle.on {
            background: #2d4a2d;
            border-color: #6b8c6b;
            color: #aaffaa;
        }
        
        .auto-delete-toggle.off {
            background: #4a2d2d;
            border-color: #8c6b6b;
            color: #ffaaaa;
        }

        .connection-status {
            font-size: 0.7rem;
            margin-top: 4px;
            color: #5f7d9c;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 1.2rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #0f1219;
            scroll-behavior: smooth;
        }

        .message {
            display: flex;
            flex-direction: column;
            animation: fadeSlide 0.2s ease;
            position: relative;
        }

        .message-content {
            display: flex;
            align-items: flex-end;
            gap: 8px;
        }

        .message-bubble {
            background: #181e26;
            padding: 8px 14px;
            border-radius: 18px;
            border-top-left-radius: 4px;
            max-width: 85%;
            word-wrap: break-word;
            color: #eef3ff;
            font-size: 0.9rem;
            line-height: 1.4;
            border: 1px solid #282f39;
            position: relative;
        }

        .own-message {
            align-items: flex-end;
        }
        
        .own-message .message-bubble {
            background: #1e2a3a;
            border-color: #2f4b6e;
            border-top-right-radius: 4px;
            border-top-left-radius: 18px;
        }
        
        .own-message .message-content {
            justify-content: flex-end;
        }

        .message-header {
            font-size: 0.7rem;
            color: #5f7f9e;
            margin-bottom: 4px;
            display: flex;
            gap: 12px;
        }

        .message-sender {
            font-weight: 600;
            color: #8db5e5;
        }

        .message-time {
            font-size: 0.65rem;
            color: #4a5b72;
        }

        .message-status {
            font-size: 0.7rem;
            margin-left: 4px;
        }
        
        .status-delivered {
            color: #888;
        }
        
        .status-seen {
            color: #ff99cc;
        }

        .message-actions {
            position: absolute;
            right: 0;
            top: -20px;
            background: #1a1f2a;
            border-radius: 20px;
            padding: 4px 12px;
            display: none;
            gap: 12px;
            z-index: 10;
        }
        
        .message:hover .message-actions {

        }
        
        .action-btn {
            background: none;
            border: none;
            color: #93c5fd;
            cursor: pointer;
            font-size: 0.7rem;
            padding: 2px 6px;
        }
        
        .action-btn:hover {
            color: white;
        }

        .info-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #1a1f2e;
            border: 1px solid #3e6b9e;
            border-radius: 16px;
            padding: 20px;
            z-index: 10001;
            max-width: 300px;
            width: 80%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        .info-popup h3 {
            color: #eef2ff;
            margin-bottom: 15px;
        }
        
        .info-popup .seen-list {
            max-height: 200px;
            overflow-y: auto;
        }
        
        .info-popup .seen-item {
            padding: 8px;
            border-bottom: 1px solid #2a2f36;
            color: #b9d0f0;
            font-size: 0.8rem;
        }
        
        .info-popup .close-popup {
            margin-top: 15px;
            background: #2e405b;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            width: 100%;
        }

        .message-bubble::after {
            content: "🔒";
            position: absolute;
            bottom: 2px;
            right: 5px;
            font-size: 8px;
            color: rgba(255,255,255,0.15);
            pointer-events: none;
        }

        .input-area {
            padding: 1rem 1.5rem 1.3rem;
            background: #0b0e12;
            border-top: 1px solid #1a1f26;
        }

        .message-form {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .message-input-wrapper {
            flex: 1;
            background: #05070c;
            border: 1px solid #252b33;
            border-radius: 28px;
            padding: 6px 16px;
            transition: 0.2s;
        }
        .message-input-wrapper:focus-within {
            border-color: #3e6b9e;
        }

        #messageInput {
            width: 100%;
            background: transparent;
            border: none;
            padding: 10px 0;
            color: #edf4ff;
            font-family: monospace;
            font-size: 0.9rem;
            outline: none;
            resize: none;
        }

        #sendBtn {
            background: #1f2a3c;
            border: none;
            border-radius: 40px;
            padding: 10px 24px;
            color: #c0dcff;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.8rem;
            border: 1px solid #2f3a48;
        }
        #sendBtn:hover {
            background: #2e405b;
            color: white;
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .messages-container::-webkit-scrollbar {
            width: 6px;
        }
        .messages-container::-webkit-scrollbar-track {
            background: #0a0d12;
        }
        .messages-container::-webkit-scrollbar-thumb {
            background: #2e3a48;
            border-radius: 8px;
        }

        @media (max-width: 550px) {
            .app {
                height: 95vh;
                border-radius: 20px;
            }
            .room-controls {
                flex-direction: column;
                align-items: stretch;
            }
            .room-status {
                flex-direction: column;
                text-align: center;
            }
            .message-bubble {
                max-width: 95%;
            }
            .logout-btn {
                padding: 6px 12px;
                font-size: 0.7rem;
            }
            h1 {
                font-size: 1.3rem;
            }
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #6c7a89;
        }
        
        .system-message .message-bubble {
            background: #1a1f2a;
            color: #a0b4d0;
            font-style: italic;
            border-color: #2d3543;
            font-size: 0.8rem;
        }
        
        .system-message .message-sender {
            color: #8aa2c2;
        }

        /* Modal Styles */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);

            display: flex;
            align-items: center;
            justify-content: center;

        .modal-content {
            background: #111417;
            border-radius: 24px;
            padding: 30px;
            max-width: 450px;
            width: 90%;
            border: 1px solid #2a2f36;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .modal-content h2 {
            color: #eef2ff;
            margin-bottom: 10px;
            font-size: 1.5rem;
        }
        
        .modal-content p {
            color: #6c86a3;
            margin-bottom: 20px;
            font-size: 0.85rem;
        }
        
        .auth-input {
            width: 100%;
            background: #050709;
            border: 1px solid #252b33;
            border-radius: 40px;
            padding: 12px 18px;
            color: #dfe6f0;
            font-family: monospace;
            font-size: 1rem;
            margin-bottom: 15px;
            outline: none;
        }
        
        .auth-input:focus {
            border-color: #3e6b9e;
        }
        
        .auth-error {
            color: #ff8888;
            font-size: 0.75rem;
            margin-bottom: 15px;
            display: none;
        }
        
        .auth-buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 15px;
        }
        
        .auth-btn {
            flex: 1;
            padding: 10px;
            border-radius: 40px;
            border: none;
            font-family: monospace;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .auth-btn-primary {
            background: #1e293b;
            color: #b9d0f0;
            border: 1px solid #2f3a48;
        }
        
        .auth-btn-primary:hover {
            background: #2e405b;
            color: white;
        }
        
        .auth-btn-secondary {
            background: #2d1f1f;
            color: #ffaaaa;
            border: 1px solid #8b3a3a;
        }
        
        .auth-switch {
            text-align: center;
            font-size: 0.8rem;
            color: #6c86a3;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .auth-switch span {
            color: #93c5fd;
            text-decoration: underline;
        }
        
        .forgot-password {
            text-align: center;
            font-size: 0.7rem;
            color: #6c86a3;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .forgot-password span {
            color: #fbbf24;
            text-decoration: underline;
        }
        
        .security-note {
            background: #1a1f2a;
            border-left: 3px solid #fbbf24;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.7rem;
            color: #fbbf24;
        }
        
        .answer-error {
            font-size: 0.65rem;
            margin-top: -10px;
            margin-bottom: 10px;
            display: none;
        }
        
        .screenshot-detected {
            filter: blur(10px);
            transition: filter 0.3s;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }

    </style>
</head>
<body>

<div class="app">
    <div class="header">
        <div class="header-left">
            <div class="badge">🐔 advanced messenger · hen's world</div>
            <h1>Hen's World Chat</h1>
            <div class="sub">message tracking · auto-delete · secure</div>
        </div>
        <button id="logoutBtn" class="logout-btn">🚪 Logout</button>
    </div>

    <div class="room-controls">
        <div class="room-input-group">
            <div class="room-label">🔗 room identifier</div>
            <div class="room-field">
                <input type="text" id="roomInput" placeholder="e.g., coop-chat, hens-den" autocomplete="off">
                <button id="joinRoomBtn">join</button>
            </div>
        </div>
        <div class="room-status">
            <span>🌀 ROOM // <span id="currentRoomName" class="room-name-badge">—</span></span>
            <button id="autoDeleteToggle" class="auto-delete-toggle off">⏰ Auto-Delete: OFF</button>
        </div>
        <div class="connection-status" id="connectionStatus">connecting...</div>
    </div>

    <div class="messages-container" id="messagesContainer">
        <div class="loading">✨ Welcome to Hen's World! Join a room to start chatting...</div>
    </div>

    <div class="input-area">
        <div class="message-form">
            <div class="message-input-wrapper">
                <textarea id="messageInput" rows="1" placeholder="type message... (enter to send)" disabled></textarea>
            </div>
            <button id="sendBtn" disabled>send ➤</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded, query, limitToLast, serverTimestamp, get, set, update, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    
    const firebaseConfig = {
        apiKey: "AIzaSyDb0fuG5RUoTtNUuJ10n_A4NCC2GFDaOps",
        authDomain: "hen-s-world.firebaseapp.com",
        projectId: "hen-s-world",
        storageBucket: "hen-s-world.firebasestorage.app",
        messagingSenderId: "359865594843",
        appId: "1:359865594843:web:3da81e9f7c00bba183adfe"
    };
    
    let app, database;
    let messagesRef = null;
    let currentRoom = null;
    let currentUsername = null;
    let isFirebaseReady = false;
    let autoDeleteEnabled = false;
    let autoDeleteInterval = null;
    let messageElements = new Map();
    
    // Security Questions
    const securityQuestions = [
        "What is your mother's maiden name?",
        "What was the name of your first pet?",
        "What was your childhood nickname?",
        "What is your favorite teacher's name?",
        "What is your best friend's first name?",
        "What was the name of your first school?",
        "What is your father's middle name?",
        "What city were you born in?"
    ];
    
    function simpleHash(str) {
        let hash = 0;
        for (let i = 0; i < str.length; i++) {
            const char = str.charCodeAt(i);
            hash = ((hash << 5) - hash) + char;
            hash = hash & hash;
        }
        return hash.toString(16);
    }
    
    function cleanAnswer(answer) {
        if (!answer) return "";
        return answer.toUpperCase().replace(/[^A-Z0-9]/g, '').replace(/\s/g, '');
    }
    
    // ========== MESSAGE STATUS FUNCTIONS ==========
    
    async function markMessageDelivered(messageId) {
        if (!currentRoom || !currentUsername) return;
        const deliveredRef = ref(database, `rooms/${currentRoom}/messages/${messageId}/delivered`);
        await update(deliveredRef, {
            [currentUsername]: serverTimestamp()
        });
    }
    
    async function markMessageSeen(messageId, sender) {
        if (!currentRoom || !currentUsername || sender === currentUsername) return;
        const seenRef = ref(database, `rooms/${currentRoom}/messages/${messageId}/seen`);
        await update(seenRef, {
            [currentUsername]: serverTimestamp()
        });
    }
    
    // Get message status - UPDATED: Double pink check for seen
    function getMessageStatus(message) {
        if (message.seen && Object.keys(message.seen).length > 0) {
            return { status: 'seen', icon: '✓✓', text: 'Seen', color: '#ff99cc' };
        } else if (message.delivered && Object.keys(message.delivered).length > 0) {
            return { status: 'delivered', icon: '✓', text: 'Delivered', color: '#888' };
        }
        return { status: 'sent', icon: '○', text: 'Sent', color: '#888' };
    }
    
    function showInfoPopup(message) {
        const popup = document.createElement('div');
        popup.className = 'info-popup';
        
        let seenHtml = '<h3>📋 Message Info</h3>';
        seenHtml += `<p style="color:#aaa; font-size:0.7rem">Message: ${escapeHtml(message.text || '')}</p>`;
        seenHtml += `<p style="color:#aaa; font-size:0.7rem">Sent by: ${escapeHtml(message.sender)}</p>`;
        
        if (message.seen && Object.keys(message.seen).length > 0) {
            seenHtml += '<h4 style="margin-top:10px; color:#ff99cc">👁️ Seen by:</h4><div class="seen-list">';
            for (const [user, timestamp] of Object.entries(message.seen)) {
                const date = new Date(timestamp);
                const timeStr = date.toLocaleString();
                seenHtml += `<div class="seen-item">🐔 ${escapeHtml(user)} - ${timeStr}</div>`;
            }
            seenHtml += '</div>';
        } else {
            seenHtml += '<p style="color:#888">No one has seen this message yet</p>';
        }
        
        if (message.delivered && Object.keys(message.delivered).length > 0) {
            seenHtml += '<h4 style="margin-top:10px; color:#88aaff">📬 Delivered to:</h4><div class="seen-list">';
            for (const [user, timestamp] of Object.entries(message.delivered)) {
                const date = new Date(timestamp);
                const timeStr = date.toLocaleString();
                seenHtml += `<div class="seen-item">📨 ${escapeHtml(user)} - ${timeStr}</div>`;
            }
            seenHtml += '</div>';
        }
        
        popup.innerHTML = seenHtml + `<button class="close-popup">Close</button>`;
        document.body.appendChild(popup);
        
        popup.querySelector('.close-popup').addEventListener('click', () => popup.remove());
        popup.addEventListener('click', (e) => {
            if (e.target === popup) popup.remove();
        });
    }
    
    // ========== AUTO-DELETE FUNCTIONS ==========
    
    async function toggleAutoDelete() {
        if (!currentRoom) {
            alert("Join a room first!");
            return;
        }
        
        autoDeleteEnabled = !autoDeleteEnabled;
        const toggleBtn = document.getElementById('autoDeleteToggle');
        
        if (autoDeleteEnabled) {
            toggleBtn.className = 'auto-delete-toggle on';
            toggleBtn.innerHTML = '⏰ Auto-Delete: ON (1hr)';
            startAutoDelete();
            addSystemMessage(`🕐 Auto-delete enabled! Messages will be cleared every hour.`);
        } else {
            toggleBtn.className = 'auto-delete-toggle off';
            toggleBtn.innerHTML = '⏰ Auto-Delete: OFF';
            stopAutoDelete();
            addSystemMessage(`🕐 Auto-delete disabled.`);
        }
        
        if (database && currentRoom) {
            await set(ref(database, `rooms/${currentRoom}/settings/autoDelete`), autoDeleteEnabled);
        }
    }
    
    async function startAutoDelete() {
        stopAutoDelete();
        autoDeleteInterval = setInterval(async () => {
            if (autoDeleteEnabled && currentRoom && database) {
                const oneHourAgo = Date.now() - (60 * 60 * 1000);
                const messagesRef = ref(database, `rooms/${currentRoom}/messages`);
                const snapshot = await get(messagesRef);
                
                if (snapshot.exists()) {
                    const messages = snapshot.val();
                    let deletedCount = 0;
                    
                    for (const [msgId, msg] of Object.entries(messages)) {
                        if (msg.timestampMs && msg.timestampMs < oneHourAgo) {
                            await remove(ref(database, `rooms/${currentRoom}/messages/${msgId}`));
                            deletedCount++;
                        }
                    }
                    
                    if (deletedCount > 0) {
                        addSystemMessage(`🧹 Auto-delete: ${deletedCount} old messages removed`);
                    }
                }
            }
        }, 60 * 1000);
    }
    
    function stopAutoDelete() {
        if (autoDeleteInterval) {
            clearInterval(autoDeleteInterval);
            autoDeleteInterval = null;
        }
    }
    
    async function loadAutoDeleteSetting() {
        if (!database || !currentRoom) return;
        const settingRef = ref(database, `rooms/${currentRoom}/settings/autoDelete`);
        const snapshot = await get(settingRef);
        if (snapshot.exists()) {
            autoDeleteEnabled = snapshot.val();
            const toggleBtn = document.getElementById('autoDeleteToggle');
            if (autoDeleteEnabled) {
                toggleBtn.className = 'auto-delete-toggle on';
                toggleBtn.innerHTML = '⏰ Auto-Delete: ON (1hr)';
                startAutoDelete();
            } else {
                toggleBtn.className = 'auto-delete-toggle off';
                toggleBtn.innerHTML = '⏰ Auto-Delete: OFF';
            }
        }
    }
    
    // ========== AUTH SYSTEM ==========
    async function registerUser(username, password, securityAnswers) {
        if (!database) return { success: false, message: "Database not ready" };
        try {
            const userRef = ref(database, `users/${username}`);
            const snapshot = await get(userRef);
            if (snapshot.exists()) return { success: false, message: "Username already exists!" };
            const hashedPassword = simpleHash(password);
            await set(userRef, {
                username: username,
                password: hashedPassword,
                securityQuestions: securityAnswers,
                createdAt: serverTimestamp(),
                createdAtMs: Date.now()
            });
            return { success: true, message: "Account created!" };
        } catch (error) {
            return { success: false, message: "Error creating account" };
        }
    }
    
    async function loginUser(username, password) {
        if (!database) return { success: false, message: "Database not ready" };
        try {
            const userRef = ref(database, `users/${username}`);
            const snapshot = await get(userRef);
            if (!snapshot.exists()) return { success: false, message: "Username not found!" };
            const userData = snapshot.val();
            const hashedPassword = simpleHash(password);
            if (userData.password === hashedPassword) return { success: true, message: "Login successful!" };
            return { success: false, message: "Wrong password!" };
        } catch (error) {
            return { success: false, message: "Error logging in" };
        }
    }
    
    async function setActiveSession(username) {
        if (!database) return;
        const sessionRef = ref(database, `active_sessions/${username}`);
        await set(sessionRef, {
            username: username,
            loginTimeMs: Date.now(),
            sessionId: Date.now() + '_' + Math.random().toString(36).substr(2, 6)
        });
    }
    
    async function removeActiveSession(username) {
        if (!database || !username) return;
        const sessionRef = ref(database, `active_sessions/${username}`);
        await set(sessionRef, null);
    }
    
    // Simplified auth for brevity - uses prompt (you can keep your full modal version)
    async function initAuth() {
        const savedUsername = localStorage.getItem("hensworld_username");
        if (savedUsername) {
            try {
                const userRef = ref(database, `users/${savedUsername}`);
                const snapshot = await get(userRef);
                if (snapshot.exists()) {
                    currentUsername = savedUsername;
                    await setActiveSession(savedUsername);
                    return savedUsername;
                }
            } catch (e) {}
        }
        
        const username = prompt("🐔 Welcome to Hen's World!\n\nEnter your username:");
        const password = prompt("Enter your password (or create new account):");
        
        if (username && password) {
            const result = await loginUser(username, password);
            if (result.success) {
                currentUsername = username;
                localStorage.setItem("hensworld_username", username);
                await setActiveSession(username);
                return username;
            } else {
                const create = confirm("Account not found. Create new account?");
                if (create) {
                    const q1 = prompt("Security Question 1:\nWhat is your mother's maiden name?\n(Use only letters & numbers, NO spaces)");
                    const q2 = prompt("Security Question 2:\nWhat was the name of your first pet?\n(Use only letters & numbers, NO spaces)");
                    const q3 = prompt("Security Question 3:\nWhat city were you born in?\n(Use only letters & numbers, NO spaces)");
                    
                    const securityAnswers = {
                        "What is your mother's maiden name?": cleanAnswer(q1),
                        "What was the name of your first pet?": cleanAnswer(q2),
                        "What city were you born in?": cleanAnswer(q3)
                    };
                    
                    const regResult = await registerUser(username, password, securityAnswers);
                    if (regResult.success) {
                        currentUsername = username;
                        localStorage.setItem("hensworld_username", username);
                        await setActiveSession(username);
                        return username;
                    } else {
                        alert("Registration failed!");
                    }
                }
            }
        }
        return null;
    }
    
    async function logout() {
        if (currentUsername) {
            await removeActiveSession(currentUsername);
            localStorage.removeItem("hensworld_username");
            currentUsername = null;
            currentRoom = null;
            stopAutoDelete();
            location.reload();
        }
    }
    
    // ========== CHAT FUNCTIONS ==========
    async function initFirebase() {
        try {
            app = initializeApp(firebaseConfig);
            database = getDatabase(app);
            isFirebaseReady = true;
            document.getElementById("connectionStatus").innerHTML = "✅ Secure connection ready";
            return true;
        } catch (error) {
            console.error("Firebase init error:", error);
            return false;
        }
    }
    
    function joinRoom(roomId) {
        if (!database || !isFirebaseReady) return false;
        const cleanRoomId = roomId.trim().replace(/[.#$[\]]/g, '_');
        if (!cleanRoomId) return false;
        if (currentRoom === cleanRoomId) return true;
        
        stopAutoDelete();
        if (messagesRef) messagesRef = null;
        
        currentRoom = cleanRoomId;
        document.getElementById("currentRoomName").innerText = currentRoom;
        document.getElementById("messageInput").disabled = false;
        document.getElementById("sendBtn").disabled = false;
        
        const container = document.getElementById("messagesContainer");
        container.innerHTML = '<div class="loading">🐔 loading messages...</div>';
        
        messagesRef = ref(database, `rooms/${currentRoom}/messages`);
        const messagesQuery = query(messagesRef, limitToLast(100));
        
        onChildAdded(messagesQuery, async (snapshot) => {
            const message = snapshot.val();
            if (message) {
                const messageId = snapshot.key;
                displayMessage(message, messageId);
                
                if (message.sender !== currentUsername) {
                    await markMessageSeen(messageId, message.sender);
                }
            }
        });
        
        onValue(messagesRef, (snapshot) => {
            const messages = snapshot.val();
            if (messages) {
                for (const [msgId, msg] of Object.entries(messages)) {
                    updateMessageStatus(msgId, msg);
                }
            }
        });
        
        setTimeout(() => addSystemMessage(`${currentUsername} 🐔 joined the room`), 300);
        loadAutoDeleteSetting();
        return true;
    }
    
    function updateMessageStatus(messageId, message) {
        const msgElement = document.getElementById(`msg-${messageId}`);
        if (msgElement) {
            const statusSpan = msgElement.querySelector('.message-status');
            if (statusSpan) {
                const status = getMessageStatus(message);
                statusSpan.innerHTML = `<span style="color: ${status.color}"> ${status.icon}</span>`;
                statusSpan.title = status.text;
            }
        }
    }
    
    async function sendMessage(text) {
        if (!text.trim()) return;
        if (!currentRoom) { alert("Join a room first!"); return; }
        
        const messageData = {
            sender: currentUsername,
            text: text.trim(),
            timestamp: serverTimestamp(),
            timestampMs: Date.now(),
            delivered: {},
            seen: {}
        };
        
        try {
            const newMsgRef = await push(ref(database, `rooms/${currentRoom}/messages`), messageData);
            await markMessageDelivered(newMsgRef.key);
            document.getElementById("messageInput").value = "";
        } catch (error) {
            alert("Failed to send message");
        }
    }
    
    async function addSystemMessage(text) {
        if (!currentRoom || !database) return;
        const systemMsg = {
            sender: "🐔 Hen's World",
            text: text,
            timestamp: serverTimestamp(),
            timestampMs: Date.now(),
            isSystem: true
        };
        await push(ref(database, `rooms/${currentRoom}/messages`), systemMsg);
    }
    
    function escapeHtml(str) {
        if (!str) return "";
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }
    
    function displayMessage(message, messageId) {
        const container = document.getElementById("messagesContainer");
        if (!container) return;
        if (container.children.length === 1 && container.children[0].classList?.contains('loading')) container.innerHTML = '';
        
        const msgDiv = document.createElement("div");
        msgDiv.id = `msg-${messageId}`;
        msgDiv.className = "message";
        
        const isOwn = (message.sender === currentUsername);
        const isSystem = message.isSystem === true || message.sender === "🐔 Hen's World";
        
        if (!isSystem) msgDiv.classList.add(isOwn ? 'own-message' : '');
        if (isSystem) msgDiv.classList.add("system-message");
        
        let timeStr = "now";
        if (message.timestampMs) {
            const date = new Date(message.timestampMs);
            timeStr = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }
        
        const status = getMessageStatus(message);
        const statusIcon = isOwn ? `<span style="color: ${status.color}"> ${status.icon}</span>` : '';
        
        const senderDisplay = isSystem ? "🐔 system" : escapeHtml(message.sender);
        
        msgDiv.innerHTML = `
            <div class="message-header">
                <span class="message-sender">${senderDisplay}</span>
                <span class="message-time">${timeStr}</span>
                <span class="message-status" title="${status.text}">${statusIcon}</span>
            </div>
            <div class="message-content">
                <div class="message-bubble">${escapeHtml(message.text || '')}</div>
            </div>
            <div class="message-actions">
                <button class="action-btn info-btn" data-message-id="${messageId}">ℹ️ Info</button>
            </div>
        `;
        
        container.appendChild(msgDiv);
        
        const infoBtn = msgDiv.querySelector('.info-btn');
        if (infoBtn) {
            infoBtn.addEventListener('click', async () => {
                const msgRef = ref(database, `rooms/${currentRoom}/messages/${messageId}`);
                const snapshot = await get(msgRef);
                if (snapshot.exists()) {
                    showInfoPopup(snapshot.val());
                }
            });
        }
        
        container.scrollTop = container.scrollHeight;
    }
    
    function setupUI() {
        const roomInput = document.getElementById("roomInput");
        const joinBtn = document.getElementById("joinRoomBtn");
        const sendBtn = document.getElementById("sendBtn");
        const messageInput = document.getElementById("messageInput");
        const logoutBtn = document.getElementById("logoutBtn");
        const autoDeleteToggle = document.getElementById("autoDeleteToggle");
        
        joinBtn.addEventListener("click", () => {
            let roomVal = roomInput.value.trim();
            if (!roomVal) roomVal = "henhouse-lounge";
            joinRoom(roomVal);
        });
        
        sendBtn.addEventListener("click", () => sendMessage(messageInput.value));
        messageInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                sendMessage(messageInput.value);
            }
        });
        
        logoutBtn.addEventListener("click", logout);
        autoDeleteToggle.addEventListener("click", toggleAutoDelete);
        
        roomInput.value = "henhouse-lounge";
        setTimeout(() => { if (isFirebaseReady && !currentRoom && currentUsername) joinRoom("henhouse-lounge"); }, 800);
    }
    
    function addWatermark() {
        const watermark = document.createElement('div');
        watermark.style.cssText = `position:fixed; bottom:5px; left:5px; right:5px; font-size:9px; color:rgba(150,150,150,0.25); z-index:9998; pointer-events:none; text-align:center;`;
        watermark.innerHTML = `${currentUsername} • ${new Date().toLocaleString()} • hensworld.chat • ✓ Delivered | ✓✓ Seen`;
        document.body.appendChild(watermark);
    }
    
    document.addEventListener('contextmenu', (e) => e.preventDefault());
    window.addEventListener('blur', () => document.querySelector('.app')?.classList.add('screenshot-detected'));
    window.addEventListener('focus', () => setTimeout(() => document.querySelector('.app')?.classList.remove('screenshot-detected'), 300));
    
    async function init() {
        await initFirebase();
        if (isFirebaseReady) {
            await initAuth();
            setupUI();
            addWatermark();
        }
    }
    
    init();
</script>
