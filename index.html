<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Hen's World — Secure Global Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0c0f;
            font-family: 'SF Mono', 'Fira Code', 'Courier New', monospace;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        .app {
            max-width: 800px;
            width: 100%;
            height: 90vh;
            background: #111417;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid #2a2f36;
        }

        .header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid #1e2329;
            background: #0e1115;
        }

        .badge {
            font-size: 0.7rem;
            letter-spacing: 1px;
            color: #6c7a89;
            text-transform: uppercase;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        h1 {
            font-size: 1.7rem;
            font-weight: 500;
            color: #eef2ff;
            letter-spacing: -0.5px;
        }

        .sub {
            color: #6c86a3;
            font-size: 0.8rem;
            margin-top: 6px;
        }

        .room-controls {
            padding: 1rem 1.5rem;
            background: #0b0e12;
            border-bottom: 1px solid #1a1f26;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            justify-content: space-between;
        }

        .room-input-group {
            flex: 3;
            min-width: 180px;
        }

        .room-label {
            font-size: 0.7rem;
            color: #7e8c9e;
            text-transform: uppercase;
            margin-bottom: 4px;
            letter-spacing: 0.5px;
        }

        .room-field {
            display: flex;
            background: #050709;
            border: 1px solid #252b33;
            border-radius: 40px;
            overflow: hidden;
            transition: 0.2s;
        }
        .room-field:focus-within {
            border-color: #3e6b9e;
            box-shadow: 0 0 0 1px #1e3a5f;
        }

        .room-field input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 10px 16px;
            color: #dfe6f0;
            font-family: monospace;
            font-size: 0.9rem;
            outline: none;
        }

        .room-field button {
            background: #1e293b;
            border: none;
            border-left: 1px solid #2d3540;
            padding: 0 20px;
            color: #b9d0f0;
            font-weight: bold;
            font-family: monospace;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.8rem;
        }
        .room-field button:hover {
            background: #2d3e5a;
            color: white;
        }

        .room-status {
            flex: 2;
            text-align: right;
            font-size: 0.85rem;
            background: #07090e;
            padding: 8px 16px;
            border-radius: 40px;
            border: 1px solid #20262e;
        }

        .room-name-badge {
            color: #93c5fd;
            font-weight: 600;
            word-break: break-all;
        }

        .connection-status {
            font-size: 0.7rem;
            margin-top: 4px;
            color: #5f7d9c;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 1.2rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #0f1219;
            scroll-behavior: smooth;
        }

        .message {
            display: flex;
            flex-direction: column;
            animation: fadeSlide 0.2s ease;
        }

        .message-header {
            font-size: 0.7rem;
            color: #5f7f9e;
            margin-bottom: 4px;
            display: flex;
            gap: 12px;
        }

        .message-sender {
            font-weight: 600;
            color: #8db5e5;
        }

        .message-time {
            font-size: 0.65rem;
            color: #4a5b72;
        }

        .message-text {
            background: #181e26;
            padding: 8px 14px;
            border-radius: 18px;
            border-top-left-radius: 4px;
            display: inline-block;
            max-width: 85%;
            word-wrap: break-word;
            color: #eef3ff;
            font-size: 0.9rem;
            line-height: 1.4;
            border: 1px solid #282f39;
            position: relative;
        }

        .message-text::after {
            content: "🔒";
            position: absolute;
            bottom: 2px;
            right: 5px;
            font-size: 8px;
            color: rgba(255,255,255,0.15);
            pointer-events: none;
        }

        .own-message {
            align-items: flex-end;
        }
        .own-message .message-text {
            background: #1e2a3a;
            border-color: #2f4b6e;
            border-top-right-radius: 4px;
            border-top-left-radius: 18px;
        }
        .own-message .message-header {
            justify-content: flex-end;
        }

        .input-area {
            padding: 1rem 1.5rem 1.3rem;
            background: #0b0e12;
            border-top: 1px solid #1a1f26;
        }

        .message-form {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .message-input-wrapper {
            flex: 1;
            background: #05070c;
            border: 1px solid #252b33;
            border-radius: 28px;
            padding: 6px 16px;
            transition: 0.2s;
        }
        .message-input-wrapper:focus-within {
            border-color: #3e6b9e;
        }

        #messageInput {
            width: 100%;
            background: transparent;
            border: none;
            padding: 10px 0;
            color: #edf4ff;
            font-family: monospace;
            font-size: 0.9rem;
            outline: none;
            resize: none;
        }

        #sendBtn {
            background: #1f2a3c;
            border: none;
            border-radius: 40px;
            padding: 10px 24px;
            color: #c0dcff;
            font-weight: bold;
            font-family: monospace;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.8rem;
            border: 1px solid #2f3a48;
        }
        #sendBtn:hover {
            background: #2e405b;
            color: white;
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .messages-container::-webkit-scrollbar {
            width: 6px;
        }
        .messages-container::-webkit-scrollbar-track {
            background: #0a0d12;
        }
        .messages-container::-webkit-scrollbar-thumb {
            background: #2e3a48;
            border-radius: 8px;
        }

        @media (max-width: 550px) {
            .app {
                height: 95vh;
                border-radius: 20px;
            }
            .room-controls {
                flex-direction: column;
                align-items: stretch;
            }
            .room-status {
                text-align: center;
            }
            .message-text {
                max-width: 95%;
            }
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #6c7a89;
        }
        
        .system-message .message-text {
            background: #1a1f2a;
            color: #a0b4d0;
            font-style: italic;
            border-color: #2d3543;
            font-size: 0.8rem;
        }
        
        .system-message .message-sender {
            color: #8aa2c2;
        }

        /* Auth Modal Styles */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s;
        }
        
        .modal-content {
            background: #111417;
            border-radius: 24px;
            padding: 30px;
            max-width: 380px;
            width: 90%;
            border: 1px solid #2a2f36;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        
        .modal-content h2 {
            color: #eef2ff;
            margin-bottom: 10px;
            font-size: 1.5rem;
        }
        
        .modal-content p {
            color: #6c86a3;
            margin-bottom: 20px;
            font-size: 0.85rem;
        }
        
        .auth-input {
            width: 100%;
            background: #050709;
            border: 1px solid #252b33;
            border-radius: 40px;
            padding: 12px 18px;
            color: #dfe6f0;
            font-family: monospace;
            font-size: 1rem;
            margin-bottom: 15px;
            outline: none;
        }
        
        .auth-input:focus {
            border-color: #3e6b9e;
        }
        
        .auth-error {
            color: #ff8888;
            font-size: 0.75rem;
            margin-bottom: 15px;
            display: none;
        }
        
        .auth-buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 15px;
        }
        
        .auth-btn {
            flex: 1;
            padding: 10px;
            border-radius: 40px;
            border: none;
            font-family: monospace;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .auth-btn-primary {
            background: #1e293b;
            color: #b9d0f0;
            border: 1px solid #2f3a48;
        }
        
        .auth-btn-primary:hover {
            background: #2e405b;
            color: white;
        }
        
        .auth-btn-secondary {
            background: #2d1f1f;
            color: #ffaaaa;
            border: 1px solid #8b3a3a;
        }
        
        .auth-switch {
            text-align: center;
            font-size: 0.8rem;
            color: #6c86a3;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .auth-switch span {
            color: #93c5fd;
            text-decoration: underline;
        }
        
        .screenshot-detected {
            filter: blur(10px);
            transition: filter 0.3s;
        }
        
        .screenshot-warning {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            color: red;
            font-size: 1.5rem;
            text-align: center;
            flex-direction: column;
            gap: 20px;
            animation: fadeIn 0.2s;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .password-toggle {
            position: relative;
        }
        
        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #6c86a3;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<div class="app">
    <div class="header">
        <div class="badge">🐔 secure global messenger · hen's world</div>
        <h1>Hen's World Chat</h1>
        <div class="sub">secure · password protected · worldwide</div>
    </div>

    <div class="room-controls">
        <div class="room-input-group">
            <div class="room-label">🔗 room identifier</div>
            <div class="room-field">
                <input type="text" id="roomInput" placeholder="e.g., coop-chat, hens-den, global-lounge" autocomplete="off">
                <button id="joinRoomBtn">join</button>
            </div>
        </div>
        <div class="room-status">
            🌀 ROOM // <span id="currentRoomName" class="room-name-badge">—</span>
            <div class="connection-status" id="connectionStatus">connecting...</div>
        </div>
    </div>

    <div class="messages-container" id="messagesContainer">
        <div class="loading">✨ Welcome to Hen's World! Join a room to start chatting...</div>
    </div>

    <div class="input-area">
        <div class="message-form">
            <div class="message-input-wrapper">
                <textarea id="messageInput" rows="1" placeholder="type message... (enter to send)" disabled></textarea>
            </div>
            <button id="sendBtn" disabled>send ➤</button>
        </div>
    </div>
</div>

<!-- Firebase SDK with your actual configuration -->
<script type="module">
    // Import Firebase modules
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded, query, limitToLast, serverTimestamp, get, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    
    // Simple hash function for password (not for production, but works for this use)
    function simpleHash(str) {
        let hash = 0;
        for (let i = 0; i < str.length; i++) {
            const char = str.charCodeAt(i);
            hash = ((hash << 5) - hash) + char;
            hash = hash & hash;
        }
        return hash.toString(16);
    }
    
    // ==================== FIREBASE CONFIG ====================
    const firebaseConfig = {
        apiKey: "AIzaSyDb0fuG5RUoTtNUuJ10n_A4NCC2GFDaOps",
        authDomain: "hen-s-world.firebaseapp.com",
        projectId: "hen-s-world",
        storageBucket: "hen-s-world.firebasestorage.app",
        messagingSenderId: "359865594843",
        appId: "1:359865594843:web:3da81e9f7c00bba183adfe"
    };
    // =========================================================
    
    let app;
    let database;
    let messagesRef = null;
    let currentRoom = null;
    let currentUsername = null;
    let isFirebaseReady = false;
    
    // ========== PASSWORD AUTHENTICATION SYSTEM ==========
    
    // Register new user with password
    async function registerUser(username, password) {
        if (!database) return { success: false, message: "Database not ready" };
        
        try {
            // Check if user exists
            const userRef = ref(database, `users/${username}`);
            const snapshot = await get(userRef);
            
            if (snapshot.exists()) {
                return { success: false, message: "Username already exists!" };
            }
            
            // Store user with hashed password
            const hashedPassword = simpleHash(password);
            await set(userRef, {
                username: username,
                password: hashedPassword,
                createdAt: serverTimestamp(),
                createdAtMs: Date.now()
            });
            
            return { success: true, message: "Account created!" };
        } catch (error) {
            console.error("Register error:", error);
            return { success: false, message: "Error creating account" };
        }
    }
    
    // Login existing user
    async function loginUser(username, password) {
        if (!database) return { success: false, message: "Database not ready" };
        
        try {
            const userRef = ref(database, `users/${username}`);
            const snapshot = await get(userRef);
            
            if (!snapshot.exists()) {
                return { success: false, message: "Username not found!" };
            }
            
            const userData = snapshot.val();
            const hashedPassword = simpleHash(password);
            
            if (userData.password === hashedPassword) {
                return { success: true, message: "Login successful!" };
            } else {
                return { success: false, message: "Wrong password!" };
            }
        } catch (error) {
            console.error("Login error:", error);
            return { success: false, message: "Error logging in" };
        }
    }
    
    // Track active session
    async function setActiveSession(username) {
        if (!database) return;
        
        try {
            const sessionRef = ref(database, `active_sessions/${username}`);
            await set(sessionRef, {
                username: username,
                loginTime: serverTimestamp(),
                loginTimeMs: Date.now(),
                sessionId: Date.now() + '_' + Math.random().toString(36).substr(2, 6)
            });
        } catch (error) {
            console.error("Session error:", error);
        }
    }
    
    // Remove active session
    async function removeActiveSession(username) {
        if (!database || !username) return;
        
        try {
            const sessionRef = ref(database, `active_sessions/${username}`);
            await set(sessionRef, null);
        } catch (error) {
            console.error("Remove session error:", error);
        }
    }
    
    // Show authentication modal (Login/Register)
    function showAuthModal() {
        return new Promise((resolve) => {
            let isLoginMode = true;
            
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `
                <div class="modal-content">
                    <h2 id="authTitle">🐔 Login to Hen's World</h2>
                    <p id="authDesc">Enter your username and password</p>
                    <input type="text" id="authUsername" class="auth-input" placeholder="Username" autocomplete="off">
                    <div style="position: relative;">
                        <input type="password" id="authPassword" class="auth-input" placeholder="Password" autocomplete="off">
                        <span class="toggle-password" onclick="togglePassword()">👁️</span>
                    </div>
                    <div id="authError" class="auth-error"></div>
                    <div class="auth-buttons">
                        <button id="authSubmitBtn" class="auth-btn auth-btn-primary">Login</button>
                    </div>
                    <div class="auth-switch" id="authSwitch">
                        Don't have an account? <span>Register</span>
                    </div>
                </div>
            `;
            
            document.body.appendChild(modal);
            
            const usernameInput = modal.querySelector('#authUsername');
            const passwordInput = modal.querySelector('#authPassword');
            const errorDiv = modal.querySelector('#authError');
            const submitBtn = modal.querySelector('#authSubmitBtn');
            const authTitle = modal.querySelector('#authTitle');
            const authDesc = modal.querySelector('#authDesc');
            const authSwitch = modal.querySelector('#authSwitch');
            
            // Add toggle password function to window
            window.togglePassword = () => {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
            };
            
            setTimeout(() => usernameInput.focus(), 100);
            
            const updateMode = () => {
                if (isLoginMode) {
                    authTitle.innerHTML = '🐔 Login to Hen\'s World';
                    authDesc.innerHTML = 'Enter your username and password';
                    submitBtn.innerHTML = 'Login';
                    authSwitch.innerHTML = 'Don\'t have an account? <span>Register</span>';
                } else {
                    authTitle.innerHTML = '📝 Create Account';
                    authDesc.innerHTML = 'Choose a username and password';
                    submitBtn.innerHTML = 'Register';
                    authSwitch.innerHTML = 'Already have an account? <span>Login</span>';
                }
            };
            
            authSwitch.addEventListener('click', () => {
                isLoginMode = !isLoginMode;
                updateMode();
                errorDiv.style.display = 'none';
                usernameInput.value = '';
                passwordInput.value = '';
            });
            
            const handleSubmit = async () => {
                const username = usernameInput.value.trim();
                const password = passwordInput.value;
                
                if (username.length < 3) {
                    errorDiv.style.display = 'block';
                    errorDiv.innerHTML = '❌ Username must be at least 3 characters';
                    return;
                }
                
                if (password.length < 3) {
                    errorDiv.style.display = 'block';
                    errorDiv.innerHTML = '❌ Password must be at least 3 characters';
                    return;
                }
                
                errorDiv.style.display = 'block';
                errorDiv.innerHTML = '⏳ Processing...';
                errorDiv.style.color = '#fbbf24';
                
                let result;
                if (isLoginMode) {
                    result = await loginUser(username, password);
                } else {
                    result = await registerUser(username, password);
                }
                
                if (result.success) {
                    await setActiveSession(username);
                    modal.remove();
                    resolve(username);
                } else {
                    errorDiv.style.display = 'block';
                    errorDiv.innerHTML = `❌ ${result.message}`;
                    errorDiv.style.color = '#ff8888';
                    modal.classList.add('username-taken');
                    setTimeout(() => modal.classList.remove('username-taken'), 300);
                }
            };
            
            submitBtn.addEventListener('click', handleSubmit);
            
            usernameInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') handleSubmit();
            });
            
            passwordInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') handleSubmit();
            });
        });
    }
    
    // Initialize auth system
    async function initAuth() {
        // Check for saved login
        const savedUsername = localStorage.getItem("hensworld_username");
        const savedSession = localStorage.getItem("hensworld_session");
        
        if (savedUsername && savedSession) {
            // Try to restore session
            try {
                const userRef = ref(database, `users/${savedUsername}`);
                const snapshot = await get(userRef);
                if (snapshot.exists()) {
                    currentUsername = savedUsername;
                    await setActiveSession(savedUsername);
                    return savedUsername;
                }
            } catch (e) {
                console.log("Session restore failed");
            }
        }
        
        // Show login modal
        const username = await showAuthModal();
        if (username) {
            currentUsername = username;
            localStorage.setItem("hensworld_username", username);
            localStorage.setItem("hensworld_session", Date.now().toString());
            return username;
        }
        return null;
    }
    
    // Initialize Firebase
    async function initFirebase() {
        try {
            app = initializeApp(firebaseConfig);
            database = getDatabase(app);
            isFirebaseReady = true;
            
            const statusEl = document.getElementById("connectionStatus");
            statusEl.innerHTML = "✅ Secure connection · ready";
            statusEl.style.color = "#10b981";
            
            console.log("🔥 Hen's World Secure Chat initialized");
            return true;
        } catch (error) {
            console.error("Firebase init error:", error);
            const statusEl = document.getElementById("connectionStatus");
            statusEl.innerHTML = "❌ Connection failed";
            statusEl.style.color = "#f87171";
            isFirebaseReady = false;
            return false;
        }
    }
    
    // Join a room
    function joinRoom(roomId) {
        if (!database || !isFirebaseReady) {
            alert("Connecting... Please wait.");
            return false;
        }
        
        const cleanRoomId = roomId.trim().replace(/[.#$[\]]/g, '_');
        if (!cleanRoomId) return false;
        
        if (currentRoom === cleanRoomId) return true;
        
        if (messagesRef) messagesRef = null;
        
        currentRoom = cleanRoomId;
        document.getElementById("currentRoomName").innerText = currentRoom;
        
        const msgInput = document.getElementById("messageInput");
        const sendBtn = document.getElementById("sendBtn");
        msgInput.disabled = false;
        sendBtn.disabled = false;
        msgInput.focus();
        
        const container = document.getElementById("messagesContainer");
        container.innerHTML = '<div class="loading">🐔 joining room... loading messages</div>';
        
        messagesRef = ref(database, `rooms/${currentRoom}/messages`);
        const messagesQuery = query(messagesRef, limitToLast(100));
        
        onChildAdded(messagesQuery, (snapshot) => {
            const message = snapshot.val();
            if (message) displayMessage(message);
        });
        
        setTimeout(() => {
            if (currentRoom === cleanRoomId) {
                addSystemMessage(`${currentUsername} 🐔 joined the room`);
            }
        }, 300);
        
        return true;
    }
    
    // Send message
    async function sendMessage(text) {
        if (!text.trim()) return false;
        if (!currentRoom) {
            alert("Join a room first!");
            return false;
        }
        
        const messageData = {
            sender: currentUsername,
            text: text.trim(),
            timestamp: serverTimestamp(),
            timestampMs: Date.now(),
            type: "user"
        };
        
        try {
            await push(ref(database, `rooms/${currentRoom}/messages`), messageData);
            document.getElementById("messageInput").value = "";
            return true;
        } catch (error) {
            console.error("Send error:", error);
            alert("Failed to send message.");
            return false;
        }
    }
    
    // Add system message
    async function addSystemMessage(text) {
        if (!currentRoom || !database) return;
        
        const systemMsg = {
            sender: "🐔 Hen's World",
            text: text,
            timestamp: serverTimestamp(),
            timestampMs: Date.now(),
            isSystem: true,
            type: "system"
        };
        
        try {
            await push(ref(database, `rooms/${currentRoom}/messages`), systemMsg);
        } catch (error) {
            console.warn("System message error:", error);
        }
    }
    
    // Escape HTML
    function escapeHtml(str) {
        if (!str) return "";
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }
    
    // Display message
    function displayMessage(message) {
        const container = document.getElementById("messagesContainer");
        if (!container) return;
        
        if (container.children.length === 1 && container.children[0].classList?.contains('loading')) {
            container.innerHTML = '';
        }
        
        const msgDiv = document.createElement("div");
        const isOwn = (message.sender === currentUsername);
        const isSystem = message.isSystem === true || message.type === "system" || message.sender === "🐔 Hen's World";
        
        if (isSystem) {
            msgDiv.className = "message system-message";
        } else {
            msgDiv.className = `message ${isOwn ? 'own-message' : ''}`;
        }
        
        let timeStr = "now";
        if (message.timestampMs) {
            const date = new Date(message.timestampMs);
            timeStr = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }
        
        const senderDisplay = isSystem ? "🐔 system" : escapeHtml(message.sender);
        
        msgDiv.innerHTML = `
            <div class="message-header">
                <span class="message-sender">${senderDisplay}</span>
                <span class="message-time">${timeStr}</span>
            </div>
            <div class="message-text">${escapeHtml(message.text)}</div>
        `;
        
        container.appendChild(msgDiv);
        container.scrollTop = container.scrollHeight;
    }
    
    // Setup UI
    function setupUI() {
        const roomInput = document.getElementById("roomInput");
        const joinBtn = document.getElementById("joinRoomBtn");
        const sendBtn = document.getElementById("sendBtn");
        const messageInput = document.getElementById("messageInput");
        
        joinBtn.addEventListener("click", () => {
            let roomVal = roomInput.value.trim();
            if (!roomVal) roomVal = "henhouse-lounge";
            joinRoom(roomVal);
        });
        
        sendBtn.addEventListener("click", () => sendMessage(messageInput.value));
        
        messageInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                sendMessage(messageInput.value);
            }
        });
        
        roomInput.value = "henhouse-lounge";
        
        setTimeout(() => {
            if (isFirebaseReady && !currentRoom && currentUsername) {
                joinRoom("henhouse-lounge");
            }
        }, 800);
    }
    
    // Update status
    function updateStatusWithUser() {
        const statusDiv = document.getElementById("connectionStatus");
        if (statusDiv && currentUsername) {
            statusDiv.innerHTML = `👤 ${escapeHtml(currentUsername)} · 🔒 secured`;
        }
    }
    
    // Cleanup
    window.addEventListener('beforeunload', () => {
        if (currentUsername) removeActiveSession(currentUsername);
    });
    
    // Screenshot prevention
    function showScreenshotWarning(message = '📸 Screenshots are disabled!') {
        const existingWarning = document.querySelector('.screenshot-warning');
        if (existingWarning) existingWarning.remove();
        
        const warning = document.createElement('div');
        warning.className = 'screenshot-warning';
        warning.innerHTML = `
            <div style="background: #1a1f2e; padding: 30px; border-radius: 20px; border: 2px solid #ff4444; max-width: 80%;">
                <div style="font-size: 3rem;">🚫</div>
                <div style="font-size: 1.2rem; margin: 15px 0; color: #ff8888;">${message}</div>
                <div style="font-size: 0.8rem; color: #aaa;">Messages are protected</div>
                <button onclick="this.parentElement.parentElement.remove()" style="margin-top: 20px; background: #ff4444; border: none; padding: 8px 20px; border-radius: 20px; color: white;">OK</button>
            </div>
        `;
        document.body.appendChild(warning);
        setTimeout(() => warning.remove(), 3000);
    }
    
    document.addEventListener('contextmenu', (e) => e.preventDefault());
    
    function addWatermark() {
        const watermark = document.createElement('div');
        watermark.style.cssText = `
            position: fixed;
            bottom: 5px;
            left: 5px;
            right: 5px;
            font-size: 9px;
            color: rgba(150,150,150,0.25);
            z-index: 9998;
            pointer-events: none;
            font-family: monospace;
            text-align: center;
        `;
        watermark.innerHTML = `${currentUsername || 'user'} • ${new Date().toLocaleString()} • secured • hensworld.chat`;
        document.body.appendChild(watermark);
    }
    
    window.addEventListener('blur', () => {
        document.querySelector('.app')?.classList.add('screenshot-detected');
    });
    
    window.addEventListener('focus', () => {
        setTimeout(() => document.querySelector('.app')?.classList.remove('screenshot-detected'), 300);
    });
    
    // ========== INITIALIZATION ==========
    async function init() {
        await initFirebase();
        if (isFirebaseReady) {
            await initAuth();
            setupUI();
            updateStatusWithUser();
            addWatermark();
            
            setTimeout(() => {
                if (!currentRoom) joinRoom("henhouse-lounge");
            }, 800);
        }
    }
    
    init();
</script>
</body>
    </html>
