<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Hen's World — Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0c0f;
            font-family: 'SF Mono', 'Fira Code', 'Courier New', monospace;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .app {
            max-width: 800px;
            width: 100%;
            height: 90vh;
            background: #111417;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid #2a2f36;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .header {
            padding: 0.8rem 1.2rem;
            border-bottom: 1px solid #1e2329;
            background: #0e1115;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .badge { font-size: 0.65rem; color: #6c7a89; text-transform: uppercase; margin-bottom: 0.2rem; }
        h1 { font-size: 1.4rem; font-weight: 500; color: #eef2ff; }
        .logout-btn {
            background: #2d1f1f;
            border: 1px solid #8b3a3a;
            border-radius: 40px;
            padding: 6px 14px;
            color: #ffaaaa;
            font-family: monospace;
            font-size: 0.75rem;
            font-weight: bold;
            cursor: pointer;
        }
        .logout-btn:hover { background: #4a2a2a; }

        .user-bar {
            background: #0b0e12;
            border-bottom: 1px solid #1a1f26;
            padding: 6px 1.2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }
        .user-info { display: flex; align-items: center; gap: 6px; font-size: 0.75rem; color: #93c5fd; }
        .username-display { font-weight: bold; color: #8db5e5; }
        .user-bar-buttons { display: flex; gap: 8px; }
        .online-btn, .auto-delete-select {
            background: #1e293b;
            border: 1px solid #2f3a48;
            border-radius: 40px;
            padding: 4px 10px;
            font-size: 0.65rem;
            cursor: pointer;
            color: #b9d0f0;
            font-family: monospace;
        }
        .online-btn:hover { background: #2e405b; }

        .room-controls { padding: 0.5rem 1.2rem; background: #0b0e12; border-bottom: 1px solid #1a1f26; }
        .room-label { font-size: 0.6rem; color: #7e8c9e; text-transform: uppercase; margin-bottom: 3px; }
        .room-field {
            display: flex;
            background: #050709;
            border: 1px solid #252b33;
            border-radius: 40px;
            overflow: hidden;
        }
        .room-field input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 6px 14px;
            color: #dfe6f0;
            font-family: monospace;
            font-size: 0.8rem;
            outline: none;
        }
        .room-field button {
            background: #1e293b;
            border: none;
            border-left: 1px solid #2d3540;
            padding: 0 14px;
            color: #b9d0f0;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.7rem;
        }
        .room-field button:hover { background: #2d3e5a; }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 1rem 1.2rem;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: #0f1219;
        }
        .message { display: flex; flex-direction: column; animation: fadeSlide 0.2s ease; }
        .message-content { display: flex; align-items: flex-end; gap: 6px; }
        .message-bubble {
            background: #181e26;
            padding: 8px 14px;
            border-radius: 18px;
            border-top-left-radius: 4px;
            max-width: 85%;
            word-wrap: break-word;
            word-break: break-word;
            color: #eef3ff;
            font-size: 0.95rem;
            font-weight: 500;
            line-height: 1.4;
            border: 1px solid #282f39;
        }
        .own-message { align-items: flex-end; }
        .own-message .message-bubble {
            background: #1e2a3a;
            border-color: #2f4b6e;
            border-top-right-radius: 4px;
            border-top-left-radius: 18px;
        }
        .own-message .message-content { justify-content: flex-end; }
        .message-header {
            font-size: 0.7rem;
            color: #5f7f9e;
            margin-bottom: 4px;
            display: flex;
            gap: 8px;
        }
        .message-sender { font-weight: 600; color: #8db5e5; }
        .message-time { font-size: 0.65rem; color: #4a5b72; }

        .system-message { align-items: center !important; }
        .system-message .message-content { justify-content: center !important; }
        .system-message .message-bubble {
            background: #2a2f3a;
            border: 1px solid #4a5b72;
            color: #a0b4d0;
            font-style: italic;
            font-size: 0.75rem;
            text-align: center;
            border-radius: 20px;
            padding: 5px 18px;
            max-width: 80%;
        }
        .system-message .message-header { display: none; }

        .input-area { padding: 0.8rem 1.2rem 1rem; background: #0b0e12; border-top: 1px solid #1a1f26; }
        .message-form { display: flex; gap: 10px; align-items: flex-end; }
        .message-input-wrapper {
            flex: 1;
            background: #05070c;
            border: 1px solid #252b33;
            border-radius: 28px;
            padding: 5px 14px;
        }
        .message-input-wrapper:focus-within { border-color: #3e6b9e; }
        #messageInput {
            width: 100%;
            background: transparent;
            border: none;
            padding: 8px 0;
            color: #edf4ff;
            font-family: monospace;
            font-size: 0.9rem;
            font-weight: 500;
            outline: none;
            resize: none;
        }
        #sendBtn {
            background: #1f2a3c;
            border: none;
            border-radius: 40px;
            padding: 8px 20px;
            color: #c0dcff;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.8rem;
            border: 1px solid #2f3a48;
        }
        #sendBtn:hover { background: #2e405b; }

        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .messages-container::-webkit-scrollbar { width: 5px; }
        .messages-container::-webkit-scrollbar-track { background: #0a0d12; }
        .messages-container::-webkit-scrollbar-thumb { background: #2e3a48; border-radius: 8px; }
        .loading { text-align: center; padding: 20px; color: #6c7a89; font-size: 0.8rem; }

        /* Online Popup */
        .online-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #1a1f2e;
            border: 1px solid #3e6b9e;
            border-radius: 16px;
            padding: 16px;
            z-index: 10001;
            max-width: 280px;
            width: 80%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .online-popup h3 { color: #eef2ff; margin-bottom: 12px; font-size: 1rem; }
        .online-list { max-height: 180px; overflow-y: auto; }
        .online-item { padding: 6px; border-bottom: 1px solid #2a2f36; color: #b9d0f0; font-size: 0.75rem; display: flex; align-items: center; gap: 8px; }
        .status-dot { width: 8px; height: 8px; background: #10b981; border-radius: 50%; display: inline-block; }
        .close-popup { margin-top: 12px; background: #2e405b; border: none; padding: 6px 12px; border-radius: 16px; color: white; cursor: pointer; width: 100%; font-size: 0.7rem; }

        /* Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s;
        }
        .modal-content {
            background: #111417;
            border-radius: 24px;
            padding: 30px;
            max-width: 380px;
            width: 90%;
            border: 1px solid #2a2f36;
        }
        .modal-content h2 { color: #eef2ff; margin-bottom: 10px; font-size: 1.5rem; }
        .modal-content p { color: #6c86a3; margin-bottom: 20px; font-size: 0.85rem; }
        .auth-input {
            width: 100%;
            background: #050709;
            border: 1px solid #252b33;
            border-radius: 40px;
            padding: 12px 18px;
            color: #dfe6f0;
            font-family: monospace;
            font-size: 1rem;
            margin-bottom: 15px;
            outline: none;
        }
        .auth-input:focus { border-color: #3e6b9e; }
        .auth-error { color: #ff8888; font-size: 0.75rem; margin-bottom: 15px; display: none; }
        .auth-buttons { display: flex; gap: 12px; margin-bottom: 15px; }
        .auth-btn {
            flex: 1;
            padding: 10px;
            border-radius: 40px;
            border: none;
            font-family: monospace;
            font-weight: bold;
            cursor: pointer;
        }
        .auth-btn-primary { background: #1e293b; color: #b9d0f0; border: 1px solid #2f3a48; }
        .auth-btn-primary:hover { background: #2e405b; color: white; }
        .auth-btn-secondary { background: #2d1f1f; color: #ffaaaa; border: 1px solid #8b3a3a; }
        .auth-switch { text-align: center; font-size: 0.8rem; color: #6c86a3; cursor: pointer; margin-top: 10px; }
        .auth-switch span { color: #93c5fd; text-decoration: underline; }
        .security-note {
            background: #1a1f2a;
            border-left: 3px solid #fbbf24;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 0.7rem;
            color: #fbbf24;
        }
        .screenshot-detected { filter: blur(10px); transition: filter 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @media (max-width: 550px) {
            .message-bubble { max-width: 95%; font-size: 0.9rem; }
            .user-bar-buttons { gap: 5px; }
        }
    </style>
</head>
<body>

<div class="app">
    <div class="header">
        <div class="header-left">
            <div class="badge">🐔 hen's world</div>
            <h1>Hen's World Chat</h1>
        </div>
        <button id="logoutBtn" class="logout-btn">🚪 Logout</button>
    </div>

    <div class="user-bar">
        <div class="user-info">
            <span>👤</span>
            <span id="usernameDisplay" class="username-display">—</span>
        </div>
        <div class="user-bar-buttons">
            <button id="onlinePeopleBtn" class="online-btn">👥 Online</button>
            <select id="autoDeleteSelect" class="auto-delete-select">
                <option value="off">⏰ Auto: OFF</option>
                <option value="1hour">⏰ 1 Hour</option>
                <option value="24hour">⏰ 24 Hours</option>
                <option value="immediate">⚡ Immediate</option>
            </select>
        </div>
    </div>

    <div class="room-controls">
        <div class="room-label">🔗 room</div>
        <div class="room-field">
            <input type="text" id="roomInput" placeholder="room name" autocomplete="off">
            <button id="joinRoomBtn">join</button>
        </div>
    </div>

    <div class="messages-container" id="messagesContainer">
        <div class="loading">✨ Welcome! Join a room to start chatting...</div>
    </div>

    <div class="input-area">
        <div class="message-form">
            <div class="message-input-wrapper">
                <textarea id="messageInput" rows="1" placeholder="type message... (enter to send)" disabled></textarea>
            </div>
            <button id="sendBtn" disabled>send ➤</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded, query, limitToLast, serverTimestamp, get, set, onValue, remove, onDisconnect } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    
    const firebaseConfig = {
        apiKey: "AIzaSyDb0fuG5RUoTtNUuJ10n_A4NCC2GFDaOps",
        authDomain: "hen-s-world.firebaseapp.com",
        projectId: "hen-s-world",
        storageBucket: "hen-s-world.firebasestorage.app",
        messagingSenderId: "359865594843",
        appId: "1:359865594843:web:3da81e9f7c00bba183adfe"
    };
    
    let app, database;
    let currentRoom = null;
    let currentUsername = null;
    let isFirebaseReady = false;
    let autoDeleteMode = "off";
    let autoDeleteInterval = null;
    
    // Helper functions
    function escapeHtml(str) {
        if (!str) return "";
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }
    
    function simpleHash(str) {
        let hash = 0;
        for (let i = 0; i < str.length; i++) {
            const char = str.charCodeAt(i);
            hash = ((hash << 5) - hash) + char;
            hash = hash & hash;
        }
        return hash.toString(16);
    }
    
    function cleanAnswer(answer) {
        if (!answer) return "";
        return answer.toUpperCase().replace(/[^A-Z0-9]/g, '');
    }
    
    // ========== AUTH SYSTEM ==========
    const securityQuestions = [
        "What is your mother's maiden name?",
        "What was the name of your first pet?",
        "What city were you born in?"
    ];
    
    function showSecurityQuestionsModal() {
        return new Promise((resolve) => {
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `
                <div class="modal-content">
                    <h2>🔐 Security Questions</h2>
                    <div class="security-note">⚠️ Use ONLY letters (A-Z) and numbers (0-9). NO spaces. Answers will be stored in CAPITAL LETTERS.</div>
                    <p>Please answer these 3 security questions:</p>
                    <div id="questionsContainer"></div>
                    <div id="securityError" class="auth-error"></div>
                    <div class="auth-buttons">
                        <button id="securitySubmitBtn" class="auth-btn auth-btn-primary">Submit & Continue</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            
            const container = modal.querySelector('#questionsContainer');
            const errorDiv = modal.querySelector('#securityError');
            const submitBtn = modal.querySelector('#securitySubmitBtn');
            const answers = {};
            
            securityQuestions.forEach((q, i) => {
                const div = document.createElement('div');
                div.style.marginBottom = '15px';
                div.innerHTML = `<label style="color:#8db5e5;font-size:0.75rem;display:block;margin-bottom:5px;">${i+1}. ${q}</label>
                                <input type="text" id="ans_${i}" class="auth-input" placeholder="Your answer (A-Z, 0-9 only)">`;
                container.appendChild(div);
                answers[q] = div.querySelector(`#ans_${i}`);
            });
            
            const handleSubmit = () => {
                const securityAnswers = {};
                for (let i = 0; i < securityQuestions.length; i++) {
                    const q = securityQuestions[i];
                    const ans = answers[q].value.trim();
                    const cleaned = cleanAnswer(ans);
                    if (cleaned.length < 2) {
                        errorDiv.style.display = 'block';
                        errorDiv.innerHTML = `❌ Please answer question ${i+1} (min 2 chars, no spaces)`;
                        return;
                    }
                    securityAnswers[q] = cleaned;
                }
                modal.remove();
                resolve(securityAnswers);
            };
            submitBtn.addEventListener('click', handleSubmit);
            securityQuestions.forEach((_, i) => {
                document.getElementById(`ans_${i}`).addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSubmit(); });
            });
        });
    }
    
    async function registerUser(username, password, securityAnswers) {
        const userRef = ref(database, `users/${username}`);
        const snapshot = await get(userRef);
        if (snapshot.exists()) return { success: false, message: "Username already exists!" };
        await set(userRef, {
            username, password: simpleHash(password), securityQuestions: securityAnswers,
            createdAt: serverTimestamp(), createdAtMs: Date.now()
        });
        return { success: true };
    }
    
    async function loginUser(username, password) {
        const userRef = ref(database, `users/${username}`);
        const snapshot = await get(userRef);
        if (!snapshot.exists()) return { success: false, message: "Username not found!" };
        const userData = snapshot.val();
        if (userData.password === simpleHash(password)) return { success: true };
        return { success: false, message: "Wrong password!" };
    }
    
    function showAuthModal() {
        return new Promise((resolve) => {
            let isLogin = true;
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `
                <div class="modal-content">
                    <h2 id="authTitle">🐔 Login to Hen's World</h2>
                    <p id="authDesc">Enter your username and password</p>
                    <input type="text" id="authUsername" class="auth-input" placeholder="Username">
                    <input type="password" id="authPassword" class="auth-input" placeholder="Password">
                    <div id="authError" class="auth-error"></div>
                    <div class="auth-buttons">
                        <button id="authSubmitBtn" class="auth-btn auth-btn-primary">Login</button>
                    </div>
                    <div class="auth-switch" id="authSwitch">Don't have an account? <span>Register</span></div>
                </div>
            `;
            document.body.appendChild(modal);
            
            const uname = modal.querySelector('#authUsername');
            const pwd = modal.querySelector('#authPassword');
            const err = modal.querySelector('#authError');
            const submit = modal.querySelector('#authSubmitBtn');
            const title = modal.querySelector('#authTitle');
            const desc = modal.querySelector('#authDesc');
            const switchBtn = modal.querySelector('#authSwitch');
            
            const updateMode = () => {
                if (isLogin) {
                    title.innerHTML = '🐔 Login to Hen\'s World';
                    desc.innerHTML = 'Enter your username and password';
                    submit.innerHTML = 'Login';
                    switchBtn.innerHTML = 'Don\'t have an account? <span>Register</span>';
                } else {
                    title.innerHTML = '📝 Create Account';
                    desc.innerHTML = 'Choose a username and password';
                    submit.innerHTML = 'Register';
                    switchBtn.innerHTML = 'Already have an account? <span>Login</span>';
                }
                err.style.display = 'none';
                uname.value = '';
                pwd.value = '';
            };
            
            switchBtn.addEventListener('click', () => { isLogin = !isLogin; updateMode(); });
            
            const handleSubmit = async () => {
                const username = uname.value.trim();
                const password = pwd.value;
                if (username.length < 3 || password.length < 3) {
                    err.style.display = 'block';
                    err.innerHTML = '❌ Username and password must be at least 3 characters';
                    return;
                }
                err.style.display = 'block';
                err.innerHTML = '⏳ Processing...';
                err.style.color = '#fbbf24';
                
                if (isLogin) {
                    const result = await loginUser(username, password);
                    if (result.success) {
                        modal.remove();
                        resolve(username);
                    } else {
                        err.style.display = 'block';
                        err.innerHTML = `❌ ${result.message}`;
                        err.style.color = '#ff8888';
                    }
                } else {
                    const securityAnswers = await showSecurityQuestionsModal();
                    const result = await registerUser(username, password, securityAnswers);
                    if (result.success) {
                        modal.remove();
                        resolve(username);
                    } else {
                        err.style.display = 'block';
                        err.innerHTML = `❌ ${result.message}`;
                        err.style.color = '#ff8888';
                    }
                }
            };
            
            submit.addEventListener('click', handleSubmit);
            uname.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSubmit(); });
            pwd.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSubmit(); });
            setTimeout(() => uname.focus(), 100);
        });
    }
    
    async function initAuth() {
        const saved = localStorage.getItem("hensworld_username");
        if (saved) {
            const userRef = ref(database, `users/${saved}`);
            const snap = await get(userRef);
            if (snap.exists()) {
                currentUsername = saved;
                document.getElementById("usernameDisplay").innerText = currentUsername;
                return;
            }
        }
        const username = await showAuthModal();
        if (username) {
            currentUsername = username;
            localStorage.setItem("hensworld_username", username);
            document.getElementById("usernameDisplay").innerText = currentUsername;
        }
    }
    
    // ========== ONLINE USERS ==========
    async function updateOnlineStatus() {
        if (!currentRoom || !currentUsername) return;
        const onlineRef = ref(database, `rooms/${currentRoom}/online/${currentUsername}`);
        await set(onlineRef, { username: currentUsername, lastSeen: serverTimestamp(), lastSeenMs: Date.now() });
        onDisconnect(onlineRef).remove();
    }
    
    window.showOnlineUsers = async function() {
        if (!currentRoom) { alert("Join a room first!"); return; }
        const onlineRef = ref(database, `rooms/${currentRoom}/online`);
        const snap = await get(onlineRef);
        const popup = document.createElement('div');
        popup.className = 'online-popup';
        let html = '<h3>👥 Online Users</h3>';
        if (snap.exists()) {
            const users = Object.keys(snap.val());
            if (users.length === 0) html += '<p style="color:#888">No one else is online</p>';
            else {
                html += '<div class="online-list">';
                users.forEach(u => { html += `<div class="online-item"><span class="status-dot"></span> 🐔 ${escapeHtml(u)}</div>`; });
                html += '</div>';
                html += `<p style="color:#6c86a3;font-size:0.7rem;margin-top:10px">${users.length} user(s) online</p>`;
            }
        } else html += '<p style="color:#888">No one else is online</p>';
        popup.innerHTML = html + `<button class="close-popup">Close</button>`;
        document.body.appendChild(popup);
        popup.querySelector('.close-popup').onclick = () => popup.remove();
        popup.onclick = (e) => { if (e.target === popup) popup.remove(); };
    };
    
    // ========== AUTO DELETE ==========
    async function saveAutoDeleteMode(mode) {
        if (!currentRoom) return;
        await set(ref(database, `rooms/${currentRoom}/settings/autoDelete`), mode);
    }
    
    async function loadAutoDeleteMode() {
        if (!currentRoom) return;
        const snap = await get(ref(database, `rooms/${currentRoom}/settings/autoDelete`));
        if (snap.exists()) {
            autoDeleteMode = snap.val();
            document.getElementById('autoDeleteSelect').value = autoDeleteMode;
            if (autoDeleteMode !== 'off') startAutoDeleteTimer();
        }
    }
    
    function startAutoDeleteTimer() {
        if (autoDeleteInterval) clearInterval(autoDeleteInterval);
        if (autoDeleteMode === 'off') return;
        let ms = autoDeleteMode === '1hour' ? 3600000 : autoDeleteMode === '24hour' ? 86400000 : 0;
        if (ms === 0) {
            // Immediate delete
            set(ref(database, `rooms/${currentRoom}/messages`), null);
            addSystemMessage(`⚡ All messages cleared!`);
            return;
        }
        autoDeleteInterval = setInterval(async () => {
            const cutoff = Date.now() - ms;
            const msgsRef = ref(database, `rooms/${currentRoom}/messages`);
            const snap = await get(msgsRef);
            if (snap.exists()) {
                let count = 0;
                for (const [id, msg] of Object.entries(snap.val())) {
                    if (msg.timestampMs && msg.timestampMs < cutoff) {
                        await remove(ref(database, `rooms/${currentRoom}/messages/${id}`));
                        count++;
                    }
                }
                if (count) addSystemMessage(`🧹 Auto-delete: ${count} old messages removed`);
            }
        }, 30000);
    }
    
    function stopAutoDeleteTimer() {
        if (autoDeleteInterval) { clearInterval(autoDeleteInterval); autoDeleteInterval = null; }
    }
    
    async function changeAutoDeleteMode() {
        const select = document.getElementById('autoDeleteSelect');
        autoDeleteMode = select.value;
        await saveAutoDeleteMode(autoDeleteMode);
        stopAutoDeleteTimer();
        if (autoDeleteMode === 'immediate') {
            await set(ref(database, `rooms/${currentRoom}/messages`), null);
            addSystemMessage(`⚡ All messages cleared!`);
        } else if (autoDeleteMode !== 'off') {
            startAutoDeleteTimer();
            const hours = autoDeleteMode === '1hour' ? '1 hour' : '24 hours';
            addSystemMessage(`🕐 Auto-delete enabled: messages older than ${hours} will be cleared.`);
        } else {
            addSystemMessage(`🕐 Auto-delete disabled.`);
        }
    }
    
    // ========== CHAT ==========
    async function addSystemMessage(text) {
        if (!currentRoom) return;
        await push(ref(database, `rooms/${currentRoom}/messages`), {
            sender: "🐔 system", text, timestamp: serverTimestamp(), timestampMs: Date.now(), isSystem: true
        });
    }
    
    function displayMessage(msg, msgId) {
        const container = document.getElementById("messagesContainer");
        if (!container) return;
        if (container.children.length === 1 && container.children[0].classList?.contains('loading')) container.innerHTML = '';
        const div = document.createElement('div');
        div.className = 'message';
        const isOwn = msg.sender === currentUsername;
        const isSystem = msg.isSystem === true;
        if (!isSystem) div.classList.add(isOwn ? 'own-message' : '');
        if (isSystem) div.classList.add('system-message');
        const time = msg.timestampMs ? new Date(msg.timestampMs).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : 'now';
        if (isSystem) {
            div.innerHTML = `<div class="message-content"><div class="message-bubble">🐔 ${escapeHtml(msg.text)}</div></div>`;
        } else {
            div.innerHTML = `
                <div class="message-header">
                    <span class="message-sender">${escapeHtml(msg.sender)}</span>
                    <span class="message-time">${time}</span>
                </div>
                <div class="message-content">
                    <div class="message-bubble">${escapeHtml(msg.text)}</div>
                </div>
            `;
        }
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }
    
    async function sendMessage(text) {
        if (!text.trim()) return;
        if (!currentRoom) { alert("Join a room first!"); return; }
        await push(ref(database, `rooms/${currentRoom}/messages`), {
            sender: currentUsername, text: text.trim(), timestamp: serverTimestamp(), timestampMs: Date.now()
        });
        document.getElementById("messageInput").value = "";
    }
    
    function joinRoom(roomId) {
        if (!currentRoom) {
            currentRoom = roomId;
            document.getElementById("messagesContainer").innerHTML = '<div class="loading">🐔 loading messages...</div>';
            const msgsRef = ref(database, `rooms/${currentRoom}/messages`);
            onChildAdded(query(msgsRef, limitToLast(100)), (snap) => { if (snap.val()) displayMessage(snap.val(), snap.key); });
            updateOnlineStatus();
            loadAutoDeleteMode();
            setTimeout(() => addSystemMessage(`${currentUsername} joined the room`), 300);
            document.getElementById("messageInput").disabled = false;
            document.getElementById("sendBtn").disabled = false;
        } else if (currentRoom !== roomId) {
            // leave old room, join new
            if (currentRoom) set(ref(database, `rooms/${currentRoom}/online/${currentUsername}`), null);
            currentRoom = roomId;
            document.getElementById("messagesContainer").innerHTML = '<div class="loading">🐔 loading messages...</div>';
            const msgsRef = ref(database, `rooms/${currentRoom}/messages`);
            onChildAdded(query(msgsRef, limitToLast(100)), (snap) => { if (snap.val()) displayMessage(snap.val(), snap.key); });
            updateOnlineStatus();
            loadAutoDeleteMode();
            setTimeout(() => addSystemMessage(`${currentUsername} joined the room`), 300);
        }
    }
    
    // ========== LOGOUT ==========
    window.logout = async function() {
        if (currentRoom && currentUsername) {
            await set(ref(database, `rooms/${currentRoom}/online/${currentUsername}`), null);
        }
        localStorage.removeItem("hensworld_username");
        location.reload();
    };
    
    // ========== INIT ==========
    async function initFirebase() {
        app = initializeApp(firebaseConfig);
        database = getDatabase(app);
        isFirebaseReady = true;
        return true;
    }
    
    function setupUI() {
        document.getElementById("joinRoomBtn").onclick = () => {
            let room = document.getElementById("roomInput").value.trim();
            if (!room) room = "lobby";
            joinRoom(room);
        };
        document.getElementById("sendBtn").onclick = () => sendMessage(document.getElementById("messageInput").value);
        document.getElementById("messageInput").onkeydown = (e) => {
            if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(e.target.value); }
        };
        document.getElementById("logoutBtn").onclick = () => window.logout();
        document.getElementById("onlinePeopleBtn").onclick = () => window.showOnlineUsers();
        document.getElementById("autoDeleteSelect").onchange = () => changeAutoDeleteMode();
        document.getElementById("roomInput").value = "lobby";
        setTimeout(() => { if (isFirebaseReady && currentUsername) joinRoom("lobby"); }, 500);
    }
    
    function addWatermark() {
        const wm = document.createElement('div');
        wm.style.cssText = `position:fixed; bottom:5px; left:5px; right:5px; font-size:8px; color:rgba(150,150,150,0.2); z-index:9998; pointer-events:none; text-align:center;`;
        wm.innerHTML = `${currentUsername} • ${new Date().toLocaleString()} • hensworld.chat`;
        document.body.appendChild(wm);
    }
    
    document.addEventListener('contextmenu', (e) => e.preventDefault());
    window.addEventListener('blur', () => document.querySelector('.app')?.classList.add('screenshot-detected'));
    window.addEventListener('focus', () => setTimeout(() => document.querySelector('.app')?.classList.remove('screenshot-detected'), 300));
    
    async function init() {
        await initFirebase();
        await initAuth();
        setupUI();
        addWatermark();
    }
    init();
</script>
</body>
